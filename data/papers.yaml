    inference_budget: Maximum generation context size 16384 tokens during RLT training; downstream students are susceptible to cropped traces, so the repository recommends recollecting multiple traces for 32B students.
    optimizer_or_scaffold: SFT warm-up on pre-collected Bespoke examples followed by 125 GRPO steps with batch size 1024 and a dense student-learnability reward; generated explanations then supervise student SFT.
  audit:
