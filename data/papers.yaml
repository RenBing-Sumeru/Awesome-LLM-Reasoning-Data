    verifier_or_reward: R3 reward model produces interpretable reasoned score assignments across point-wise, pair-wise, and
      binary evaluation formats.
    terminal_predicate: whether the candidate is scored, ranked, or classified according to the associated rubric and feedback
      format.
  recipe_metadata:
    base_model: Qwen3-based reward models; the public example includes R3-Qwen3-14B-LoRA-4k.
    teacher: GPT-4.1 mini for rubric and negative-answer generation, with reasoning distillation from DeepSeek-R1.
    generator: rubric, negative-answer, and explanation-generation pipeline over heterogeneous reward-model examples.
    filtering_rule: sample from a 4M+ raw pool into 20K diverse examples; generate rubrics and explanation traces; summarize
      traces over 4096 tokens; filter incorrect predictions and trivial examples by small-model agreement.
    sampling_protocol: R3 variants use 4K or 14K training examples depending on model version.
    rollout_count: 4K or 14K training examples, depending on the released variant.
    temperature: vLLM example reports temperature 0.6, top_p 0.95, min_p 0, top_k 20.
    inference_budget: example inference uses max tokens 8192 and max_model_len 10000.
    optimizer_or_scaffold: LoRA training with LLaMA Factory, dataset generation scripts, and benchmark evaluation scripts.
