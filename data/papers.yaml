- id: alternating-reinforcement-learning-for-rubric-based-reward-modeling-in-non-verifiable-llm-post-training-rubric-arm-2026
  title: Alternating Reinforcement Learning for Rubric-Based Reward Modeling in Non-Verifiable LLM Post-Training (Rubric-ARM)
  year: 2026
  venue: arXiv
  authors:
  - Ran Xu
  - Tianci Liu
  - Zihan Dong
  - Tony Yu
  - Ilgee Hong
  - Carl Yang
  - Linjun Zhang
  - Tao Zhao
  - Haoyu Wang
  source_role:
  - verifier_reward
  - construction_recipe
  verification_contract:
  - judgment_required
  - mixed
  supervision_granularity:
  - scalar_reward
  - pairwise_preference
  domains:
  - rubric-reward
  - llm-as-judge
  - non-verifiable-tasks
  - creative-writing
  - open-ended-instruction-following
  training_use:
  - reward_modeling
  - evaluation
  construction_layer:
  - reward_verifier_layer
  - release_audit
  - optimizer_scaffold
  artifacts:
    paper: https://arxiv.org/abs/2602.01511
    arxiv: https://arxiv.org/abs/2602.01511
    code: null
    data: null
    project: null
    huggingface: https://huggingface.co/collections/OpenRubrics/rubricarm
    doi: https://doi.org/10.48550/arXiv.2602.01511
    venue: null
    openreview: null
    acl: null
    pmlr: null
    cvf: null
    bibtex: null
  data_object:
    prompt_source: general-domain OpenRubrics plus non-verifiable evaluation domains.
    trace_author: rubric generator, rubric-conditioned judge, and preference-correctness feedback loop.
    answer_format: prompt, candidate response pair, generated rubric, rubric-conditioned reasoning chain, preference prediction,
      preference-correctness reward, and policy/reward update signal.
    process_fields:
    - prompt
    - response_a
    - response_b
    - generated_rubric
    - rubric_dimension
    - judge_reasoning
    - preference_prediction
    - preference_feedback
    - format_reward
    - policy_update_signal
    environment_or_substrate: alternating reinforcement-learning setup for rubric generator and rubric-conditioned judge.
    verifier_or_reward: rubric-conditioned judge trained with preference-correctness and format rewards.
    terminal_predicate: whether the judge predicts the preferred response under the generated rubric while satisfying the
      required output format.
  recipe_metadata:
    base_model: Qwen-3-8B for rubric generator and judge; Qwen2.5-7B-Instruct for policy optimization experiments.
    teacher: general-domain OpenRubrics trajectories plus preference labels; a format reward enforces valid trajectories.
    generator: learned rubric generator trained with alternating reinforcement learning.
    filtering_rule: split OpenRubrics into non-overlapping parts, cache rubrics during judge updates, and randomize response
      order.
    sampling_protocol: SFT warmup on synthetic rubric/judge trajectories from UltraFeedback, SkyWork, Magpie, and synthetic
      instruction-following data, followed by three alternating RL iterations.
    rollout_count: generator uses 6 generations and judge uses 7 generations per update setting.
    temperature: training temperature 1.0 for rubric generator/judge; inference uses temperature 0.0 for generator and 1.0
      for judge.
    inference_budget: generator max 1024 tokens; judge max 4096 tokens; policy DPO/GRPO cutoff 2048.
    optimizer_or_scaffold: GRPO via ms-swift and DPO/IterDPO via LLaMA-Factory.
  audit:
    source_mixture: OpenRubrics general-domain data, UltraFeedback, SkyWork, Magpie, Synthetic Instruction Following, RewardBench,
      RM-Bench, PPE-IFEval, FollowBench, InfoBench, IFBench, RewardBench2, Arena-Hard, AlpacaEval 2, Creative Writing Benchmark
      v3, WildBench, and WritingPreferenceBench.
    split: OpenRubrics is split into non-overlapping parts; exact released split revisions should be verified from official
      artifacts.
    decontamination: unknown
    license: arXiv paper and Hugging Face collection are official; checkpoint/data licenses should be checked before reuse.
    lineage: Emory University; ByteDance; University of Chicago; Purdue University; University at Albany.
    known_failure_modes:
    - Generated rubrics can drift away from human preference dimensions.
    - Alternating updates can create non-stationary reward targets and reward hacking.
    - A format-valid judge trajectory is not necessarily a correct or useful feedback signal.
    - Benchmark or policy gains do not prove that generated rubrics are high-quality data.
    citation_status: verified
    confidence: high
    notes: Updated from primary paper and official Hugging Face collection for Preference & Reward Feedback curation.
    metadata_status: carded
  one_line_summary: Rubric-ARM trains a rubric generator and rubric-conditioned judge with alternating reinforcement learning
    for non-verifiable preference feedback.
  why_it_matters: It makes the generated rubric itself part of the reward-model data object, so reuse requires auditing rubric
    quality, judge correctness, and policy optimization together.
  inclusion_reason: Include as a rubric-based reward-modeling recipe for non-verifiable post-training tasks where preference
    feedback cannot be reduced to exact-answer checking.
