  data_object:
    prompt_source: More than 100 Python procedural generators create reasoning tasks across mathematical, algorithmic, logical, graph, cognition, code, geometry, and game domains from task-specific configurations.
    trace_author: Model policies generate single-turn answer responses during RLVR; Reasoning Gym generates questions, oracle answers, metadata, and verifier rewards rather than releasing a fixed reasoning-trace corpus.
    answer_format: Each generated entry contains question, answer, and metadata fields; model-answer syntax and the set of valid solutions are task-specific.
    process_fields:
    - task or source-dataset name
    - generator configuration
    - seed and generated-item index
    - question
    - oracle answer
    - task-specific metadata
    - model response
    - score_answer reward
    - optional curriculum level
    environment_or_substrate: ProceduralDataset generators, a named task registry, weighted composite datasets, optional reseeding for unbounded streams, and optional task curricula.
    verifier_or_reward: Each task supplies a score_answer function yielding an algorithmic scalar reward; current releases optionally add native, normalized-string, numeric, and symbolic-math cascade scoring.
    terminal_predicate: A single-turn model response receives the score returned by the selected task verifier or scoring cascade for the generated entry.
  recipe_metadata:
    base_model: Qwen2.5-3B-Instruct in the reported transfer and curriculum experiments.
    teacher: none
    generator: Registered task-specific Python procedural generators with difficulty, structural, and stylistic parameters.
    filtering_rule: No universal corpus filter is used because examples are generated at runtime; generators enforce task validity and task-specific scorers evaluate responses.
    sampling_protocol: Tasks may be sampled independently or from weighted composite mixtures; exact configs, seeds, sizes, weights, and reseeding behavior determine the realized data stream.
    rollout_count: 8
    temperature: 1.0
    inference_budget: The Appendix A.6 example uses a 4,096-token prompt limit, 2,048-token response limit, and 20,000-item virtual dataset size; these values are experiment-specific.
    optimizer_or_scaffold: GRPO with a Reasoning-Gym-modified verl stack for most reported experiments; separate qwen-math training code is also released.
  audit:
    source_mixture: A version-dependent registry of more than 100 procedural task generators, optionally combined with explicit per-task weights and configurations.
    split: No universal fixed train/test split exists. Reported experiments freeze holdout examples, while reproducible reuse requires pinned seeds, configs, task registry, scorer, revision, and materialized evaluation snapshots.
    decontamination: Procedural generation reduces fixed-example reuse, but semantic or template overlap with external benchmarks is not comprehensively audited.
    license: Apache-2.0 for the official code release; bundled resources and generated-content provenance should be audited where task implementations use external assets.
    lineage: Generated records depend on repository or package version, registered task implementation, full config, seed, item index, composite weights, curriculum state, and scorer dependencies.
    known_failure_modes:
    - The library is a dynamic generator collection rather than a canonical fixed dataset, so task counts, defaults, outputs, and verifier behavior can change across revisions.
    - The base score_answer implementation gives partial credit when an oracle string appears inside a longer response, creating a false-positive surface.
    - The optional cascade only upgrades scores and adds normalization, numeric tolerance, and symbolic matching; this reduces formatting false negatives but broadens acceptance.
    - Symbolic verification is skipped when the optional math-verify dependency is absent, making rewards environment-dependent.
    - Unit tests cover many task and scorer cases but do not establish soundness over every task's full generated solution space.
    - Procedural generation does not prevent semantic overlap, shared templates, or train/evaluation leakage when seeds and snapshots are uncontrolled.
    - Curricula exist only for a subset of tasks, and difficulty levels are not necessarily comparable across environments.
    - The paper focuses on single-turn text tasks and does not cover multi-turn or multimodal environments.
    citation_status: verified
    confidence: medium
    notes: Official arXiv, OpenReview, repository, generator interface, training configurations, scorer implementation, tests, and current version history were checked on 2026-07-10. Reusable data identity requires a pinned commit, complete configs, seeds, scorer mode, and frozen evaluation snapshot.
