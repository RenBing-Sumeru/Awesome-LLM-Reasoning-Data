    verifier_or_reward: Llama-3.1-70B-Instruct receives the question, ground-truth answer, reference explanation and indexed steps, then identifies the earliest BAD step. Released labels use 1 before and -1 from the earliest error through the suffix.
    terminal_predicate: The generated final answer must be parseable; correctness is determined by matching the MMLU-Pro reference answer.
  recipe_metadata:
    base_model: VersaPRM is initialized from the authors' LlamaPRM800K based on Llama-3.1-8B-Instruct.
    teacher: Llama-3.1-70B-Instruct auto-labeler with ground-truth answer, reference explanation and GOOD/OK/BAD rubric.
    generator: Llama-3.1-8B-Instruct via AWS Bedrock.
    filtering_rule: Remove CoTs exceeding 2,048 tokens, unparseable final answers, and records whose labeler output lacks a valid earliest-error index.
    sampling_protocol: Sample up to 500 MMLU-Pro questions per domain, generate 16 CoTs per training question at temperature 0.8, and label each retained CoT once at temperature 0.
    rollout_count: 16
    temperature: 0.8
    inference_budget: Evaluation release provides up to 128 CoTs per question for selection experiments.
    optimizer_or_scaffold: LoRA for one epoch with batch size 32; cross-entropy uses +/− logits at a four-newline separator. Main WMV/BoN evaluation uses min-aggregation.
  audit:
    source_mixture: All prompts come through MMLU-Pro's 14 domains; the release exposes 91 distinct src values. No per-source weighting or quality audit is reported.
    split: Official training release has one train split with 84,098 CoTs; evaluation release has one test split with about 249K unlabeled CoTs. The paper states disjoint questions and removes 41 duplicate evaluation questions but does not disclose a random seed or independent validation split.
    decontamination: unknown
    license: Code and both official dataset cards declare MIT; main model follows Llama 3.1 license. Per-source license inheritance for 91 MMLU-Pro src values is undocumented.
    lineage: MMLU-Pro questions to Llama-8B CoTs to length/answer filtering to Llama-70B earliest-error judgment to binary step labels to LoRA fine-tuning from LlamaPRM800K to VersaPRM.
    known_failure_modes:
    - The paper says post-error steps are discarded, but official parser and released data retain the suffix and label it -1.
    - Human validation covers only 30 questions and 90 selected CoTs, with 83% positive and 70% negative agreement and no per-domain confidence intervals.
    - Earliest-error propagation marks the whole suffix negative and cannot represent later recovery.
    - The labeler is conditioned on reference answer/explanation, which can conflate answer agreement with local validity.
    - GOOD/OK/BAD treats hard-to-verify and non-insightful steps as BAD, creating possible style, verbosity and domain-familiarity bias.
    - Generator and judge share the Llama family and may favor family-specific reasoning style.
    - No cross-domain score calibration, threshold calibration, false-positive/negative breakdown or style-bias evaluation is reported.
    - No decontamination analysis is reported for prompts against model pretraining corpora.
    - Repository reproduction still depends on AWS Bedrock formatting, separately hosted converted JSON and incomplete search-algorithm documentation.
    citation_status: verified
    confidence: high
    notes: PMLR, arXiv, paper-linked code, model collection, model/data cards, schemas and parser scripts were checked on 2026-07-10. Artifact existence is verified, but label semantics and audit coverage remain partial.
  inclusion_reason: VersaPRM is an open recipe for converting a multi-domain source into synthetic step-labeled reasoning data and a PRM, with enough official artifacts to audit generation, judging, filtering, label propagation and inference-time use.
