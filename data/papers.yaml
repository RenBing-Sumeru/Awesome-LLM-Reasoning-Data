    prompt_source: Expert-written competitive-programming problems aggregated from TACO, APPS, CodeContests, CodeContests-Python-Submission, OpenR1 Codeforces, USACO 2011-2023, and IOI 2002-2023. Synthetic records preserve seed_question and a platform-level seed_source, but not the original source URL.
    trace_author: QWQ-32B generates long-reasoning candidate solutions. GPT-4o is the primary synthetic-problem generator; GPT-4o and DeepSeek-V3 generate test-input and validation utility functions.
    answer_format: SFT records contain a programming question, long-CoT response, and implementation code. RL records separate problems from input-output test cases. Seed records may include starter_code and solution-level verified/is_passed booleans.
    process_fields:
    - question_id
    - question
    - seed_question
    - seed_source
    - starter_code
    - response
    - code
    - verified
    - is_passed
    - inputs
    - outputs
    - is_synthesized
    - test_case_type
    - func_name
    - class_name
    environment_or_substrate: Competitive-programming execution for standard-input/output and function-based tasks, with generated inputs spanning multiple scales; reuse requires isolated untrusted-code execution.
    verifier_or_reward: For seed problems, oracle solutions label generated outputs and candidate code is checked against tests. For synthetic problems, 16 QWQ-32B solutions are executed on at least 50 shared inputs and consistent complete output sets are selected by agreement.
    terminal_predicate: A candidate executes successfully and matches accepted outputs on all retained tests. Synthetic problems normally require at least 60 percent solution agreement, lowered to 40 percent for Codeforces-derived problems rated above 1600. This predicate does not hold for every seed_sft row.
  recipe_metadata:
    base_model: Qwen2.5-Coder-Instruct at 1.5B, 7B, and 14B in downstream SFT experiments.
    teacher: GPT-4o for problem synthesis; GPT-4o and DeepSeek-V3 for test-input utility functions; QWQ-32B for long-reasoning candidate solutions.
    generator: Seed problems and oracle solutions drive transformed problem synthesis, constraint-aware test generation, and QWQ-32B executable long-CoT generation.
    filtering_rule: Remove cross-source duplicates and seeds without reference solutions; apply mutual verification with 60 or 40 percent agreement thresholds; retain the fastest passing synthetic solution; remove 16-gram benchmark overlaps.
    sampling_protocol: Start from 37,754 verified seeds, generate 1,565,632 synthetic candidates, retain 380,560, and sample 16 QWQ-32B solutions with at least 50 test inputs per synthetic problem. Exact platform allocation and decoding settings are undisclosed.
    rollout_count: 16
    temperature: null
    inference_budget: Sixteen candidate solutions and at least fifty shared test inputs per synthetic problem; total teacher token and monetary budgets are unknown.
    optimizer_or_scaffold: The paper reports Qwen2.5-Coder-Instruct SFT with six epochs, AdamW, batch size 96, 16K maximum sequence length, cosine-decayed 4e-5 learning rate, FlashAttention-2, and DeepSpeed. Public RL configs are released but not evaluated with RL in the paper.
  audit:
    source_mixture: The paper reports 57,215 collected seeds, reduced to 37,754 unique problems with references, plus 1,565,632 generated candidates and 380,560 retained synthetic problems. Platform-level counts are available, but per-row original URLs are absent.
    split: Five train-only configs are released. At revision 3a7a0a0636ec96e3c1ec42ebe79ade467caa040d, complete counts are 398,183 synthetic_sft, 398,107 synthetic_rl, and 591,660 seed_sft; partial indexing estimates 463,540 synthetic_rl_testcase and 7,801 seed_testcase. No config reconstructs the paper's 580K mixture directly.
    decontamination: Problems with 16-gram overlap against HumanEval, HumanEval+, MBPP, MBPP+, LiveCodeBench, and USACO 2025 are removed; per-benchmark removals and residual overlap are not reported.
    license: The Microsoft dataset declares CC BY 4.0. The paper lacks a per-source terms matrix and per-record source URL. The NeurIPS supplementary ZIP has no standalone license; the linked MIT rStar repository should not automatically be assumed to license the separate ZIP.
    lineage: Competition sources to seed filtering to GPT-4o problem synthesis to multi-scale input generation to QWQ-32B execution and mutual verification to retained synthetic problems to fastest-solution selection to benchmark decontamination to five public configs. The mapping to the paper's 418K-problem and 580K-pair mixture is unknown.
    known_failure_modes:
    - Mutually generated solutions can share systematic errors and converge on an incorrect output set; reported accuracy drops from 96.8 to 92.8 percent in the larger comparison.
    - The 40 percent threshold for difficult Codeforces-derived problems is below a strict majority.
    - Seed problems for which no QWQ-32B candidate passes retain all generated solutions, so seed_sft is not uniformly verified.
    - Selecting the fastest passing synthetic solution introduces an execution-efficiency objective and can favor brittle implementations.
    - Generated tests and input validators may miss semantic edge cases or encode incomplete constraints.
    - synthetic_sft lacks question_id, testcase links, and verification flags, preventing robust joins to synthetic RL testcases.
    - Current public counts do not reconcile with the paper's 580K pairs, and Appendix Table 6 reports 480K rather than 418K unique problems.
    - Platform-level provenance without original URLs and source-license mapping limits attribution and license auditing.
    - All public configs are train-only and no verifier-calibration split is released.
    - Official model checkpoints are not linked, limiting direct score reproduction.
    - The release exceeds 480GB and stores some testcase arrays as JSON strings, creating processing barriers.
    citation_status: verified
    confidence: medium
    notes: NeurIPS paper, supplement, Microsoft HF card/schema/API and linked project repository were checked on 2026-07-10. Artifact existence is verified; exact paper-mixture reconstruction, upstream licensing, production decoding settings and official model release remain partial.
  inclusion_reason: rStar-Coder is a core Track 8 release because it exposes a large competitive-programming construction pipeline linking seed attribution, problem synthesis, multi-scale testcase generation, execution-based mutual verification, long-CoT filtering, SFT packaging, and RL-ready verifier data.
