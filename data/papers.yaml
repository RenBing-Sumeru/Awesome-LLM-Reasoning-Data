  data_object:
    prompt_source: Generator SFT uses 113K math prompts filtered from Eurus-2-SFT-Data. Interleaved RL uses 455K math question-answer pairs from Eurus-2-RL-Data, retaining gold answers for rule-based correctness checking. No Tango-specific processed-data artifact is released.
    trace_author: Llama-3.1-70B-Instruct generates initial SFT responses. During RL, the current generator produces on-policy multi-step solutions and the current generative verifier produces on-policy natural-language verification trajectories.
    answer_format: A runtime item comprises a question, gold answer, generator response with think/step/answer tags, verifier response with one natural-language judgment per step, and an overall final-verification judgment. This is a training-time object, not a released dataset schema.
    process_fields:
    - question
    - gold_answer
    - generator_solution
    - generator_steps
    - generator_final_answer
    - generator_outcome_correctness
    - verifier_step_rationales
    - verifier_step_judgments
    - verifier_final_judgment
    - verifier_format_score
    - process_rewards
    - outcome_reward
    environment_or_substrate: Offline math QA RL using veRL. The outcome checker extracts a boxed final answer and compares it with gold; the generative verifier evaluates the current generator trace and emits structured step/final judgments.
    verifier_or_reward: The generator receives binary gold-answer reward plus stochastic step rewards from the current verifier. The verifier receives outcome-level reward for whether its final judgment matches rule-derived correctness, plus structural-format reward. No gold step labels are used in the main training run.
    terminal_predicate: Generator success is an extracted final answer matching gold under the answer checker. Verifier success is a final judgment matching that outcome, with format credit for required step-wise verifications.
  recipe_metadata:
    base_model: Qwen2.5-Math-7B generator and Qwen2.5-7B verifier in the main experiment; a Llama-3.1-8B-Instruct experiment is also reported.
    teacher: Llama-3.1-70B-Instruct generates initial SFT responses. During RL there is no frozen process-label teacher; generator and verifier create evolving trajectories while gold final answers anchor outcomes.
    generator: The generator emits tagged multi-step solutions; the generative verifier emits natural-language analysis, one binary judgment per step, and a final judgment. Both are updated by policy-gradient RL in a 3-to-1 cycle.
    filtering_rule: Training prompts are filtered to math and overlong prompts are rejected by config. Final answers use analytical comparison; verifier output loses format credit for missing rationales, wrong step counts or malformed final verification. Additional rollout-retention rules are undisclosed.
    sampling_protocol: Five rollouts per prompt. Generator updates pair each current solution with a current-verifier trajectory; verifier updates pair a current generator solution with five verifier trajectories. Verifier warmup lasts 40 steps, then three generator updates alternate with one verifier update.
    rollout_count: 5
    temperature: 1.0
    inference_budget: top-p 1.0; public script sets generator prompt/response 2048 and verifier prompt/response 4096 tokens. Main experiments use four nodes of eight A100 GPUs. Total trajectory volume is not reported.
    optimizer_or_scaffold: veRL with GRPO, RLOO or REINFORCE++; AdamW 1e-6, batch 256, microbatch 4, KL 0.001, EMA class reweighting and decaying process-reward weight. Paper reports 200/300 steps while public script configures 440.
  audit:
    source_mixture: Main training is math-only with 113K Eurus-2 SFT prompts and 455K Eurus-2 RL QA pairs. Logic, code, commonsense and table tasks are evaluation surfaces, not disclosed training components.
    split: Repository preprocesses upstream Eurus train/validation and locally splits generated SFT parquet, but no Tango-specific manifest, processed dataset, trajectory archive or checkpoint-to-data snapshot is released.
    decontamination: unknown
    license: Code is Apache-2.0. Licenses for generated SFT responses, processed Eurus subsets, on-policy trajectories and Tango models are not specified because those artifacts are not released; upstream compatibility is not audited.
    lineage: Eurus SFT prompts to Llama tagged responses to generator SFT to Eurus RL QA to current-generator rollouts to current-verifier step judgments to answer/format rewards to alternating generator/verifier RL to reported models. Processed data, trajectories and checkpoints are not linked.
    known_failure_modes:
    - Generator and verifier can co-adapt to shared stylistic or structural shortcuts that fail under independent evaluation.
    - Verifier step judgments receive no direct correctness labels; plausible but inaccurate step rationales can earn reward.
    - Final-answer extraction can produce false positives or negatives for equivalent expressions, malformed boxes or invalid reasoning.
    - Format reward can encourage cosmetic step/tag compliance independently of semantic quality.
    - Early class imbalance causes an observed all-incorrect verifier collapse; EMA mitigation changes calibration and remains generator-dependent.
    - Stochastic verification and alpha decay mitigate but do not guarantee against verifier gaming or coordinated exploitation.
    - Process rewards normalized by step count can create incentives around segmentation and step boundaries.
    - No overlap analysis is reported between Eurus math prompts and evaluation sets.
    - Public script step counts differ from paper recipes, leaving reported-checkpoint configuration ambiguous.
    - Missing trajectories and checkpoints prevent independent co-adaptation and reward-hacking audits.
    citation_status: verified
    confidence: medium
    notes: OpenReview, arXiv and official repository at revision 411ed834e1c99a41b8165e588f446c423a35bfc3 were checked on 2026-07-10. Code is available; processed data, trajectories, checkpoints, licenses and exact paper-checkpoint configuration remain unresolved.
  inclusion_reason: RL Tango is a high-value Track 8 recipe because current generator solutions, current verifier rationales, rule-derived outcomes and stochastic process rewards are regenerated as both policies co-evolve.
