    lineage: Upstream public or synthesized tasks are normalized to domain-specific prompts and verifier payloads, conservatively deduplicated, heuristically filtered, scored by weak and strong models over 16 trials, difficulty-filtered to 91.9K rows, and used for on-policy GRPO training of Qwen2.5 base models. Rows retain data_source and extra_info metadata, but uniformly resolvable row-level source URLs are not established.
