  audit:
    source_mixture: Problems come from more than 20 competitions plus MathArena and PutnamBench; most have competition/source/year metadata, but some source URLs are unavailable or private.
    split: Current public release has generic 3039, test 292, putnambench 564, matharena 310, best_of_n 252, and pass_at_n 477 rows. MathArena, PutnamBench, and test must remain outside training.
    decontamination: Split boundaries are documented, but broader overlap with model pretraining or other mathematical corpora is unknown.
    license: Dataset release is CC BY-NC-SA 4.0 and code is Apache-2.0. Item-level competition-problem and official-solution licenses are not recorded.
    lineage: Official competition problem to optional GPT-4.1 translation and manual verification to frontier-model proof generation to expert human grading, optional duplicate grading and sentence annotations, split assignment, and public HF export.
    known_failure_modes:
    - Approximately 10% double grading leaves most proofs with a single human judgment.
    - The reported 90.4% agreement still implies nonzero label noise; the paper's 5% judge-error estimate depends on independence assumptions.
    - Fewer than 3% of proofs are marked uncertain, but subtle near-correct errors can remain difficult to classify.
    - O4-MINI-generated issue summaries may anchor judges even though the authors found no significant agreement shift.
    - Best-of-N coverage is selective: only 60 problems have all eight generations human graded, while many other candidates are judged only after selection.
    - Some best-of-N records use a V1 ranking judge whose methodology is described by the dataset card as suboptimal.
    - The public HF snapshot has 4934 rows versus 5062 proofs reported in the paper; SMT withholding is documented, but the complete row-count difference is not reconciled.
    - Problem source URLs may be private or missing, and no item-level license field establishes reuse rights.
    - MathArena and PutnamBench are analytical benchmark subsets and should not be treated as proof-training data.
    - Positive and negative proofs support verifier training and audit, but do not provide formal proof checking or executable correctness guarantees.
