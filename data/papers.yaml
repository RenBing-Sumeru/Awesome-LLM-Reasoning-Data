    known_failure_modes: [The reward is tied to a particular frozen student and may favor student-specific explanations, conditioning on known solutions can produce explanations that rationalize rather than independently derive an answer, the dense reward measures solution-token likelihood rather than proof validity, long explanations may be cropped by student context limits, no official generated-trace dataset or row-level lineage manifest was identified, decontamination is unreported, official Hugging Face artifacts are described as distilled students and do not clearly expose the trained teacher checkpoint.]
