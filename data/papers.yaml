  data_object:
    prompt_source: Fewer than 17000 mathematics and coding question-solution pairs from Bespoke-Stratos-17k; the paper also studies a 1000-example subset.
    trace_author: A Qwen2.5-7B-Instruct reinforcement-learned teacher generates explanations conditioned on each question and its known solution.
    answer_format: Question and known solution are provided to the teacher; extracted explanation tokens are placed inside think tags and followed by the solution for student distillation.
    process_fields: [question, solution, optional_reasoning_trace, generated_explanation, student_solution_log_probabilities, explanation_kl_reward]
    environment_or_substrate: Offline teacher SFT warm-up followed by GRPO training; a frozen Qwen2.5-7B-Instruct student scores whether explanations make the known solution learnable.
    verifier_or_reward: A dense scalar combines the student's average and minimum log-probability over solution tokens with a KL-based term measuring whether the explanation is a plausible continuation for the student; malformed outputs receive a format penalty.
    terminal_predicate: The teacher output follows the required explanation format and supplies a trace that raises the student's likelihood of the known solution.
  recipe_metadata:
    base_model: Qwen2.5-7B-Instruct for the RLT teacher and fixed reward student; Qwen2.5-7B-Instruct and Qwen2.5-32B-Instruct are downstream distilled students.
