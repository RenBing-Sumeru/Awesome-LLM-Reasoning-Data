    bibtex: null
  data_object:
    prompt_source: Training observations from ARC-Challenge, CommonsenseQA, CLadder 1.5, ANLI R1, GSM8K, and SVAMP. ARC-C train/validation are combined; ANLI uses a 10,000-example R1 sample; GSM8K training rationales are withheld.
    trace_author: The current iteration's model, initialized from Llama-3.2-3B for most main experiments, Qwen2.5-3B for GSM8K, and additionally evaluated with Qwen2.5-3B and Gemma-7B.
    answer_format: A self-generated chain of thought and predicted final answer conditioned on fixed few-shot CoT exemplars; answers are checked against ground truth.
    process_fields:
    - observation_id
    - query
    - ground_truth_answer
    - generated_chain_of_thought
    - predicted_answer
    - terminal_correctness
    - last_sampled_iteration
    - win_rate
    - accepted_iteration
    - training_accuracy
    environment_or_substrate: Iterative accumulating STaR/RFT with a hierarchical min-heap over observations and a fresh accepted-CoT set each iteration.
    verifier_or_reward: Rule-based outcome verifier equals one when predicted answer matches ground truth; the most recent K-sample acceptance rate becomes the observation's cached win statistic.
    terminal_predicate: A generated CoT-answer pair enters the iteration's training set only when its final answer matches dataset ground truth.
  recipe_metadata:
    base_model: Pretrained-only Llama-3.2-3B for most main experiments, Qwen2.5-3B for GSM8K; generality experiments also use Qwen2.5-3B and Gemma-7B.
    teacher: The current model self-generates traces. GPT-4o is used only for a diagnostic false-positive audit, not training verification.
    generator: The current iteration's accumulating STaR policy model.
    filtering_rule: Keep only final-answer-correct CoT-answer pairs and continue adaptive observation sampling until the accepted set reaches beta_t.
    sampling_protocol: For each selected observation generate K=2 CoTs at temperature 1.0; prioritize oldest last-sampled iteration then lowest cached win rate; stop at beta_t accepted traces; after training update statistics for floor(m times alpha squared) observations.
    rollout_count: 2
    temperature: 1.0
    inference_budget: null
    optimizer_or_scaffold: Accumulating iterative NLL fine-tuning. Initial beta_1 is 320 and grows about 1.2 times per iteration. Experiments use batch 8, Adam, weight decay 0.01, 100 warmup steps and bf16; Gemma-7B uses LoRA rank 32.
  audit:
    source_mixture: Six upstream QA/reasoning benchmarks with different formats and provenance. Official repo bundles local/transformed copies but no consolidated source-lineage/license manifest.
    split: ARC-C train/validation combine for training; ANLI uses a seed-10 random 10K R1 sample; train/test sizes are reported, but observation order and per-iteration sampling manifests are not released.
    decontamination: unknown
    license: Implementation is Apache-2.0. Repo does not document whether it covers bundled upstream copies or provide inherited-license audit. No generated rollout/model licenses apply because those artifacts are not released.
    lineage: Supervised observations/answers to few-shot current-model rollouts to K=2 CoT-answer samples to terminal verification to cached win/recency statistics to adaptive selection until beta_t accepted traces to NLL update to next STaR iteration.
    known_failure_modes:
    - Outcome verification admits flawed CoTs with correct final answers.
    - Cached win rate is measured only at last visit and can become stale as model parameters and prompt difficulty drift.
    - Acceptance rate conflates reasoning difficulty with answer parsing, prompt format, few-shot compatibility and label noise.
    - Curriculum strength uses training accuracy on adaptively selected data rather than independent validation and may be selection-biased.
    - Only floor(m alpha squared) observations refresh statistics, creating possible repeated-selection artifacts.
    - Prioritizing low-win prompts without AdaC increases flawed-but-correct CoTs by about 9% in a small GPT-4o diagnostic.
    - The diagnostic uses 100 accepted observations per method/dataset and is not a training-time safeguard.
    - Math rationalization is disabled because it hurts performance, showing task-dependent behavior.
    - Llama-3.2-3B fails to self-improve on GSM8K, requiring a different base model.
    - The 58.6% figure averages dataset-specific early-stopped reductions against different baselines, not a fixed-baseline/fixed-quality comparison.
    - Additional model-family experiments are best in four of five combinations and one FLOPs reduction is zero.
    - Rejected rollouts, accepted CoTs, per-iteration datasets, statistic histories, logs, checkpoints and manifests are not released.
    - No pretraining decontamination or consolidated inherited-license audit is reported.
    citation_status: verified
    confidence: high
    notes: OpenReview, arXiv and paper-linked GitHub implementation/configs were checked on 2026-07-10. Code is released; generated rollouts, statistics, logs, checkpoints and HF artifacts are not.
  inclusion_reason: AdaSTaR is a reusable recipe for allocating iterative self-training compute across prompts using cached acceptance rates, sampling recency and a training-strength curriculum, while stopping generation once the accepted SFT batch is full.
