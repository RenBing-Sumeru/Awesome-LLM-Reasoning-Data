  data_object:
    prompt_source: Mathematical seeds come from MATH (7.5K), DeepScaleR (40K) and BigMath (251K); algorithmic seeds are 40K KodCode problems. Qwen2.5-72B-Instruct converts source solutions to a unified executable Python form, yielding 146K verified seed Code CoTs, including 122K math and 24K code records.
    trace_author: A Qwen2.5-Coder-7B CodeGen model samples new executable Code CoTs. Qwen3-8B reverse-engineers each accepted program into a natural-language problem and separately generates its language CoT. Qwen3-32B judges solvability, answer correctness and code-language CoT consistency.
    answer_format: The released Caco-1.3M records expose an instruction and natural-language output, while the construction pipeline additionally maintains the executable Python Code CoT used to derive and verify the pair.
    process_fields: [instruction, output, code_cot, execution_output, generated_problem, language_cot, answer_consistency, cot_consistency]
    environment_or_substrate: Python execution validates program syntax, runtime behavior, output stability and structural properties. AST and rule filters reject inefficient, trivial, overly long or inconsistent programs before natural-language reversal.
    verifier_or_reward: Seed programs must execute and match known answers. Sampled programs must execute and satisfy structural filters. Final records require the natural-language final answer to equal program output and a positive Qwen3-32B consistency judgment between code and language reasoning.
    terminal_predicate: 'A final pair is retained only when its underlying code executes, the inferred language answer matches the execution output, and the evaluator accepts alignment between the natural-language CoT and Code CoT.'
  recipe_metadata:
    base_model: Qwen2.5-Coder-7B is fine-tuned as unconditional CodeGen; downstream effectiveness is tested by SFT of DeepSeekMath-7B, Qwen2.5-Math-7B and Llama-3-8B.
    teacher: Qwen2.5-72B-Instruct unifies source solutions into Code CoTs; Qwen3-8B generates reversed problems and language solutions; Qwen3-32B performs solvability, correctness and consistency evaluation.
    generator: CodeGen samples executable reasoning programs without conditioning on a problem. Qwen3-8B then performs separate problem reversal and language-CoT generation from the code and representative input-output examples.
    filtering_rule: Programs must be syntactically valid, executable, efficient, structurally consistent and within length limits. BigMath seeds retain solve rate below 0.3. Final answer mismatch or negative code-language consistency judgment removes the pair.
    sampling_protocol: Unified Code CoTs use one sample at temperature 0.6. CodeGen samples at temperature 0.9 with maximum 1024 tokens. Qwen3-8B reversal uses temperature 0.7, top-p 0.8, top-k 20, min-p 0 and thinking disabled.
    rollout_count: 1
    temperature: 0.9
    inference_budget: The pipeline generates about 5.3M sampled programs, filters them to roughly 4.6M executable and structurally valid programs, and retains about 1.3M final instruction-answer pairs. Exact retry counts and total token volume are unknown.
    optimizer_or_scaffold: CodeGen and downstream SFT use LLaMAFactory. Downstream models train for three epochs with learning rate 5e-5, batch size 128, cosine decay and warmup ratio 0.03.
  audit:
