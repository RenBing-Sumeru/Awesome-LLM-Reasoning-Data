  data_object:
    prompt_source: For synthesis, 46,000 English math problems from NuminaMath, MetaMath, and InternLM-Math train plus 50,000 Chinese high-school math problems collected from the internet. Efficiency tests use 300 AIME problems through 2023 and 1,000 Chinese high-school math problems.
    trace_author: Qwen2.5-72B-Instruct sampled with randomly combined domain-diverse few-shot demonstrations.
    answer_format: A complete mathematical solution segmented as Step 1, Step 2, and so on; each step becomes a search-tree node.
    process_fields:
    - query
    - ground_truth
    - reasoning_step
    - parent_child_edges
    - visit_count
    - win_count
    - node_score
    - verifier_outcome
    - complete_trajectory
    - chosen_branch
    - rejected_branch
    - preference_granularity
    environment_or_substrate: An asynchronous MCTS-style reasoning tree where partial solutions are states, reasoning steps are actions, and complete simulations are retained as branches.
    verifier_or_reward: Qwen2.5-72B-Instruct judges each complete trajectory against the standard answer three times, repeating inconsistent cases until consensus. Binary terminal results are backed up so node score equals win_count divided by visit_count.
    terminal_predicate: A trajectory is accepted when the LLM verifier consistently judges its answer correct, clear, and not guessed or vague.
  recipe_metadata:
    base_model: Qwen2.5-7B for main SFT/Branch-DPO; additional checks use Llama-3.2-3B-base and Qwen2.5-3B-base.
    teacher: Qwen2.5-72B-Instruct as trajectory verifier; Qwen2.5-32B-Instruct for five-sample difficulty prescreening.
    generator: Qwen2.5-72B-Instruct served through SGLang.
    filtering_rule: Exclude questions with five-sample pass rate 100%, proof/find-all/image/URL/malformed/incomplete/ambiguous/low-quality cases, hash duplicates and stated evaluation overlaps; retain verifier-accepted correct trajectories and diverse branches for SFT.
    sampling_protocol: Random few-shot combinations, temperature 1, adaptive-stay UCT, dynamic exploration, retained simulations and asynchronous expansion. Main synthesis uses root degree 3, expansion degree 2 and 16 iterations; RS controls use 30/24 samples.
    rollout_count: 16
    temperature: 1
    inference_budget: 16 tree iterations; token-budget comparisons report average generated tokens rather than equal trajectory counts.
    optimizer_or_scaffold: SFT uses Qwen2.5-7B for three epochs, max length 4096, batch 32 and Adam 1e-5. Branch-DPO adds three epochs, batch 16, AdamW 1e-6, beta 0.4 and cosine schedule.
  audit:
    source_mixture: English prompts mix NuminaMath, MetaMath and InternLM-Math; Chinese prompts are internet-collected high-school math. Exact proportions, URLs, provenance and rights are undisclosed.
    split: Paper states hash dedup and no evaluation overlap but releases no train/validation/test manifests, hashes, random seeds, or EN/CN Hard datasets.
    decontamination: Hash duplicate removal and stated test exclusion only; no semantic near-duplicate or pretraining-corpus audit is reported.
    license: unknown
    lineage: Math prompts to Qwen-32B difficulty screening to heuristic/hash filters to Qwen-72B FastMCTS trees to repeated terminal verification to Monte Carlo node backup to correct-path SFT and step/branch preference pairs to Qwen-7B SFT/DPO.
    known_failure_modes:
    - Appendix verifier prompt checks final-answer agreement and guessed/vague answers despite main-text language about intermediate-step verification.
    - Terminal outcome backup can mark flawed intermediate steps as valuable when the final answer is correct.
    - A zero-score node under sparse exploration can reflect insufficient sampling rather than low quality.
    - Generator and verifier share Qwen2.5-72B and can share model-family/style errors.
    - Repeated judging continues until consensus without a disclosed hard cap.
    - Shared tree prefixes reduce training diversity; the paper identifies prefix repetition as unresolved.
    - The 30%+ result is limited to two math sets and specific token budgets.
    - The 3.9-point comparison includes Branch-DPO; plain FastMCTS SFT gains 2.9 points over RS SFT.
    - Experimental trees, rejected branches, failed trajectories, SFT/preference data, checkpoints and split manifests are not released.
    - Official repository declares no software or data license.
    - Chinese web-source provenance and inherited licensing are undisclosed.
