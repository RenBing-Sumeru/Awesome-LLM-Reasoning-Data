    pmlr: null
    cvf: null
    bibtex: null
  data_object:
    prompt_source: Approximately 15,000 mathematical query-problem pairs primarily from GSM8K and MATH, augmented with open process-reward data from MathShepherd and RLHFlow; PRM800k is excluded to reduce evaluation leakage.
    trace_author: OmegaPRM MCTS generates initial rollouts; DeepSeek-V3 judges full-trace agreement with proposed error steps; DeepSeek-R1-Distill-Qwen-32B writes detailed System-2 error explanations.
    answer_format: A problem and reasoning-step prefix paired either with a one-token `+` System-1 correctness target or a `<think>...</think>` System-2 explanation ending in a `+` or `-` verdict.
    process_fields:
      - problem
      - reasoning_step
      - prior_steps
      - omega_prm_error_hypothesis
      - full_trace_judge_agreement
      - system_1_or_system_2_mode
      - verification_explanation
      - verdict_token
      - first_error_step
    environment_or_substrate: OmegaPRM divide-and-conquer MCTS with UCB-style state selection, followed by full-trace judge filtering, class rebalancing and stepwise target synthesis.
    verifier_or_reward: DeepSeek-V3 confirms or contradicts OmegaPRM error assessments for filtering; the trained Dyve model emits stepwise binary verdicts with optional detailed reasoning.
    terminal_predicate: Retain a rollout when DeepSeek-V3 confirms its proposed error assessment; during Dyve training and inference, terminate a divergent sequence at the first step assigned or parsed as erroneous.
  recipe_metadata:
    base_model: DeepSeek-R1-Distill-Qwen-14B is the main Dyve base; Qwen2.5-14B, Qwen3-8B and Llama-3.1-8B variants are used in ablations.
    teacher: DeepSeek-V3 supplies trace-level consensus filtering and DeepSeek-R1-Distill-Qwen-32B supplies System-2 explanations and stepwise flagging.
    generator: OmegaPRM MCTS generates approximately 20 reasoning rollouts per source query.
    filtering_rule: Keep rollouts whose OmegaPRM error hypothesis is confirmed by DeepSeek-V3, discard contradictions, then rebalance correct and incorrect step examples before generating System-1/System-2 targets.
    sampling_protocol: Approximately 20 MCTS rollouts per query from 15K source problems. Exact temperatures, seeds, exploration constant, search limits and per-source allocation are not fully reported.
    rollout_count: 20
    temperature: null
    inference_budget: About 1.2 million noisy initial rollouts are reduced to approximately 117K curated traces in the paper; the current official HF train split contains 156,321 rows.
    optimizer_or_scaffold: Supervised next-token fine-tuning of DeepSeek-R1-Distill-Qwen-14B on mixed one-token System-1 targets and generative System-2 explanations; inference parses each verdict and halts on the first error.
  audit:
    source_mixture: GSM8K and MATH prompts plus MathShepherd and RLHFlow process-reward data, with OmegaPRM-generated rollouts and two DeepSeek-family teacher roles.
    split: PRM800k is excluded to reduce ProcessBench leakage, but exact source splits, semantic overlap checks and released train/evaluation manifests are not fully disclosed.
    decontamination: PRM800k is explicitly excluded; broader pretraining contamination and cross-source semantic deduplication are unknown.
    license: The released model card declares MIT. The official dataset page and GitHub repository do not display a license; the paper states that public datasets are used under their licenses but provides no consolidated inherited-license audit.
    lineage: GSM8K/MATH problems to OmegaPRM MCTS and imported MathShepherd/RLHFlow traces to 1.2M noisy rollouts to DeepSeek-V3 agreement filtering to positive/negative rebalancing to approximately 117K paper traces to DeepSeek-R1-32B System-2 target synthesis to SFT of a DeepSeek-R1-14B verifier; the current HF release exposes 156,321 rows.
    known_failure_modes:
      - DeepSeek-V3 agreement can preserve correlated judge errors and defines the hidden acceptance objective.
      - OmegaPRM error hypotheses and teacher explanations can share model-family or math-domain biases.
      - Removing about half of rollouts does not establish precision, recall or calibration of the retained labels.
      - The rebalancing target and sampling rule are not quantified, obscuring how natural error prevalence is altered.
      - Paper and release counts differ: approximately 117K curated traces versus 156,321 current HF rows, with no version reconciliation.
      - A top-level dataset license is absent, and inherited rights from GSM8K, MATH, MathShepherd, RLHFlow and generated outputs are not consolidated.
      - PRM800k exclusion addresses one leakage route but does not establish full decontamination against ProcessBench or base-model pretraining.
      - Detailed MCTS settings, decoding temperatures, seeds, teacher prompts and immutable revisions are incomplete.
      - Rejected rollouts, judge disagreements and filtering logs are not exposed by the release pages checked.
      - System-2 explanations may be plausible post-hoc rationales rather than faithful error localization.
      - The first-error stopping format omits supervision for downstream steps after a detected error.
      - Paper evaluations are mathematics-centric, so cross-domain process-verifier transfer is unknown.
    citation_status: verified
    confidence: high
    notes: ACL paper, arXiv, official GitHub, HF data and HF model were checked on 2026-07-11. Artifacts exist, but release count/version reconciliation and dataset/code licensing remain unresolved.
  inclusion_reason: Dyve provides an open, concrete recipe for converting noisy MCTS rollouts into adaptive step-level verifier supervision through full-trace consensus filtering, rebalancing and teacher-generated error explanations.
