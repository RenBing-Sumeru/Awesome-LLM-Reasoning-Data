    generator: The RLT receives a question plus known solution and generates connect-the-dots reasoning explanations; explanation tokens are extracted and combined with the known solution as student SFT examples.
    filtering_rule: Required tags and format are rewarded with a format penalty for violations; student solution likelihood and explanation KL determine ranking during GRPO. The paper reports using raw RLT outputs for distillation rather than correctness rejection sampling.
    sampling_protocol: GRPO group size 64, generation temperature 0.7, top-p 1.0, no top-k, min-p 0.0, repetition penalty 1.0, and maximum generation context 16384.
