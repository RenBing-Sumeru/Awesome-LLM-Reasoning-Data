    environment_or_substrate: Z3 first-order-logic checking and Isabelle/HOL theorem proving. Isabelle syntax is checked with sorry placeholders and each target step is verified while other proof steps are replaced by sorry.
    verifier_or_reward: Z3 or Isabelle emits binary correctness per formal step. The trained PRM predicts correct/incorrect tokens and their normalized logits become step-level reward scores.
    terminal_predicate: A formal-logic conclusion is entailed by permitted premises and preceding results under Z3, or Isabelle accepts the target proof step in the generated theorem environment. This establishes formal validity relative to the constructed formal problem, not semantic fidelity to the source text.
  recipe_metadata:
    base_model: meta-llama/Llama-3.1-8B-Instruct and Qwen/Qwen2.5-7B-Instruct as trace generators and PRM backbones.
    teacher: No human or LLM teacher supplies error labels; Z3 and Isabelle provide programmatic labels while Llama and Qwen generate candidate traces.
    generator: Few-shot prompts elicit verifier-compatible formal solutions; the pipeline retries until syntactically valid and then applies step-level Z3/Isabelle wrappers.
    filtering_rule: Remove syntactically invalid solutions, exclude assump-style FLDx2 cases, retain logically incorrect but syntactically valid steps with false labels, and truncate traces so the final supervised step is balanced.
    sampling_protocol: The paper reports 10K Llama formal-logic, 10K Qwen formal-logic, and 20K Qwen theorem-proving steps. Retry counts, acceptance rates and production decoding settings are undisclosed.
    rollout_count: null
    temperature: null
    inference_budget: Z3 checks each logical step and Isabelle runs once per theorem step; total prover runtime, timeout policy, failed jobs and retry budget are not reported.
    optimizer_or_scaffold: Full-parameter LLaMA-Factory training with mask_history=true, one epoch, sequence cutoff 2048, AdamW and DeepSpeed ZeRO-3; only the final balanced label contributes to loss.
  audit:
    source_mixture: ACL Table 1 defines 10K Llama FLDx2/Z3, 10K Qwen FLDx2/Z3 and 20K Qwen GSM8K/MetaMathQA/Big-Math Isabelle steps. Official HF also exposes raw Llama formal-proof data and model-specific 40K sets whose cards describe a previous paper version, so exact alignment is partial.
    split: Each LastStepBalanced release has one 40K train split; four raw releases each have train 10K, validation 360 and test 360. Hyperparameter-selection tasks are external Orca-Math/BBH data, not a documented FOVER-40K split.
    decontamination: unknown
    license: Official project license releases datasets under CC BY 4.0 and code under Apache-2.0; PRM models follow Qwen or Llama base licenses. Upstream compatibility is not discussed in detail.
    lineage: Source problem to verifier-compatible formal statement to Llama/Qwen trace to syntax filtering to per-step Z3/Isabelle verification to retained correct/incorrect labels to last-step balancing to PRM fine-tuning to Best-of-K scoring.
    known_failure_modes:
    - A generated Isabelle statement can misformalize the natural-language problem while still receiving formally correct labels.
    - Parser, type, tactic, timeout, dependency or prover-environment failures may be mapped to Boolean labels without an error-type field or prover log.
    - Isabelle independent-step verification replaces other steps with sorry and can miss dependency-chain or scoping errors.
    - The Z3 wrapper excludes proof-by-contradiction cases, narrowing the formal-reasoning distribution.
    - Only the final target label is balanced and used for loss; intermediate error labels are not demonstrated to be balanced or calibrated.
    - Invalid-format generations are filtered without released attempts, rejection reasons, retry counts or diagnostics.
    - No decontamination analysis is reported despite related math/logic evaluation domains.
    - Formal-to-informal transfer is based on limited Best-of-7 experiments and is not uniformly positive across every benchmark.
    - Official dataset cards reference a previous paper version and variants differ from ACL Table 1, leaving version alignment partial.
