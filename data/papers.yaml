  data_object:
    prompt_source: Competitive-programming questions collected from TACO, APPS, CodeContests, and OpenR1 CodeForces / CodeForces-derived sources, with exact-match deduplication.
    trace_author: DeepSeek-R1 generates reasoning traces and code solutions.
    answer_format: Python competitive-programming response with reasoning trace, final code block, and extracted solution code.
    process_fields:
    - id
    - input
    - output
    - solution
    - dataset
    - split
    - source
    - license
    - difficulty
    - index
    environment_or_substrate: Offline SFT corpus for competitive-programming code reasoning; unit-test/code-execution substrate is used in ablations and benchmark evaluation.
    verifier_or_reward: Format filters for reasoning traces and code blocks, Tree-sitter syntax parsing, benchmark-contamination checks with embedding similarity plus LLM/manual review, and unit-test execution for CodeContests ablation; final release is not strictly execution-filtered.
    terminal_predicate: A retained sample passes post-processing format/syntax checks; benchmark performance is measured by code-generation pass@1 on external coding benchmarks.
  recipe_metadata:
    base_model: Qwen2.5-Instruct student models reported in the paper.
    teacher: DeepSeek-R1.
    generator: DeepSeek-R1 generations served through SGLang.
    filtering_rule: Exact-match deduplication; benchmark-contamination screening; require reasoning trace tags and code block; remove samples with code blocks inside reasoning traces; parse generated code with Tree-sitter. Unit-test filtering was studied but not used as the main final-selection rule.
    sampling_protocol: Multiple DeepSeek-R1 solutions per question; primarily Python; nucleus sampling with temperature 0.6 and top-p 0.95; explicit reasoning-tag prompting.
    rollout_count: null
    temperature: 0.6
    inference_budget: Maximum output sequence length of 16k tokens.
    optimizer_or_scaffold: Supervised fine-tuning pipeline using the released OpenCodeReasoning data and NVIDIA NeMo-Skills.
  audit:
    source_mixture: Mixture of public competitive-programming datasets/sources; Hugging Face release records dataset/source/license/difficulty fields.
    split: HF release has split_0 and split_1; dataset card states CodeContests and OpenR1 CodeForces test splits are excluded.
    decontamination: Paper reports exact-match deduplication and benchmark-contamination screening using cosine similarity threshold 0.7, Llama-3.3-70B-Instruct and Qwen2.5-32B-Instruct judges, plus manual inspection.
    license: HF dataset card lists CC-BY-4.0 for the release, while warning users to check each underlying source dataset license.
    lineage: Questions come from public competitive-programming sources; responses are generated by DeepSeek-R1; pipeline link points to NVIDIA NeMo-Skills.
    known_failure_modes:
    - Syntax-valid code is not necessarily semantically correct.
    - Final release is not guaranteed to contain only unit-test-passing solutions.
    - Incorrect teacher solutions may still transfer useful patterns but can also teach wrong reasoning.
    - Benchmark contamination checks may miss semantic overlap.
    - Underlying source licenses and split provenance need per-source review.
    - Paper reports 736,712 Python samples after refinement, while the HF dataset card lists 735,255 samples; pin release version during curation.
