    confidence: medium
    notes: ACL paper, metadata, official GitHub/project, author HF datasets/models, schemas, licenses and configs were checked on 2026-07-10. Release-version alignment, rejected traces, construction budget, decontamination and prover failure taxonomy remain unresolved.
