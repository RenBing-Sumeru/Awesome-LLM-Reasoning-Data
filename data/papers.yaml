  data_object:
    prompt_source: Sixteen benchmarks spanning mathematics, general reasoning, knowledge and science are evaluated through OpenCompass; the paper lists GSM8K, MATH, AIME2024, BBH, GaokaoBench, HLE, KorBench, GPQA, SimpleQA, ChineseSimpleQA, MMLU-Pro, ARC, OlympiadBench, TheoremQA, NuminaMath and DROP.
    trace_author: Responses from 53 commercial, open and reasoning model variants form the collection pool; DeepSeek-V3 additionally filters problematic cases and generates targeted augmentation data.
    answer_format: 'A question, reference answer and model response paired with a ternary verification judgment: Correct, Incorrect or Invalid; some annotations include detailed judgment rationales.'
    process_fields:
      - question
      - gold_answer
      - llm_response
      - gold_judgment
      - data_source
      - domain
      - answer_type
      - judgment_rationale
      - meta_error_pattern
    environment_or_substrate: OpenCompass generates and aggregates more than 1.325 million source responses; successive model voting, prompt voting, filtering, deduplication and expert adjudication produce benchmark and training pools.
    verifier_or_reward: CompassVerifier compares a candidate response against a question and reference answer and emits A/Correct, B/Incorrect or C/Invalid; binary reward experiments merge B and C as incorrect.
    terminal_predicate: For RL evaluation, a CompassVerifier judgment determines the outcome reward; for corpus construction, consensus cases populate training data while disputed high-value cases receive human adjudication and test-set selection.
  recipe_metadata:
    base_model: Qwen-series causal language models released at 3B, 7B and 32B scales; the exact base checkpoint for each variant should be read from its model card.
    teacher: DeepSeek-V3 is used for problematic-case filtering, answer-type classification, complex-formula work and targeted synthetic augmentation; multiple verifier models and human experts supply other labels.
    generator: Fifty-three model variants generate the original response pool, while DeepSeek-V3 generates targeted adversarial and formula augmentation examples.
    filtering_rule: Apply multi-expert voting, multi-prompt voting and selected dataset-specific prompts; remove easy consensus from the benchmark, string-deduplicate responses, filter open-ended/proof/incomplete-reference cases, human-label disputes, similarity-filter excess Incorrect cases, and keep train/test disjoint.
    sampling_protocol: The source response pool is collected with dataset- and model-specific OpenCompass configurations. Exact decoding settings and seeds for all 53 models are not consolidated in the paper.
    rollout_count: null
    temperature: null
    inference_budget: More than 1.325 million collected responses are reduced to a 2,817-row paper test set; the released HF viewer reports approximately 2.82k test rows.
    optimizer_or_scaffold: 'CompassVerifier training uses 96,832 examples: 54,420 base consensus samples, 24,294 error-driven adversarial samples and 18,118 complex-formula samples. A separate reward experiment applies GRPO to Qwen3-4B-Base on a filtered Open-S1 subset.'
  audit:
    source_mixture: Sixteen upstream benchmarks and 53 response-generating model variants with heterogeneous formats, languages, licenses and generation settings.
    split: The paper states that VerifierBench test and CompassVerifier training sets do not overlap; the released HF artifact exposes a test split of about 2.82k rows, while the full 96,832-example verifier training corpus release status is not clearly documented.
    decontamination: Train/test overlap is explicitly checked at the paper's dataset level, but cross-source semantic deduplication, source-model pretraining contamination and external benchmark leakage are unknown.
    license: Repository code is Apache-2.0; the released VerifierBench dataset card declares CC-BY-SA-4.0; the ACL paper is CC BY 4.0. Compatibility and inherited rights across all upstream questions, references and model outputs are not fully audited.
    lineage: Sixteen benchmark questions and references to 53-model OpenCompass responses to multi-model and multi-prompt judgments to deduplication/problem filtering to expert adjudication and error-pattern analysis to a 2,817-row benchmark; consensus training data plus DeepSeek-V3 adversarial/formula augmentation yields the 96,832-example verifier corpus and three released checkpoints.
    known_failure_modes:
      - Correlated model judges can turn consensus into confidently wrong labels, especially when prompts or model families share biases.
      - DeepSeek-V3 is used for filtering, answer-type classification and synthesis, concentrating hidden-objective and teacher-provenance risk.
      - Human reviewers report divergent penalty thresholds, so Correct, Incorrect and Invalid boundaries may encode annotator policy rather than objective equivalence alone.
      - Removing proof, open-ended and ambiguous-threshold questions narrows coverage to reference-answer-verifiable tasks.
      - Some experiments collapse Invalid into Incorrect, losing the distinction between a wrong response and a flawed question/reference/trace.
      - String and similarity filters can preferentially remove repetitive invalid or incorrect modes and reshape the apparent label distribution.
      - The paper reports more than 30 meta patterns in one analysis and over 40 error categories in another without a single versioned taxonomy manifest.
      - Appendix A.8 says 224,294 synthetic adversarial examples in prose, but Table 13 and the reported total require 24,294; the larger count is treated as an unresolved typo.
      - The public dataset release exposes the 2,817-row benchmark, while release completeness for all training examples, rationales, votes, filter decisions and rejected records is unclear.
      - Decoding parameters, seeds and immutable model/API revisions are not consolidated across the 53-model source collection.
      - Upstream benchmark and generated-output license compatibility is not established by the dataset's top-level license alone.
    citation_status: verified
    confidence: high
    notes: ACL paper, official project, GitHub repository, VerifierBench dataset and HF model collection were checked on 2026-07-11. Core artifacts are released, but full training-corpus lineage and the Appendix A.8 count discrepancy remain audit blockers.
  inclusion_reason: CompassVerifier exposes a reusable outcome-verification data pipeline that combines large-scale response collection, staged model voting, expert adjudication, meta-error-driven synthesis and released benchmark/checkpoints for filtering reasoning outputs and supplying RL rewards.
