    bibtex: null
  data_object:
    prompt_source: Few-shot reverse-question-answering seeds from GSM8K and MATH, concentrating on problem solving, algebra, and counting and probability.
    trace_author: GPT-4o and chatgpt-4o-latest generate two candidate solutions per synthetic question; GPT-4o formalises questions and answers and performs auto-informalisation/alignment checks.
    answer_format: A synthetic mathematical question with two natural-language step-by-step solutions, corresponding Lean formalisation attempts, step-level theorem-prover outcomes, and either an SFT target or verified-versus-false DPO pair.
    process_fields:
      - source_domain
      - synthetic_question
      - candidate_solution_a
      - candidate_solution_b
      - question_formalisation
      - auto_informalisation
      - alignment_check
      - answer_formalisation_steps
      - lean_execution_output
      - retry_history
      - verified_false_or_error
      - sft_or_dpo_allocation
    environment_or_substrate: Lean theorem proving with CoMAT question conversion, GPT-4o autoformalisation, reverse translation and alignment checking, plus iterative correction from Lean execution errors.
    verifier_or_reward: Lean validates every formalised reasoning step. Fully verified traces are positive; refuted steps produce False; execution failures produce Error and trigger up to five autoformalisation retries.
    terminal_predicate: Two verified candidate answers enter SFT; a verified/false pair enters DPO; two false answers are disposed; unresolved formalisation errors after retries do not become verified data.
  recipe_metadata:
    base_model: RLTPF experiments cover Llama-2-7B-chat-hf, Llama-3.2-3B-Instruct, Llama-3.1-8B-Instruct, OLMo-2-1124-7B-Instruct and Mistral-7B-Instruct-v0.3 with LoRA.
    teacher: GPT-4o and chatgpt-4o-latest generate answers; GPT-4o performs autoformalisation, auto-informalisation and alignment checking; Lean provides executable verification feedback.
    generator: Reverse question answering generates questions from GSM8K/MATH few-shot solutions, followed by two model-generated answers per retained question.
    filtering_rule: Reject question formalisations that fail round-trip alignment; classify answer proofs as Verified, False or Error; retry Error up to five times; route Verified/Verified to SFT, Verified/False to DPO and False/False to disposal.
    sampling_protocol: Questions are few-shot, answers zero-shot, and formalisation uses domain-specific 10-shot, 8-shot or 6-shot prompts. Generation is greedy at temperature 0.0 with 3,500 maximum tokens.
    rollout_count: 2
    temperature: 0.0
    inference_budget: Maximum five iterative autoformalisation retries per answer formalisation; dataset-generation cost is reported as approximately $0.60 per sample but varies with retry count.
    optimizer_or_scaffold: One epoch of LoRA SFT on 2,562 verified examples followed by three DPO epochs on 473 verified-versus-false pairs; effective batch 64, RMSprop, learning rate 3e-5, seed 42 and DPO beta 0.1.
  audit:
    source_mixture: GSM8K- and MATH-derived synthetic questions across arithmetic/problem solving, algebra, counting/probability and a small Others category, with two GPT-family response generators and Lean verification.
    split: SIMQA contains 1,876 GSM8K-derived and 1,632 MATH-derived responses allocated into 2,562 SFT examples and 473 DPO pairs; exact source-row and evaluation-overlap manifests are not released.
    decontamination: unknown
    license: The ACL paper is CC BY 4.0. The paper-linked GitHub repository is currently unavailable, so code/data licensing and inherited GSM8K/MATH rights cannot be verified.
    lineage: GSM8K/MATH few-shot solution to reverse-generated question to CoMAT symbolic form to Lean question formalisation to GPT-4o auto-informalisation/alignment check to two generated solutions to stepwise Lean formalisation and iterative error correction to Verified/False/Error outcomes to SFT/DPO/disposal allocation to RLTPF model training.
    known_failure_modes:
      - Lean execution certifies the generated formal statement, not necessarily faithful alignment with the original natural-language question or reasoning intent.
      - GPT-4o performs both formalisation and round-trip alignment checks, creating correlated self-validation risk.
      - Execution Error is distinct from mathematical False; retry and eventual exclusion can bias the corpus toward easier-to-formalise questions.
      - Although execution improves from 60% to 87%, unresolved autoformalisation failures remain and do not establish semantic correctness.
      - Two False responses are disposed, so useful negative traces and failure diversity are lost from training.
      - The generated dataset is limited to 3,508 responses and a narrow set of mathematical subdomains.
      - Problem difficulty is capped by the generators' ability to solve and formalise their own synthetic questions.
      - Retry count increases with sequence length and incurs substantial API/verification cost.
      - Exact GPT model snapshots, prompts, Lean environment/library revision and source-row lineage are not consolidated in an immutable manifest.
      - The official code URL cited by the paper returned 404 on 2026-07-11; SIMQA data, proofs, retry logs and trained checkpoints could not be verified as public releases.
      - No pretraining decontamination or inherited-license audit is reported.
      - The DPO preference contract treats Lean-verified output as preferred, but formalisation artifacts can confound preference quality.
    citation_status: verified
    confidence: high
    notes: ACL, DOI and arXiv were verified on 2026-07-11. The paper's official GitHub URL is retained for provenance but currently returns 404; no accessible data/model release was confirmed.
