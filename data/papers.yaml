  data_object:
    prompt_source: The MATH training split supplies 7.5K seed question-solution pairs. GRIP extracts up to five key concepts per seed, consolidates them to about 10K concepts, and builds a graph whose explicit and implicit concept relationships drive synthesis without placing the seed question itself in the synthesis prompt.
    trace_author: Qwen2.5-32B synthesizes new questions from selected key-concept combinations. Qwen2.5-Math-7B generates solutions for low- and medium-difficulty questions, while Qwen2.5-Math-72B generates solutions for high-difficulty questions.
    answer_format: GRIP-MATH is described as 2.1 million mathematical question-solution pairs with natural-language derivations. A downloadable dataset schema is unavailable from the checked official sources.
    process_fields:
    - seed_question
    - extracted_key_concepts
    - concept_cluster
    - graph_relationship_type
    - synthesized_question
    - assigned_difficulty
    - synthesized_solution
    - problem_quality_scores
    - solution_quality_votes
    environment_or_substrate: A Key Concepts Relationship Graph connects co-occurring concepts with explicit edges and derives two-hop, three-hop and community combinations for synthesis. The reported implementation used vLLM and eight A100 GPUs for 36 hours.
    verifier_or_reward: DeepSeek-R1-Distill-Qwen-7B, Qwen2.5-Math-Instruct-7B and DeepSeek-Math-RL score each generated question and solution. Problem scores are weighted by model mathematical ability and must reach 0.85; solutions are retained only when all three models assign a binary score of 1.
    terminal_predicate: 'A pair enters GRIP-MATH when its weighted question-quality score is at least 0.85 and every evaluation model accepts the solution as mathematically correct and complete.'
  recipe_metadata:
    base_model: Qwen1.5-7B, Mistral-7B, Llama-3-8B, Llama-3.1-8B, Qwen2-1.5B and Qwen2-7B are separately fine-tuned on GRIP-MATH for evaluation.
    teacher: Qwen2.5-32B extracts concepts and synthesizes questions; Qwen2.5-7B and an embedding model filter and consolidate concepts; Qwen2.5-Math-7B and Qwen2.5-Math-72B generate solutions; three open mathematical models jointly evaluate outputs.
    generator: Qwen2.5-32B generates problems from one-hop, two-hop, three-hop or community concept combinations. A rating model assigns difficulty before a 7B or 72B Qwen2.5-Math model generates the solution.
    filtering_rule: Vague, incorrect and overly detailed concepts are removed. Embedding similarity of 0.90-1.0 groups concepts directly, 0.70-0.90 triggers LLM synonym review, and below 0.70 remains distinct. Low-weight three-hop relations are removed. Problems below weighted score 0.85 and any solution rejected by one evaluator are discarded.
    sampling_protocol: Concept combinations are enumerated from explicit one-hop, implicit two-hop and hub-centered three-hop paths plus fully connected communities of three or four concepts. Exact decoding parameters and the number of raw candidates are undisclosed.
    rollout_count: unknown
    temperature: unknown
    inference_budget: Eight A100 GPUs for about 36 hours are reported for synthesizing and scoring roughly 2.1 million records. Token limits, sampling temperature, top-p and retry counts are unknown.
    optimizer_or_scaffold: Downstream supervised fine-tuning uses LLaMAFactory. Exact synthesis scripts, graph-building implementation and full training configurations are not available through a verified official code release.
  audit:
    source_mixture: All seed problems come from the 7.5K-example MATH training split; the final corpus is entirely synthetic mathematical question-solution pairs generated from concept combinations derived from those seeds.
    split: The paper reports a 2.1M GRIP-MATH training corpus but does not document a public train-validation-test manifest or downloadable release split.
    decontamination: The paper analyzes embedding similarity to MATH seeds and reports novel concept-combination statistics, but no systematic overlap audit against GSM8K, MATH test, GAOKAO-Eval, SVAMP, ARC-C, MMLU, GPQA, BBH, TheoremQA, MBPP or C-Eval is reported.
    license: unknown
    lineage: MATH train questions to Qwen2.5-32B concept extraction to Qwen2.5-7B plus embedding consolidation to a roughly 10K-node relationship graph to concept-combination selection to Qwen2.5-32B question synthesis to difficulty assignment to Qwen2.5-Math solution generation to three-model question scoring and unanimous solution filtering to the reported 2.1M GRIP-MATH corpus.
    known_failure_modes:
    - All concepts originate from MATH, so graph recombination can broaden combinations while preserving the seed corpus's topical and stylistic biases.
    - Embedding thresholds and LLM concept consolidation can incorrectly merge distinct concepts or retain synonymous duplicates.
    - Implicit graph proximity is not proof that a concept combination defines a coherent or solvable mathematical problem.
    - Question and solution acceptance relies on correlated open mathematical models, allowing shared misconceptions or stylistic preferences to survive unanimous filtering.
    - Natural-language model voting does not provide executable, symbolic or formal verification of the generated derivations.
    - The paper reports no held-out benchmark decontamination, despite training and evaluation both involving common mathematical benchmark families.
    - No downloadable dataset, code, immutable revision, schema, rejected candidates or model checkpoints were verified from official sources.
    - The MATH seed license, generated-data license and downstream redistribution terms are not stated in the verified release artifacts.
    citation_status: verified
    confidence: medium
    notes: NeurIPS proceedings, the full official paper, supplemental material, arXiv 2412.08864 and OpenReview record were checked on 2026-07-11. The paper checklist states that code will be released, but no verified official code, dataset, project or Hugging Face artifact was found; those links remain null.
  inclusion_reason: GRIP is a high-value Track 8 construction recipe because it turns a small reasoning seed set into a graph of reusable concepts, explicitly separates relationship-driven question synthesis from solution generation, and exposes multi-model thresholds for selecting 2.1M training pairs.
