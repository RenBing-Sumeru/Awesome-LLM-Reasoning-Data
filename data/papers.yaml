  data_object:
    prompt_source: Formal-logic entailment problems from FLDx2 and formalized GSM8K-level math problems from GSM8K, MetaMathQA, and Big-Math. FLDx2 cases involving assump-style proof by contradiction are excluded.
    trace_author: Llama 3.1 8B and Qwen 2.5 7B generate formal-logic traces; Qwen 2.5 7B generates Isabelle-compatible statements and proofs.
    answer_format: Each record contains a formal problem, ordered solution_steps, aligned Boolean error_labels, conversation-form training/prediction representations, base_dataset, and task-specific formula metadata.
