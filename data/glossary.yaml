[
  {
    "term": "post-training",
    "definition": "Training or adaptation performed after pretraining, including SFT, distillation, preference learning, reward modeling, process supervision, RLVR, and agent training."
  },
  {
    "term": "reasoning data",
    "definition": "Training or evaluation records intended to teach, shape, reinforce, or audit reasoning behavior."
  },
  {
    "term": "verifier-bearing sample",
    "definition": "A data item that pairs a task and model behavior with feedback from a checker, reward, judge, rubric, or environment predicate."
  },
  {
    "term": "feedback interface",
    "definition": "The boundary where behavior becomes trainable or auditable through a label, checker, reward, judge, or environment."
  },
  {
    "term": "verification contract",
    "definition": "The rules defining what can be checked, at what granularity, and with which failure modes."
  },
  {
    "term": "terminal predicate",
    "definition": "An environment-level condition used to decide whether an agent trajectory succeeded."
  },
  {
    "term": "lineage",
    "definition": "Metadata about source corpus, teacher, generator, decoding policy, verifier, filter, split, and reuse path."
  },
  {
    "term": "pass-rate band",
    "definition": "A base-model- and sampling-protocol-dependent estimate of how often a prompt is solved."
  },
  {
    "term": "release card",
    "definition": "A structured report describing what was released, how it was built, how it was verified, and what remains missing."
  }
