- id: foundations_instruction_preference_alignment
  order: 1
  emoji: 🧱
  title: 'Foundations: Instruction, Preference, and Alignment Data'
  file: 01_foundations_instruction_preference_alignment.md
  summary: 'The older data objects that reasoning-data work inherits: instruction mixtures, demonstrations, preferences, reward
    models, self-improvement traces, and chain-of-thought prompting.'
  reader_promise: Read this category to understand how prompt-answer examples became richer feedback records with preferences,
    rationales, rubrics, and reward surfaces.
  why:
  - Reasoning-data papers make more sense when you can see their older ancestry. InstructGPT, FLAN, T0, Self-Instruct, helpful-harmless
    RLHF, Constitutional AI, UltraFeedback, and DPO all shaped the habit of treating post-training data as a deliberately
    constructed behavior signal. They did not solve verifier-bearing reasoning data by themselves, but they taught the field
    how to collect demonstrations, compare outputs, train reward models, and tune a model after pretraining.
  - The foundation category is especially useful for spotting what changed. A preference pair says one answer is better than
    another; a programmatic verifier can often say whether a final answer satisfies a predicate; a process label can identify
    the first faulty step; an agent trajectory can attach feedback to a state-action episode. Reasoning data inherits the
    engineering discipline of alignment data, then adds stronger structure around trace, verifier, environment, and terminal
    condition.
  - Practitioners should read these papers with a data-schema eye. Ask what the prompt source is, who authored the target
    behavior, what form the feedback takes, whether the reward can be gamed, and how the training objective consumes the record.
    The same questions apply later to RLVR and process reward models, but the answers become more domain-specific and easier
    to audit when a verifier or environment is explicit.
  - 'This page also guards against a common historical mistake: treating chain-of-thought, self-consistency, STaR, and distillation
    as just prompting tricks. They are also data-construction ideas. They show how intermediate text can be generated, filtered,
    reused, and trained against, which is exactly the habit that later open reasoning-data recipes make explicit.'
  how_to_read:
  - 'Identify the data object: demonstration, preference pair, constitutional critique, explanation trace, reward-model comparison,
    or self-generated instruction.'
  - 'Ask what supervision signal is trainable and where it enters the objective: SFT target, pairwise preference, scalar reward,
    critique, or rationale.'
  - Separate helpfulness/safety alignment from verifier-bearing reasoning claims; older alignment wins do not automatically
    imply better math/code reasoning.
  - Watch for reward overoptimization, annotation ambiguity, and hidden source mixtures that make later reuse difficult.
  starter_match:
  - Training language models to follow instructions
  - Deep reinforcement learning from human preferences
  - Training a helpful and harmless assistant
  - Constitutional AI
  - Direct preference optimization
  - Scaling laws for reward model overoptimization
  - UltraFeedback
  - Self-Instruct
  - Chain-of-thought
  - STaR
  - Self-consistency
  - Distilling step-by-step
