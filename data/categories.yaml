- id: frontier_model_reports
  order: 7
  emoji: 🚀
  title: Frontier Reasoning Model Reports
  file: 07_frontier_model_reports.md
  summary: Public reasoning-model reports and open-weight model reports that disclose post-training data, reward stacks, scaling
    choices, or evaluation design.
  reader_promise: Use this page to read frontier reports as data disclosures rather than only model announcements.
  why:
  - 'Frontier reasoning reports are often the first place new post-training patterns become visible. They may not publish
    all data, but they reveal enough to shape the field: RLVR on verifiable tasks, long chain-of-thought behavior, distillation
    from stronger teachers, reward-model stacks, rejection sampling, self-play, inference-budget scaling, and benchmark suites.
    A data atlas reads these reports for their pipeline clues, not just their headline scores.'
  - This category includes OpenAI o1 and o3/o4-mini context, DeepSeek-R1, DeepSeekMath, DeepSeek-V3.2 when relevant, Kimi
    k1.5, Kimi K2, Qwen3, Qwen3-Coder if locally added later, Magistral, Phi-4-reasoning, Llama-Nemotron, MiniMax-M1, Skywork-OR1,
    OpenReasoner-Zero, AM-Thinking-v1, rStar2-Agent, and related model reports. Some are verified in local metadata; others
    are BibTeX seeds requiring link search or curator review.
  - Practitioners should look for disclosure granularity. Does the report identify task domains, data sources, reward types,
    verifier classes, teacher models, sampling budgets, safety filters, and decontamination? Does it separate SFT, distillation,
    RL, and test-time compute? Does it show ablations that tie data design to capability rather than only presenting final
    benchmark numbers? Those answers decide how much the report can teach a builder.
  - The key caveat is opacity. Many frontier reports are necessarily partial. This page therefore treats model reports as
    signals to triangulate with open recipes, benchmarks, and audit papers. If an entry lacks an official link in local data,
    it is kept as a `needs_search` candidate rather than linked to a guessed blog, model card, or repository.
  how_to_read:
  - 'Extract the post-training stack: SFT, distillation, preference tuning, RLVR, process rewards, safety tuning, and test-time
    compute.'
  - Separate data disclosure from evaluation disclosure; a report can be strong on one and weak on the other.
  - 'Track which artifacts are public: paper, model weights, datasets, training code, eval code, safety cards, or only a technical
    report.'
  - Avoid treating a frontier report as a reproducible recipe unless it exposes enough pipeline and source metadata.
