- id: scaling_test_time_compute_rlvr
  order: 8
  emoji: 📈
  title: Scaling, Test-Time Compute, and RLVR
  file: 08_scaling_test_time_compute_rlvr.md
  summary: RLVR scaling, data reuse, distillation scaling, pass@k/pass@(k,T), inference budget, search topology, and test-time
    reinforcement.
  reader_promise: Use this page to separate scaling claims into data size, model size, RL compute, inference budget, search,
    and verifier reliability.
  why:
  - Scaling papers turn reasoning-data design into a budget question. How many unique prompts are needed? How many rollouts
    per prompt? How much inference compute should be spent before training? When does repeated sampling beat better data?
    When does RLVR produce general reasoning and when does it exploit verifier shortcuts? These papers are valuable because
    they expose axes that model-report leaderboards often compress into one number.
  - This category includes Large Language Monkeys, s1, Kimi k1.5, The Art of Scaling Reinforcement Learning Compute for LLMs,
    Scaling Behaviors of LLM RL Post-Training, Distillation Scaling Laws, pass@k and pass@(k,T) work, CoT-Pass@K, Markovian
    Thinker, TTRL, entropy and clipping studies, DAPO, DeepScaleR, one-shot RLVR, data reuse papers, and RLVR audit studies.
    Some are verified; many are local seeds that need link review.
  - 'Practitioners should read every scaling curve as a measurement design. What exactly is on the x-axis: tokens, examples,
    rollouts, unique tasks, optimizer steps, model size, inference calls, search depth, or wall-clock compute? What is held
    fixed? Is the verifier stable across the scale sweep? Are public benchmarks contaminated or refreshed? Are failures reported
    or only successful runs? Without those details, a scaling law can become a storytelling device.'
  - This page connects scaling to construction and audit because the axes are inseparable. A pass-rate filter changes data
    quality; a reward function changes which behaviors are selected; a test-time compute budget changes measured capability;
    a benchmark refresh changes the target. Treat scaling claims as ledger entries, not magic.
  how_to_read:
  - 'Identify the compute axis: training RL steps, rollout count, sample count, inference budget, search width/depth, or model
    size.'
  - Check whether the paper controls for data uniqueness, source overlap, verifier choice, and benchmark contamination.
  - 'Look for asymptote-versus-efficiency language: does more compute raise the ceiling or merely reach the same ceiling faster?'
  - Avoid comparing pass@k, majority vote, budget forcing, and RL training curves unless the evaluation protocol is aligned.
