- id: judgment_required_rubrics_safety_domain
  order: 5
  emoji: ⚖️
  title: Judgment-Required Rubrics, Safety, Medical, and Domain Data
  file: 05_judgment_required_rubrics_safety_domain.md
  summary: Rubric rewards, health and safety benchmarks, factuality, legal/finance/science data, and LLM-as-judge systems
    where correctness cannot be reduced to a cheap programmatic predicate.
  reader_promise: Use this page when the answer needs expert judgment, calibrated uncertainty, policy interpretation, or rubric-grounded
    scoring rather than a single executable check.
  why:
  - Not every reasoning task has a unit test or exact answer. Medical reasoning may require clinical nuance, evidence use,
    and refusal behavior. Safety work may require taxonomy labels and policy-grounded judgments. Legal and financial tasks
    often need document interpretation and citation. Factuality and hallucination benchmarks demand source attribution. Rubric
    reward models try to turn this messy judgment into trainable feedback without pretending it is programmatic verification.
  - This category collects HealthBench, FaithBench, Aegis2.0, WildGuard, HarmBench, AbstentionBench, Safety Through Reasoning,
    RewardBench, JudgeLM, Prometheus 2, Rubrics as Rewards, OnlineRubrics, Omni-RRM, AutoRubric, Rubric-ARM, R3, FinanceBench,
    FinQA, TAT-QA, LegalBench, CUAD, CaseHOLD, ContractNLI, PubMedQA, BioASQ, SciFact, GPQA, HLE, ChemBench, LAB-Bench, and
    related domain benchmarks. The common thread is not the domain; it is the need to document the judging contract.
  - For a builder, the practical question is how a rubric becomes data. Does the record include the rubric text, annotator
    expertise, pairwise comparison, scalar score, evidence span, refusal label, risk taxonomy, or judge prompt? Can the same
    rubric be applied consistently across model families? Does the dataset separate training, validation, and public leaderboard
    use? Are sensitive domains licensed and documented well enough for reuse? These details decide whether judgment-required
    data is a stable reward signal or a noisy leaderboard artifact.
  - The key trap is automation theater. An LLM judge can make a task look scalable, but a judge is another model with its
    own vulnerabilities. This page pairs rubric systems with judge-attack and reward-benchmark context elsewhere in the atlas
    so readers keep asking whether feedback is reliable, calibrated, and hard to game. Missing links stay marked as `needs_search`.
  how_to_read:
  - 'Identify the rubric or policy source: expert-written criteria, pairwise preferences, risk taxonomy, domain guideline,
    evidence requirement, or model-judge prompt.'
  - Check annotator expertise, disagreement handling, calibration, and whether examples include rationales or just scalar
    scores.
  - Separate evaluation-only benchmarks from data releases meant for reward modeling or safety alignment.
  - Avoid treating LLM-as-judge scores as ground truth without adversarial, bias, and one-token attack checks.
