- id: surveys_and_primers
  order: 0
  emoji: 🧭
  title: Surveys and Primers
  file: 00_surveys_and_primers.md
  summary: Orientation material for post-training, reasoning models, verifier-bearing data, contamination, and data-centric
    LLM practice.
  reader_promise: 'Use this page when you need the map before the terrain: vocabulary, taxonomies, recurring claims, and the
    major research lineages that make reasoning-data papers easier to read.'
  why:
  - Survey and primer papers are the atlas spine. A beginner can open a frontier reasoning report and see a blur of RLVR,
    pass-rate filters, reward heads, distillation, search, long chain-of-thought, and benchmark contamination. The survey
    layer slows that blur down. It separates the older instruction-following and preference-learning lineage from newer verifier-bearing
    reasoning-data records, then shows which ideas were inherited and which were genuinely new.
  - 'For practitioners, surveys are not passive background reading. They are a way to audit assumptions before committing
    data budget. A post-training team deciding between math RLVR, rubric rewards, or agent trajectories needs to know which
    supervision contracts can be automated, where human judgment remains expensive, and which evaluation claims are especially
    vulnerable to contamination. Good surveys also expose missing metadata fields: prompt source, trace author, verifier identity,
    decontamination rule, split policy, and training/evaluation overlap.'
  - 'The trap is to treat a survey as a substitute for the primary papers. Use it instead as a routing layer. Read the taxonomy,
    note the claims about scaling or data quality, then jump into the papers that define concrete records and verifiers. The
    most useful survey notes are operational: what counts as a reasoning data object, what failure modes repeat across domains,
    and what a release must disclose for another team to reproduce or safely reuse it.'
  - This category is intentionally broad. It includes general reasoning-model surveys, mid-training and post-training context,
    data documentation papers such as datasheets and data statements, and reproducibility or contamination analyses that teach
    how to read empirical claims. When a paper is locally indexed but lacks an official URL in `data/papers.yaml`, this page
    marks it as `needs_search` rather than inventing a link.
  how_to_read:
  - 'Extract the taxonomy first: what objects, feedback contracts, and training uses does the survey distinguish?'
  - 'Track what the survey treats as evidence: benchmark deltas, release metadata, verifier design, human annotation studies,
    or mechanistic analysis.'
  - Inspect whether the survey separates SFT traces, preference data, reward models, process labels, and RLVR trajectories
    instead of folding all post-training data together.
  - Avoid copying paper lists without checking recency, official links, and whether the cited work is a dataset, benchmark,
    model report, or commentary.
