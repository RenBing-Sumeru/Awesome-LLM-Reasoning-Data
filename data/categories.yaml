- id: benchmarks_evaluation
  order: 10
  emoji: 🧰
  title: Benchmarks and Evaluation Surfaces
  file: 10_benchmarks_evaluation.md
  summary: Math/code/live/agent/domain/process/reward benchmarks organized by what they measure and what feedback they can
    support.
  reader_promise: Use this page to tell evaluation surfaces apart from training data, and to understand when a benchmark can
    become a verifier, reward, or environment.
  why:
  - Benchmarks are not just scoreboards in a reasoning-data repository. They define task distributions, answer formats, hidden
    tests, judge prompts, and sometimes executable environments. A benchmark can become a filter for construction, a verifier
    for RLVR, a source of prompts, a reward-model evaluation suite, or a contamination risk. The same artifact can be useful
    and dangerous depending on how it is reused.
  - 'This category reorganizes overlapping papers by evaluation surface: math and code benchmarks such as GSM8K, MATH, FrontierMath,
    LiveCodeBench, BigCodeBench, HumanEval, APPS, SciCode, and KodCode; live and contamination-aware benchmarks such as LiveBench,
    LastingBench, HLE, GSM-Symbolic, and SWE-bench lifecycle work; agent benchmarks such as WebArena, BrowserGym, OSWorld,
    AndroidWorld, AppWorld, tau-bench, ToolSandbox, and The Agent Company; domain benchmarks such as HealthBench, FinanceBench,
    LegalBench, PubMedQA, BioASQ, GPQA, LAB-Bench, ChemBench, SciFact, and Qasper; and process/reward benchmarks such as PRMBench,
    ProcessBench, RewardBench, and MT-Bench.'
  - For practitioners, the key distinction is evaluation-only versus trainable feedback. A benchmark with hidden tests may
    evaluate code well but be hard to use as open training data. A public math benchmark may be excellent for history but
    risky for RLVR if it leaks into prompt sources. A domain benchmark can expose expert reasoning requirements, but the labels
    may be too expensive or ambiguous to turn into rewards. A live benchmark can improve contamination resistance while complicating
    reproducibility.
  - 'Read benchmark papers by writing down the surface: task source, answer type, judge/verifier, split, refresh policy, public
    artifacts, and known leakage risk. Then decide whether the benchmark belongs in training, validation, evaluation, or audit
    only. This page intentionally overlaps with every other category because evaluation is the mirror that reveals whether
    a data recipe actually worked.'
  how_to_read:
  - 'Identify what is being measured: final answer, executable code, proof validity, tool task success, expert judgment, process
    error, reward-model preference, or factuality.'
  - Check whether the benchmark exposes trainable artifacts or only evaluation prompts and labels.
  - Inspect public/private splits, benchmark refresh policy, contamination checks, and hidden-test availability.
  - Avoid using benchmark prompts as training data unless the atlas and paper clearly document the split and downstream evaluation
    risk.
