- id: audit_failure_contamination_verifier_attacks
  order: 9
  emoji: 🧯
  title: Audit, Failure, Contamination, and Verifier Attacks
  file: 09_audit_failure_contamination_verifier_attacks.md
  summary: CoT faithfulness, leakage, contamination, reward hacking, judge attacks, synthetic-data collapse, live benchmarks,
    and verifier robustness.
  reader_promise: 'Use this page as the hazard map for reasoning data: what can leak, what can be gamed, what can be contaminated,
    and what can silently fail.'
  why:
  - Reasoning data creates new failure surfaces because the feedback signal is often more structured and more trusted than
    ordinary labels. A verifier can be gamed. A judge can be attacked. A chain-of-thought can be unfaithful or leak private
    information. A benchmark can be contaminated at training time or even search time. Synthetic traces can transmit hidden
    traits. Data reuse can blur train/test boundaries. Audit papers make these hazards visible.
  - This category includes Language Models Don’t Always Say What They Think, Measuring Faithfulness in Chain-of-Thought Reasoning,
    GSM-Symbolic, Spurious Rewards, One Token to Fool LLM-as-a-Judge, Leaky Thoughts, Subliminal Learning, Search-Time Data
    Contamination, LastingBench, LiveBench, HLE, A Sober Look at Progress in Language Model Reasoning, verifier robustness
    studies, LLMs Gaming Verifiers, Imperfect Verifier Is Good Enough, model-collapse papers, soft contamination, and related
    diagnostics.
  - For practitioners, the audit lens should be active before data collection starts. If the final verifier can be exploited,
    log adversarial examples. If a benchmark might appear in prompt sources, record decontamination. If a rubric judge can
    be flipped by a token, test the judge before using it as a reward. If chain-of-thought is stored, check privacy and policy
    exposure. If synthetic data is recursively reused, track lineage and diversity.
  - 'The practical output of this category is an audit checklist: source lineage, split hygiene, verifier false positives,
    judge robustness, privacy leakage, benchmark refresh, reward hacking, and failure telemetry. Entries with missing official
    URLs remain marked as `needs_search`, because audit pages are especially vulnerable to citation drift and scary-sounding
    but unverified claims.'
  how_to_read:
  - 'Classify the failure: contamination, leakage, unfaithful trace, verifier false positive, judge attack, reward hacking,
    collapse, or benchmark drift.'
  - Check whether the paper demonstrates the failure on training data, evaluation data, search-time behavior, or deployed
    interaction.
  - Look for proposed mitigations and whether they are operational enough to add to a release checklist.
  - Avoid treating a negative result as universal unless the model family, domain, verifier, and evaluation protocol are clear.
