- id: environmental_agents_tools_web_swe
  order: 4
  emoji: 🌐
  title: Environmental Agent, Tool, Web, and SWE Trajectory Data
  file: 04_environmental_agents_tools_web_swe.md
  summary: Tool calls, browser tasks, app worlds, OS environments, repository-level software engineering, and replayable state-action
    episodes.
  reader_promise: 'Use this page to learn how an environment becomes a data source: observations, actions, tools, traces,
    tests, rewards, and replay metadata.'
  why:
  - Agent data turns reasoning from a static prompt-answer record into an interaction. A tool-using model chooses actions,
    receives observations, updates state, and eventually succeeds, fails, or asks for help. The environment is not decoration;
    it is the verifier-bearing substrate. In web tasks, it may be a browser state. In app and OS tasks, it may be a controllable
    software world. In repository-level SWE tasks, it may be a Git diff plus tests. The training record is often an episode,
    not a single completion.
  - 'This category collects the lineage from ReAct and Toolformer through ToolLLM, API-Bank, Gorilla, APIGen, BFCL, ToolSandbox,
    tau-bench, Mind2Web, WebLINX, BrowserGym, WebArena, VisualWebArena, WorkArena, OSWorld, AndroidWorld, AppWorld, OpenHands,
    SWE-bench, SWE-bench Verified, SWE-Gym, R2E-Gym, SWE-RL, SWE-smith, SWE-rebench, Terminal-Bench, and The Agent Company.
    The names vary, but the reusable questions are the same: what is the state, what actions are valid, what makes the task
    complete, and can the episode be replayed?'
  - For practitioners, environmental data is attractive because it produces realistic feedback and naturally supports reinforcement
    learning. It is also expensive and fragile. Simulators drift, APIs change, hidden tests leak, browser pages mutate, and
    a successful trajectory may contain accidental shortcuts. Good papers document environment versions, task generation,
    action spaces, termination predicates, failure labels, and whether the same tasks are used for training and evaluation.
  - Read the full list with an engineering lens. A benchmark can become a training environment only if it supports reproducible
    rollouts and sufficiently cheap verification. A dataset of tool-call demonstrations may be useful for SFT but weak for
    RL if the environment cannot execute the calls. The category pages mark missing official URLs as `needs_search` to avoid
    inventing repository links for fast-moving agent systems.
  how_to_read:
  - 'Write down the episode schema: observation, model state, action, tool/environment response, reward, terminal predicate,
    and replay metadata.'
  - Check whether tasks are static demonstrations, executable benchmarks, live environments, or generated training worlds.
  - Inspect decontamination and split policy carefully, especially for SWE tasks derived from public GitHub issues.
  - Avoid assuming agent benchmark success transfers to training usefulness unless the environment can be reset, replayed,
    and instrumented.
