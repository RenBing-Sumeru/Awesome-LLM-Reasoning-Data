- id: process_supervision_prm
  order: 3
  emoji: 🪜
  title: Process Supervision and Process Reward Models
  file: 03_process_supervision_prm.md
  summary: Step labels, rollout values, first-error localization, PRM datasets, process verifiers, and studies of when process
    rewards help or fail.
  reader_promise: Use this page to understand the move from final-answer feedback to intermediate feedback that can train,
    rank, or debug reasoning traces.
  why:
  - 'Process supervision asks a different question from outcome supervision. Instead of only asking whether the final answer
    is right, it asks where the reasoning path becomes reliable, uncertain, or wrong. That makes the data object richer: a
    prompt, a chain of steps, step-level labels or values, sometimes a first-error marker, and a reward model or verifier
    trained to score intermediate states. The extra structure is expensive, but it can make feedback denser and more diagnostic.'
  - 'The category begins with landmark human-labeled step data such as PRM800K / Let’s Verify Step by Step, then follows automated
    and semi-automated routes: Math-Shepherd-style rollout values, OmegaPRM, ProcessBench, PRMBench, Qwen2.5-Math-PRM, PRIME,
    PROF, and newer analyses that connect GRPO, outcome rewards, and process-like credit assignment. For code and tool tasks,
    process supervision can mean execution traces, first failing assertion, or partial credit for reaching a better state.'
  - Practitioners should be skeptical and precise. A process reward model can improve search, reranking, and training, but
    it can also reward plausible-looking steps, overfit annotation style, or disagree with the final verifier. A first-error
    label is not the same as a scalar reward; a rollout value is not the same as human step correctness; an implicit process
    signal in a policy-gradient method is not the same as a supervised PRM dataset. The page keeps those distinctions visible.
  - 'When local metadata lacks official links, entries stay in the curated list as `needs_search`. That is deliberate: process
    supervision has many fast-moving papers and near-duplicate names, so a clean atlas should mark uncertainty rather than
    promote a guessed repository or paper URL.'
  how_to_read:
  - 'Identify the label granularity: step correctness, first-error position, rollout value, process reward, scalar trace score,
    or implicit credit assignment.'
  - 'Ask who or what labels the step: human annotator, final-answer verifier, Monte Carlo rollouts, judge model, code executor,
    or theorem prover.'
  - Check whether the PRM is used for training, reranking, search, evaluation, or diagnosis; these uses have different failure
    modes.
  - Avoid equating a fluent chain-of-thought score with faithful reasoning unless the paper audits verifier robustness and
    reward hacking.
  starter_match:
  - Let's Verify Step by Step
  - Math-Shepherd
  - Improve mathematical reasoning
