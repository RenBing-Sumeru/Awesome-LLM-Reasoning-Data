  order: 6
  emoji: 🏗️
  title: Construction Recipes and Open Reasoning Data
  file: 06_construction_recipes_open_reasoning_data.md
  summary: Prompt sourcing, teacher traces, filtering, self-play, generator-verifier loops, distill-then-RL, pure RL, and
    open reproduction pipelines.
  reader_promise: 'Use this page to move from paper claims to buildable recipes: source mixture, trace writer, verifier, filter,
    optimizer, ablation, and release metadata.'
  why:
  - 'Construction-recipe papers are the practical heart of a reasoning-data atlas. They answer the question a builder actually
    asks: how did the examples get made? A useful recipe exposes the prompt source, teacher or generator, sampling budget,
    trace format, verifier, filter, pass-rate band, decontamination rule, training objective, and ablations. Without those
    pieces, a model report may be inspiring but hard to reproduce.'
  - OpenThoughts, OpenMathReasoning, Big-Math, DeepMath-103K, LIMO, s1, DAPO, DeepScaleR, Open-Reasoner-Zero, R-Zero, Absolute
    Zero, TTRL, AlphaEvolve, CoVerRL, Multi-Agent Evolve, STaR, Self-Instruct, Orca, and related papers show different positions
    in the recipe design space. Some rely on teacher traces and filtering. Some use self-play or generator-verifier co-evolution.
    Some emphasize tiny high-quality seed sets; others scale rollouts and reinforcement. Some are open pipelines; others are
    model reports with partial recipe disclosure.
  - The useful habit is to read every recipe as a bill of materials. What raw tasks entered? Who wrote the reasoning traces?
    How were failures removed or retained? What did the verifier see? Was the reward programmatic, learned, or judgment-based?
    Did the authors show that the same source examples were not reused as evaluations? Did they publish enough artifacts to
    let another team rerun the filter?
  - Recipes are also where hidden risk enters. A strong teacher may leak benchmark behavior into student traces. A filter
    can collapse diversity. A generator-verifier loop can converge on spurious consensus. A small curated set can be powerful
    but fragile. This page links construction papers to audit pages so readers keep tracing lineage instead of treating data
    recipes as magic.
  how_to_read:
  - 'Draw the pipeline: prompt source, generator/teacher, sampling, verifier, filter, training split, optimizer, evaluation
    suite, and release artifacts.'
  - Look for ablations that isolate data size, data quality, verifier choice, model initialization, and inference budget.
  - Check whether the recipe exposes code/data links or only describes them; mark missing artifacts as `needs_search` before
    reuse.
  - Avoid assuming a recipe transfers across domains unless the paper explains how the verifier and prompt source change.
