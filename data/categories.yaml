- id: programmatic_math_code_proof
  order: 2
  emoji: 🧮
  title: Programmatic Math, Code, and Proof Data
  file: 02_programmatic_math_code_proof.md
  summary: Math answers, code execution, unit tests, theorem provers, and verifier robustness studies where correctness can
    often be checked by a rule or external tool.
  reader_promise: 'Use this category to study the cleanest verifier-bearing reasoning records: problems, traces, executable
    checks, proof assistants, pass-rate filters, and decontamination claims.'
  why:
  - Programmatic domains are the workbench where many reasoning-data ideas become concrete. In math, the terminal predicate
    may be an exact answer, symbolic equivalence, or a carefully normalized solution. In code, the substrate can be a compiler,
    unit tests, hidden tests, or an execution trace. In formal proof, Lean or another prover turns a generated step into a
    machine-checkable artifact. These domains make the feedback contract visible enough to train with RLVR, filter teacher
    traces, and audit false positives.
  - That visibility does not make the data simple. Answer-verifiable math records can still leak benchmark items, reward shortcuts,
    or collapse diversity around familiar problem templates. Code datasets can overfit public tests, create brittle execution
    sandboxes, or reward solutions that exploit task wording. Proof data can hide massive retrieval and autoformalization
    assumptions. The useful question is not whether verification is automatic; it is what exactly is verified, what is ignored,
    and how the construction recipe handles uncertainty.
  - For builders, this category is the place to compare record designs. GSM8K and MATH made answer-level reasoning evaluation
    mainstream. HumanEval, APPS, BigCodeBench, LiveCodeBench, OpenCodeReasoning, and KodCode move correctness into executable
    code surfaces. DeepSeek-Prover, Goedel-Prover, LeanDojo, miniF2F, ProofNet, and HOList show how formal substrates can
    support proof search and reinforcement. Newer math releases such as OpenMathReasoning, Big-Math, DeepMath-103K, and NaturalReasoning
    expose post-training data recipes more directly.
  - 'Read these papers as verifier specifications. The paper title may say dataset, benchmark, or model report, but the reusable
    asset is often the contract: answer normalizer, test harness, proof checker, pass-rate band, source mixture, and filtering
    rule. Whenever a link is not pinned in local metadata, the atlas keeps the entry but marks it for search rather than adding
    an unverified URL.'
  how_to_read:
  - 'Name the verifier: exact answer, symbolic checker, unit tests, compiler, hidden judge, proof assistant, or learned verifier.'
  - Check whether traces are human-written, teacher-distilled, model-sampled, search-generated, or tool-integrated.
  - Look for pass-rate bands, difficulty filters, decontamination, public/private split policy, and verifier false-positive
    analysis.
  - Avoid assuming a high benchmark score implies reusable training data; inspect whether the release exposes prompts, solutions,
    traces, and filtering code.
