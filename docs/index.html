<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Awesome LLM Reasoning Data Atlas</title><style>body{font-family:Inter,Arial,sans-serif;margin:0;background:#f7fafc;color:#172033}header,main,footer{max-width:1180px;margin:auto;padding:24px}.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;background:#fff;border:1px solid #d7dee8;border-radius:8px;padding:14px;position:sticky;top:0}input,select{padding:10px;border:1px solid #d7dee8;border-radius:6px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:14px}.card{background:#fff;border:1px solid #d7dee8;border-radius:8px;padding:16px}.tag{font-size:12px;border:1px solid #d7dee8;border-radius:999px;padding:3px 8px;margin:2px;display:inline-block}a{color:#2563eb;text-decoration:none}</style></head><body><header><h1>Awesome LLM Reasoning Data Atlas</h1><p>Search post-training reasoning data, verifiers, rewards, construction recipes, scaling studies, and audit analyses.</p></header><main><section class="filters"><input id="q" placeholder="Search title, tags, domains"><select id="status"><option value="">All statuses</option></select><select id="role"><option value="">All roles</option></select><select id="contract"><option value="">All contracts</option></select><select id="use"><option value="">All training uses</option></select></section><p id="count"></p><section id="cards" class="grid"></section></main><footer><a href="../README.md">Back to README</a></footer><script>
const map={role:"source_role",contract:"verification_contract",use:"training_use"};let entries=[];function vals(e,f){const v=e[map[f]||f];return Array.isArray(v)?v:[v]}function opts(id){const el=document.getElementById(id),s=new Set();entries.forEach(e=>vals(e,id).forEach(v=>{if(v)s.add(String(v))}));[...s].sort().forEach(v=>{let o=document.createElement("option");o.value=v;o.textContent=v;el.appendChild(o)})}function render(){const q=document.getElementById("q").value.toLowerCase(),fs=["status","role","contract","use"];const shown=entries.filter(e=>{let hay=[e.title,...(e.tags||[]),...(e.domains||[])].join(" ").toLowerCase();if(q&&!hay.includes(q))return false;return fs.every(f=>!document.getElementById(f).value||vals(e,f).map(String).includes(document.getElementById(f).value))});document.getElementById("count").textContent=`${shown.length} / ${entries.length} entries`;let c=document.getElementById("cards");c.innerHTML="";shown.forEach(e=>{let link=(e.artifacts||{}).arxiv||(e.artifacts||{}).paper;let tags=[...(e.source_role||[]),...(e.verification_contract||[]),...(e.training_use||[])].slice(0,8).map(t=>`<span class=tag>${t}</span>`).join("");let d=document.createElement("article");d.className="card";d.innerHTML=`<h2>${link?`<a href="${link}">${e.title}</a>`:e.title}</h2><p>${e.year||"unknown"} · ${e.venue||"unknown"} · ${e.status}</p><div>${tags}</div><p>${e.inclusion_reason||""}</p>`;c.appendChild(d)})}fetch("assets/entries.json").then(r=>r.json()).then(d=>{entries=d;["status","role","contract","use"].forEach(opts);document.querySelectorAll("input,select").forEach(x=>x.addEventListener("input",render));render()});
</script></body></html>
