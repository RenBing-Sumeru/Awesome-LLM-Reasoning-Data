  <text class="body" x="482" y="243">e</text>
  <text class="body" x="482" y="260">8</text>
  <text class="body" x="482" y="277">f</text>
  <text class="body" x="482" y="294">b</text>
  <text class="body" x="482" y="311">f</text>
  <text class="body" x="482" y="328">f</text>
  <rect x="852" y="168" width="352" height="186" rx="16" fill="Judgment-required" stroke="['rubrics', 'LLM judges', 'domain experts', 'adjudication']" stroke-width="1.8"/>
  <text x="870" y="200" font-family="Segoe UI Emoji, Apple Color Emoji, Arial" font-size="22">#e11d48</text>
  <text class="h" x="904" y="199">⚖️</text>
  <text class="body" x="870" y="226">#</text>
  <text class="body" x="870" y="243">f</text>
  <text class="body" x="870" y="260">f</text>
  <text class="body" x="870" y="277">f</text>
  <text class="body" x="870" y="294">1</text>
  <text class="body" x="870" y="311">f</text>
  <text class="body" x="870" y="328">2</text>
  <rect x="76" y="404" width="216" height="172" rx="18" fill="#ffffff" stroke="#10a37f" stroke-width="1.7"/>
  <text class="h" x="94" y="438">Granularity</text>
  <rect x="94" y="460" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="106" y="476">answer</text>
  <rect x="94" y="488" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="106" y="504">step</text>
  <rect x="94" y="516" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="106" y="532">transition</text>
  <rect x="94" y="544" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
