  <rect x="1040" y="404" width="164" height="172" rx="18" fill="#ffffff" stroke="#e11d48" stroke-width="1.7"/>
  <text class="h" x="1058" y="438">Risk</text>
  <rect x="1058" y="460" width="128" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="1070" y="476">leakage</text>
  <rect x="1058" y="488" width="128" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="1070" y="504">contamination</text>
  <rect x="1058" y="516" width="128" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="1070" y="532">gaming</text>
  <rect x="1058" y="544" width="128" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="1070" y="560">judge attack</text>
  <text class="eyebrow" x="76" y="638">Rule of thumb</text>
  <text class="mono" x="76" y="664">A domain label is secondary; the feedback contract determines what evidence must be released.</text>
</svg>
