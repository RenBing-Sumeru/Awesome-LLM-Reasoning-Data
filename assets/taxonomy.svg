  <rect x="588" y="404" width="216" height="172" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="1.7"/>
  <text class="h" x="606" y="438">Lineage</text>
  <rect x="606" y="460" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="618" y="476">human</text>
  <rect x="606" y="488" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="618" y="504">teacher</text>
  <rect x="606" y="516" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="618" y="532">search</text>
  <rect x="606" y="544" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="618" y="560">self-play</text>
  <rect x="606" y="572" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="618" y="588">environment</text>
  <rect x="844" y="404" width="216" height="172" rx="18" fill="#ffffff" stroke="#f59e0b" stroke-width="1.7"/>
  <text class="h" x="862" y="438">Training use</text>
  <rect x="862" y="460" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="small" x="874" y="476">SFT</text>
  <rect x="862" y="488" width="180" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
