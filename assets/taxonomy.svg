  <text class="body" x="94" y="243">e</text>
  <text class="body" x="94" y="260">a</text>
  <text class="body" x="94" y="277">f</text>
  <text class="body" x="94" y="294">3</text>
  <text class="body" x="94" y="311">f</text>
  <text class="body" x="94" y="328">f</text>
  <rect x="464" y="168" width="352" height="186" rx="16" fill="Environmental" stroke="['tool/web/OS state', 'actions and observations', 'terminal predicate', 'replay metadata']" stroke-width="1.8"/>
  <text x="482" y="200" font-family="Segoe UI Emoji, Apple Color Emoji, Arial" font-size="22">#06b6d4</text>
  <text class="h" x="516" y="199">🌐</text>
