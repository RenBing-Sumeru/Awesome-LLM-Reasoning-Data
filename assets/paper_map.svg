<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Core paper map</title>
  <desc id="desc">A compact map from reasoning-data clusters to representative papers and audit questions.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#d8e2ef;stroke-width:2}.title{font:800 44px Arial,sans-serif;fill:#111827}.sub{font:500 21px Arial,sans-serif;fill:#475569}.center{font:800 25px Arial,sans-serif;fill:#0f172a}.h{font:800 20px Arial,sans-serif;fill:#0f172a}.p{font:500 14px Arial,sans-serif;fill:#475569}.tag{font:700 13px Arial,sans-serif;fill:#334155}.link{stroke:#cbd5e1;stroke-width:3}.card{stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <rect class="panel" x="40" y="38" width="1200" height="644" rx="28"/>
  <text class="title" x="76" y="96">🧮 Core Paper Map</text>
  <text class="sub" x="78" y="132">Use paper clusters as a reading route, then audit the data object behind each result.</text>

  <circle cx="640" cy="364" r="104" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
  <text class="center" x="543" y="344">Verifier-bearing</text>
  <text class="center" x="574" y="378">reasoning</text>
  <text class="center" x="607" y="412">data</text>

  <line class="link" x1="544" y1="318" x2="284" y2="208"/>
  <line class="link" x1="640" y1="260" x2="640" y2="196"/>
  <line class="link" x1="736" y1="318" x2="1012" y2="208"/>
  <line class="link" x1="536" y1="384" x2="286" y2="370"/>
  <line class="link" x1="744" y1="384" x2="1012" y2="370"/>
  <line class="link" x1="560" y1="438" x2="284" y2="542"/>
  <line class="link" x1="640" y1="468" x2="640" y2="562"/>
  <line class="link" x1="720" y1="438" x2="1012" y2="542"/>

  <g transform="translate(78 164)">
    <rect class="card" x="0" y="0" width="354" height="112" rx="18" fill="#eff6ff" stroke="#2563eb"/>
