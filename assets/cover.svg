<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Awesome LLM Reasoning Data: 3 groups, 14 tracks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="0.55" stop-color="#111a2e"/>
      <stop offset="1" stop-color="#16223c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="1">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.14"/>
      <stop offset="0.6" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="280" rx="14" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="14" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="279" rx="13.5" fill="none" stroke="#334155" stroke-opacity="0.55"/>
  <g font-family="'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle">
    <text x="600" y="66" fill="#f8fafc" font-size="38" font-weight="700" letter-spacing="9">AWESOME&#160;&#160;LLM&#160;&#160;REASONING&#160;&#160;DATA</text>
    <rect x="450" y="86" width="300" height="3" rx="1.5" fill="url(#accent)"/>
    <rect x="450" y="86" width="56" height="3" rx="1.5" fill="#f8fafc" opacity="0.35">
      <animate attributeName="x" values="450;694;450" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="600" y="122" fill="#cbd5e1" font-size="19" letter-spacing="2">Post-training reasoning data &#8212; built &#183; verified &#183; trained on &#183; audited</text>

    <!-- Group 1: Background / Foundations (00) -->
    <circle cx="210" cy="162" r="13" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="210" y="167" fill="#e2e8f0" font-size="14" font-weight="700">1</text>
    <text x="210" y="202" fill="#e2e8f0" font-size="15" font-weight="600" letter-spacing="1">BACKGROUND &#38; FOUNDATIONS &#183; 00</text>
    <text x="210" y="236" fill="#93c5fd" font-size="14" letter-spacing="0.5">00 &#183; Foundations &#38; Primers
      <animate attributeName="opacity" values="0.55;1;0.55" dur="4.2s" repeatCount="indefinite"/>
    </text>

    <!-- Group 2: Core Reasoning Data Types (01–07) -->
    <circle cx="600" cy="162" r="13" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="600" y="167" fill="#e2e8f0" font-size="14" font-weight="700">2</text>
    <text x="600" y="202" fill="#e2e8f0" font-size="15" font-weight="600" letter-spacing="1">CORE DATA TYPES &#183; 01&#8211;07</text>
    <g fill="#93c5fd" font-size="14" letter-spacing="0.5">
      <text x="600" y="236" opacity="0">01 &#183; Instruction &#38; Demonstration Data
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0;0.014;0.129;0.143;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="600" y="236" opacity="0">02 &#183; Preference &#38; Reward Feedback
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.143;0.157;0.271;0.286;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="600" y="236" opacity="0">03 &#183; Verifiable Outcome Data
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.286;0.3;0.414;0.429;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="600" y="236" opacity="0">04 &#183; Process / Step Supervision
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.429;0.443;0.557;0.571;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="600" y="236" opacity="0">05 &#183; Rollout &#38; Search Traces
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.571;0.586;0.7;0.714;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="600" y="236" opacity="0">06 &#183; Agent Trajectory Data
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.714;0.729;0.843;0.857;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="600" y="236" opacity="0">07 &#183; Judgment &#38; Expert Rubrics
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.857;0.871;0.986;1;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Group 3: Data Lifecycle (08–13) -->
    <circle cx="990" cy="162" r="13" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="990" y="167" fill="#e2e8f0" font-size="14" font-weight="700">3</text>
    <text x="990" y="202" fill="#e2e8f0" font-size="15" font-weight="600" letter-spacing="1">DATA LIFECYCLE &#183; 08&#8211;13</text>
    <g fill="#93c5fd" font-size="14" letter-spacing="0.5">
      <text x="990" y="236" opacity="0">08 &#183; Data Construction &#38; Release
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0;0.017;0.15;0.167;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="990" y="236" opacity="0">09 &#183; Training Usage &#38; Objectives
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.167;0.183;0.317;0.333;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="990" y="236" opacity="0">10 &#183; Scaling &#38; Test-Time Compute
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.333;0.35;0.483;0.5;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="990" y="236" opacity="0">11 &#183; Benchmarks &#38; Evaluation
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.517;0.65;0.667;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="990" y="236" opacity="0">12 &#183; Frontier Data Disclosure
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.667;0.683;0.817;0.833;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
      <text x="990" y="236" opacity="0">13 &#183; Audit &#38; Failure Modes
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.833;0.85;0.983;1;1" dur="16.8s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>
</svg>
