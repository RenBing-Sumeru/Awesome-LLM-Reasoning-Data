name: Validate atlas data

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate data
        run: python scripts/validate_data.py
      - name: Secret scan
        run: python scripts/secret_scan.py
      - name: Check site data
        run: python scripts/render_site.py --check
      - name: Check paper pages
        run: python scripts/render_papers.py --check
      - name: Check README generated sections
        run: python scripts/render_readme.py --check
      - name: Check bilingual paper-card sources
        run: python tools/paper_cards/card_tool.py check
      - name: Verify prompt-batch provenance
        run: python tools/paper_cards/migrate.py verify-current
      - name: Test paper-card migration
        run: PYTHONPATH=. python tests/paper_cards/test_migrate.py
      - name: Coverage report
        run: python scripts/coverage_report.py
      - name: Link check soft
        run: python scripts/check_links.py --soft
      - name: Summarize counts
        run: python scripts/summarize_counts.py
