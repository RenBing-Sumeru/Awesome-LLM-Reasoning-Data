name: Validate atlas data

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/ask-atlas/package-lock.json
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci --prefix apps/ask-atlas
      - name: Validate data
        run: python scripts/validate_data.py
      - name: Secret scan
        run: python scripts/secret_scan.py
      - name: Check site data
        run: python scripts/render_site.py --check
      - name: Check Ask backend URL config safety
        run: |
          set -euo pipefail
          python scripts/set_ask_backend_url.py --check
      - name: Check Ask entrypoints
        run: python scripts/check_ask_entrypoints.py
      - name: Check paper pages
        run: python scripts/render_papers.py --check
      - name: Check README generated sections
        run: python scripts/render_readme.py --check
      - name: Check card Ask links
        run: python scripts/add_card_ask_links.py --check
      - name: Check card index
        run: python scripts/render_cards.py --check
      - name: Test Ask the Atlas backend
        run: npm --prefix apps/ask-atlas test
      - name: Coverage report
        run: python scripts/coverage_report.py
      - name: Link check soft
        run: python scripts/check_links.py --soft
      - name: Summarize counts
        run: python scripts/summarize_counts.py
