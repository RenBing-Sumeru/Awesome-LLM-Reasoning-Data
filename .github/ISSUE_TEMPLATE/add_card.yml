name: Add or improve a paper-card source
about: Add bilingual paper-card source files for an existing paper entry.
title: "[Paper card] <work name>"
labels: ["paper-card", "metadata"]
body:
  - type: input
    id: source_path
    attributes:
      label: Proposed paper-card source path
      description: Example paper_cards/sources/openthoughts
    validations:
      required: true
  - type: input
    id: entry_id
    attributes:
      label: data/papers.yaml entry_id
      description: The source directory must match an existing entry_id.
    validations:
      required: true
  - type: textarea
    id: data_object
    attributes:
      label: Data object fields
      description: Summarize the data object fields that should appear in the bilingual sections. Use unknown for unverified fields.
    validations:
      required: true
  - type: textarea
    id: audit
    attributes:
      label: Audit notes
      description: Verification contract, supervision granularity, construction recipe, known limitations, and missing official sources.
    validations:
      required: true
