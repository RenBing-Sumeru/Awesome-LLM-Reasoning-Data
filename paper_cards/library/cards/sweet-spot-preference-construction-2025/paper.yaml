recipe_metadata:
  base_model: LLaMA-3-8B and Mistral-7B in base and instruction-tuned settings.
  teacher: Armorm reward model.
  generator: Repeated on-policy response sampling and reward-distribution pair construction.
  filtering_rule: Typically choose high reward (max or mean + 2σ) and reject response nearest mean − 2σ, rather than minimum.
  sampling_protocol: Main grid samples 200 responses per prompt and tests 21 pair types; temperature 0.8.
  rollout_count: '200'
  temperature: '0.8'
  inference_budget: DPO after preference construction; the paper explores 5–200 samples per prompt.
  optimizer_or_scaffold: Direct Preference Optimization.
