data_object:
  prompt_source: Mathematical benchmark seed questions with known final answers.
  trace_author: The current model produces candidate reasoning paths, brainstorming variants, and reflections.
  answer_format: Question, verified answer, embedding cluster and anchor, strategic reasoning trajectory, mini-batch quality score, and retained training record.
  process_fields: [question, answer, embedding, cluster, anchor, trajectory, quality_score, selected]
  environment_or_substrate: Iterative self-training; generated traces are verified against known answers and consumed by SFT or DPO.
  verifier_or_reward: Exact final-answer matching verifies generated reasoning paths; dynamic validation filters low-quality mini-batches.
  terminal_predicate: A record is used only if it comes from an anchor-selected subset, passes answer verification, and its mini-batch passes dynamic validation.
recipe_metadata:
  base_model: Llama-3.2-1B and Llama-3.1-8B.
  teacher: No external teacher; the model generates trajectories and reflection-based refinements.
  generator: The current self-training model generates candidate reasoning paths and strategy variants.
  filtering_rule: Cluster latent sentence embeddings, choose geometrically representative anchors, verify outputs, and reject mini-batches below a data-adaptive quality threshold.
  sampling_protocol: Select a nonredundant seed subset, prospect diverse reasoning trajectories, dynamically validate mini-batches, then train and iterate.
  rollout_count: The diversity analysis reports 12 generated solutions per problem.
  temperature: Not reported as a selection parameter.
  inference_budget: Data-efficient subsets are compared with full-data baselines across multiple benchmark settings.
  optimizer_or_scaffold: SFT and DPO self-training comparisons.
