data_object:
  prompt_source: Honor-Dialogue, Light-R1, and SuperGPQA in the reported noisy-reward experiments.
  trace_author: Policy rollouts; rule-based majority-vote or learned reward models supply noisy reward supervision.
  answer_format: Prompt or dialogue state, rollout tokens, noisy reward, value prediction, information-bottleneck latent, and token-level advantage estimates.
  process_fields: [state, rollout, reward, value, advantage, entropy_tokens, perplexity_tokens]
  environment_or_substrate: PPO-style LLM reinforcement learning under rule-based and learned noisy rewards.
  verifier_or_reward: Majority-vote pseudo-label rewards or a dialogue reward model; VRPO improves the downstream value estimate rather than replacing the reward source.
  terminal_predicate: Produce value estimates and advantages that resist reward noise before policy updates.
recipe_metadata:
  base_model: Qwen2.5, Qwen3, and Llama3.1 variants in task-specific experiments.
  teacher: A frozen language model supplies entropy and perplexity signals; reward sources are rule-based votes or a learned dialogue reward model.
  generator: Policy rollouts under the selected RL environment.
  filtering_rule: Select high-entropy and high-perplexity token subsets for auxiliary value-model regularization; no corpus-level sample filter is central.
  sampling_protocol: Five samples for training-time majority voting and 32 for test-time voting in the reported rule-based settings.
  rollout_count: Configuration-dependent; five training-time and 32 test-time vote samples are reported.
  temperature: Not reported as a universal setting.
  inference_budget: Reported experiments run on eight NVIDIA A100 80GB GPUs.
  optimizer_or_scaffold: PPO-style RL with variational information bottleneck and entropy/perplexity auxiliary value losses; comparisons include PPO, GRPO, Dr.GRPO, Reinforce++, KTAE, and lambda-GRPO.
audit:
  source_mixture: Dialogue, mathematics, and science tasks with noisy learned or majority-vote rewards.
  split: Rule-based evaluation covers MATH500, AIME24, Minerva-Math, AMC23, SampleQA, GPQA, and HLE; dialogue uses the reported Honor-Dialogue setup.
  decontamination: No broad contamination audit is reported.
  license: Verify task datasets, model checkpoints, reward-model access, and the internal dialogue-data terms before reproduction.
  lineage: 'Primary source: https://aclanthology.org/2026.acl-long.1103/'
  known_failure_modes: [Does not solve all reward noise, Value-model regularization adds training complexity, Rule-based experiments cover only math and science, Some dialogue data and reward details are not publicly released]
