recipe_metadata:
  base_model: Qwen3-4B, Qwen3-8B, and DeepSeek-R1-Distill-Llama-8B.
  teacher: Qwen2.5-32B-Instruct for attribution; OpenMathReasoning teacher solutions.
  generator: OpenMathReasoning and skill-tree attribution pipeline.
  filtering_rule: Sample skills inversely to student leaf-skill accuracy with a capped inverse-accuracy rule.
  sampling_protocol: Select 1,000 records from 100K; prepend full skill chain before solution for skill-aware SFT.
  rollout_count: null
  temperature: null
  inference_budget: Five SFT epochs; Avg@8 evaluation.
  optimizer_or_scaffold: Skill-aware supervised fine-tuning.
