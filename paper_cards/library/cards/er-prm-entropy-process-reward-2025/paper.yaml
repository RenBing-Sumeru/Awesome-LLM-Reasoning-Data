data_object:
  prompt_source: GSM8K and MATH problems, with OpenMathInstruct-2 also used in the rejection-sampling training mixture.
  trace_author: Mistral-MetaMath-7B or DeepSeek-Math-7B-Instruct generates solution traces and completion rollouts.
  answer_format: Problem, stepwise reasoning text, one entropy-regularized score per step, and a terminal answer checked against the benchmark answer.
  process_fields: [prompt, reasoning_steps, completion_rollouts, terminal_correctness, eta, step_rewards]
  environment_or_substrate: Mathematical-answer matching, reference-policy completion sampling, and KL-regularized process-reward estimation.
  verifier_or_reward: A completion earns one for a correct final answer and zero otherwise; ER-PRM applies a log-sum-exp aggregation of those outcomes under the reference policy.
  terminal_predicate: Retain a step score estimated from 16 completions of its partial chain, with correctness determined by the final-answer check.
recipe_metadata:
  base_model: Llama-3.1-8B reward model; Mistral-MetaMath-7B and DeepSeek-Math-7B-Instruct supply sampled reasoning data.
  teacher: No separate judge; benchmark answer checking labels completed rollouts.
  generator: The reference policy samples full solutions and conditional completions from partial chains.
  filtering_rule: Score each step from completion outcomes; later use the lowest step score to rank a whole candidate response.
  sampling_protocol: 15 generated solutions per problem and 16 completion paths for each step; about 260K records and 1.5M step annotations per source model.
  rollout_count: 16.
  temperature: null
  inference_budget: Best-of-N and rejection-sampling use multiple candidate reasoning traces and PRM scores.
  optimizer_or_scaffold: Next-token process-reward training plus PRM-ranked rejection-sampling fine-tuning.
audit:
  source_mixture: Public math problems, reference-policy traces, programmatically checked completions, and entropy-regularized process labels.
  split: Evaluate on GSM8K test and MATH500; the RLHF mixture adds 12,500 OpenMathInstruct-2 questions to reduce exposure-related overfitting.
  decontamination: The paper identifies prior exposure of policy models to GSM8K and MATH and adds OpenMathInstruct-2 for RLHF, but does not report a full contamination audit.
  license: Verify the benchmark, generated-data, model, and repository terms before redistribution.
  lineage: 'Primary source: https://openreview.net/forum?id=cSxDH7N3x9'
