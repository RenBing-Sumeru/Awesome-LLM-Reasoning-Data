data_object:
  prompt_source: Small models often explore shallow or repetitive chains, and self-evaluation by the same model is poorly
    calibrated. rStar asks whether separating generation from peer discrimination can improve MCTS reasoning without fine-tuning
    or a superior teacher.
  trace_author: A target SLM uses a richer action set inside MCTS to construct diverse trajectories. A second SLM of similar
    capability independently discriminates candidates; mutually consistent trajectories are favored for the final solution.
  answer_format: task prompt; MCTS state; human-like reasoning action; generated intermediate state; complete trajectory;
    generator answer; discriminator reconstruction or verdict; mutual-consistency label; selected path; compute budget
  process_fields:
  - task prompt
  - MCTS state
  - human-like reasoning action
  - generated intermediate state
  - complete trajectory
  - generator answer
  - discriminator reconstruction or verdict
  - mutual-consistency label
  - selected path
  - compute budget
  environment_or_substrate: Search tree or formal proof-search substrate described by the paper.
  verifier_or_reward: The peer SLM is a model-based discriminator rather than a programmatic verifier. Mutual agreement and
    search statistics select trajectories; benchmark answer matching evaluates the final output.
  terminal_predicate: Task answer acceptance or formal proof closure under the reported verifier.
