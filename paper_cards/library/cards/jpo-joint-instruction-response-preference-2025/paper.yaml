data_object:
  prompt_source: Filtered TL;DR summarization and Anthropic Helpful single-turn dialogue instances.
  trace_author: Existing responses are paired across either identical or non-identical instructions; GPT-3.5-Turbo and qualified human annotators supply comparisons.
  answer_format: Two instruction-response pairs, a joint chosen-rejected label, feedback source, and optional conditional preference label.
  process_fields: [instruction_1, response_1, instruction_2, response_2, chosen_pair, rejected_pair, feedback_source]
  environment_or_substrate: Supervised fine-tuning followed by offline preference optimization.
  verifier_or_reward: GPT-3.5-Turbo comparisons and human rankings; no separate reward model is trained.
  terminal_predicate: Increase the joint probability of the selected instruction-response pair over its jointly rejected counterpart.
recipe_metadata:
  base_model: Mistral-7B, supervised fine-tuned before preference optimization.
  teacher: GPT-3.5-Turbo-0125 provides most comparison labels; Amazon Mechanical Turk annotators provide human feedback analysis.
  generator: Existing TL;DR and Anthropic Helpful responses; no new model-generation stage is required for pair construction.
  filtering_rule: Remove duplicate instructions, sample one response per instance, and randomly match two different instruction-response records to form a joint comparison.
  sampling_protocol: About 50K AI comparisons across protocols; 2,000 human comparisons for analysis; joint and conditional datasets are built at comparable sizes.
  rollout_count: Not applicable.
  temperature: 'Evaluation averages three sampling temperatures: 0.001, 0.5, and 1.0.'
  inference_budget: Pairwise preference collection requires two order-reversed GPT-3.5-Turbo queries to reduce order bias.
  optimizer_or_scaffold: Joint Preference Optimization, with conditional preferences treated as the identical-instruction special case.
audit:
  source_mixture: TL;DR and Anthropic Helpful instruction-response data with joint and conditional AI or human rankings.
  split: Train comparisons are collected from source training splits; 500 unseen test instructions per dataset assess aligned models with the paper's GPT-3.5 evaluator.
  decontamination: No broad contamination audit is reported.
  license: Verify TL;DR, Anthropic Helpful, GPT-3.5-Turbo, crowdsourcing, base-model, and code terms before reproducing the collection pipeline.
  lineage: 'Primary source: https://aclanthology.org/2025.findings-acl.39/'
