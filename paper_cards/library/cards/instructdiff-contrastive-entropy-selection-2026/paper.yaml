data_object:
  prompt_source: NuminaMath, Alpaca, MedCAQA, and BigCode candidate instruction-response pools.
  trace_author: Existing source datasets; InstructDiff does not create a replacement corpus.
  answer_format: Instruction-response record with base and calibration-model likelihood and entropy measurements.
  process_fields:
  - instruction
  - response
  - NLL_difference
