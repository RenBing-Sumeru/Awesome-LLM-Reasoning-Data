  - selection_iteration
  environment_or_substrate: Full-parameter SFT evaluated across mathematics, general instructions, medical QA, and code.
  verifier_or_reward: Downstream benchmark scores and instruction-following preference evaluations.
  terminal_predicate: Selected subset improves downstream SFT over specified baselines.
recipe_metadata:
  base_model: Qwen2.5-7B for mathematics; Llama3-8B for general, medical, and code experiments.
  teacher: None; a lightly SFT-calibrated copy of the base model supplies the comparison state.
  generator: Warmup calibration followed by NLL-difference filtering and contrastive-entropy ranking.
  filtering_rule: Drop bottom and top 10% by NLL difference; rank remaining records by lowest contrastive entropy.
  sampling_protocol: Typically warm up on 10% and select 10% of the original pool; code uses 20% selection.
  rollout_count: null
  temperature: null
  inference_budget: One or more selection/SFT iterations; two iterations are the reported cost-performance sweet spot.
  optimizer_or_scaffold: Full-parameter supervised fine-tuning.
audit:
  source_mixture: 10K pools in four domains; additional 100K mathematics and 52K general scaling pools.
  split: Standard downstream benchmark splits named in the ACL paper.
  decontamination: No dedicated contamination audit claimed; inspect each upstream dataset and benchmark.
  license: Follow licenses for NuminaMath, Alpaca, MedCAQA, BigCode, and the official code repository.
  lineage: 'Primary sources: https://aclanthology.org/2026.acl-long.486/; https://github.com/zhuchichi56/Instruct-diff'
  known_failure_modes:
  - Tiny warmup subsets cause noisy calibration gaps.
  - Selections transfer poorly across model families.
  - Fixed thresholds may not be optimal for new pools.
  - Mechanism behind opposite entropy regimes is not established.
