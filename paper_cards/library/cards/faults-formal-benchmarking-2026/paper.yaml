data_object:
  prompt_source: Five Lean theorem-proving benchmarks and 13 benchmark variants, totaling roughly 10,000 formal problems.
  trace_author: Corpus-scale Lean static checkers, mechanically certified witnesses, semantic-audit prompts, and corrected
    snapshots.
  answer_format: A finding with its affected theorem, fault type, checker result, and—where applicable—a machine-checkable
    witness.
  process_fields:
  - formal statement
  - Lean environment
  - static-check result
  - certificate or counterexample
  - fault taxonomy
  - corrected snapshot
  environment_or_substrate: Pinned Lean 3/Lean 4 benchmark environments and the released audit checker suite.
  verifier_or_reward: Lean metaprogram/static checks and mechanically certified counterexample, vacuity, or unprovability
    evidence; semantic prompts are a separate non-deterministic audit layer.
  terminal_predicate: For certified findings, the released checker/witness establishes the claimed formal defect under the
    pinned environment.
recipe_metadata:
  base_model: Not a training recipe; LLM prompts are used only as recall-oriented semantic-audit support.
  teacher: Programmatic Lean audit checkers and certified witnesses, supplemented by human/LLM semantic review.
  generator: Corpus-wide static analysis across benchmark versions and forks.
  filtering_rule: Separate mechanically certified findings from recall-oriented semantic findings; never collapse the two
    confidence levels.
  sampling_protocol: Pin benchmark commit, Lean version, Mathlib dependencies, checker revision, and affected theorem identifiers.
  rollout_count: null
  temperature: null
  inference_budget: Report every semantic-audit model, prompt, sample count, and adjudication rule separately from static
    checker results.
  optimizer_or_scaffold: Release standards, fault taxonomy, Lean metaprograms, and corrected dataset snapshots.
audit:
  source_mixture: Official arXiv/ICML paper and the linked atp-checkers repository.
  split: Five benchmark families and 13 variants; certified and semantic findings must remain separately labeled.
  decontamination: Audit benchmark/fork provenance, Lean version, Mathlib drift, patched environments, and duplicated formal
    statements.
  license: Inspect upstream benchmark licenses and the checker repository license before redistributing corrected snapshots.
  lineage: 'Primary source: https://arxiv.org/abs/2606.29493'
  known_failure_modes:
  - A Lean kernel proof certifies the encoded statement, not its informal fidelity.
  - Static checking cannot decide every semantic mismatch.
  - Results depend on the pinned Lean and dependency environment.
  citation_status: verified
  confidence: high
  notes: ICML 2026; official PDF lists EleutherAI and University of Cambridge affiliations and reports 4,833 findings, including
    398 mechanically certified issues.
inclusion_reason: A very recent ICML audit that exposes the limits of proof-kernel outcome labels and releases programmatic
  checks for verifier robustness.
