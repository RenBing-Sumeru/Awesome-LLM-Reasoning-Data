one_line: Faults in Our Formal Benchmarking audits Lean benchmarks with static checkers and certified witnesses, showing where
  a kernel-accepted result is not enough.
why_it_matters: It turns verifier robustness and statement fidelity into data fields that can be checked, rather than assuming
  every Lean pass is a trustworthy label.
