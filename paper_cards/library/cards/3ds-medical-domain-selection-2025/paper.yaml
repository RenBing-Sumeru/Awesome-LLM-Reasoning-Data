data_object:
  prompt_source: More than 1.9M Chinese medical instruction-response records from five named sources.
  trace_author: Source datasets; 3DS ranks and selects existing records.
  answer_format: Instruction, reference answer, target-model quality score, three difficulty scores, and diversity selection
    state.
  process_fields:
  - instruction
  - reference_answer
  - quality_score
  - understanding_difficulty
  - confidence_difficulty
  - correctness_difficulty
  - attention_weights
  environment_or_substrate: Specialized-domain supervised fine-tuning.
  verifier_or_reward: Medical benchmark accuracy and open-answer lexical metrics; target-model scoring is a selection signal.
  terminal_predicate: Selected 5K records improve named domain evaluations.
recipe_metadata:
  base_model: Baichuan2-13B-Chat, Qwen1.5-7B-Instruct, Qwen2.5-7B-Instruct, LLaMA3-8B-Instruct.
  teacher: Target model rates quality; no fixed external judge is required.
  generator: Prompt-driven quality gate, decomposed difficulty scoring, and k-center diversity sampling.
  filtering_rule: Keep quality scores ≥90, retain model-specific middle difficulty percentiles, then apply k-center sampling.
  sampling_protocol: 5K SFT budget; percentile bounds tuned on CMB holdout data.
  rollout_count: null
  temperature: null
  inference_budget: Pre-selection scores full pool before final 5K SFT.
  optimizer_or_scaffold: Supervised fine-tuning.
audit:
  source_mixture: Five public and crawled Chinese medical sources aggregated into a 1.9M-plus pool.
  split: CMB-Exam, MMCU-Med, and CMB-Clin; extra CaseHOLD and MMLU generalization studies.
  decontamination: No dedicated contamination audit claimed; inspect source and benchmark overlap.
  license: Verify repository and each upstream source before redistribution or medical use.
  lineage: 'Primary sources: https://aclanthology.org/2025.emnlp-main.983/; https://github.com/PuppyKnightUniversity/3DS'
  known_failure_modes:
  - Full-pool scoring cost.
  - Static pre-SFT subset is not updated online.
  - Thresholds vary by model and are holdout-tuned.
  - Medical and Chinese-centric evidence.
