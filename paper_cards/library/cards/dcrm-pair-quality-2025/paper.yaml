data_object:
  prompt_source: UltraFeedback seed prompts in the reported preference-data constructions.
  trace_author: Candidate responses are sampled from the reference policy or other language models; a reward model supplies pair labels and margins.
  answer_format: Prompt, chosen response, rejected response, reward margin, token edit distance, reference-policy log-probability difference, and DCRM score.
  process_fields: [prompt, chosen, rejected, reward_margin, edit_distance, logprob_difference, dcrm_score]
  environment_or_substrate: Offline preference optimization for conversational and instruction-following models.
  verifier_or_reward: A reward model supplies the preference margin; the reference policy supplies response likelihoods.
  terminal_predicate: Retain the candidate pair with the highest distance-calibrated reward margin from an available response pool.
recipe_metadata:
  base_model: LLaMA-2-7B-Chat, LLaMA-3.2-1B-Instruct, and Gemma-2B-IT.
  teacher: A reward model for pairwise preference labels and scores.
  generator: The reference policy and comparison models sample response candidates.
  filtering_rule: Rank candidate response pairs by reward margin normalized by token edit distance and reference-policy log-probability difference.
  sampling_protocol: Best-of-N-squared pairing evaluates candidate pairs from a response pool and selects the highest-scoring pair.
  rollout_count: N is configuration-dependent; the paper names the selection rule Best-of-N-squared rather than fixing one universal N.
  temperature: Not reported as a universal construction setting.
  inference_budget: Pair scoring requires reward-model inference plus reference-policy likelihood computation for candidate responses.
  optimizer_or_scaffold: DPO is held fixed for the central comparison; downstream evaluations include the reselected preference datasets.
audit:
  source_mixture: UltraFeedback seed prompts and responses sampled by the compared language-model sources.
  split: Training constructions are evaluated on AlpacaEval, MT-Bench, and Arena-Hard; the paper does not announce a new standalone selected-pair release.
  decontamination: No comprehensive contamination audit is reported.
  license: Verify UltraFeedback, source-model, reward-model, and code terms before reusing a reconstructed dataset.
  lineage: 'Primary source: https://aclanthology.org/2025.findings-emnlp.136/'
  known_failure_modes: [Reward-model margins can be miscalibrated, DCRM depends on the chosen reference policy, Pair selection incurs quadratic candidate comparisons, Evidence is limited to the reported conversational benchmarks]
