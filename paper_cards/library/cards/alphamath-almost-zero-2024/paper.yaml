  known_failure_modes:
  - Answer equivalence and extraction can be brittle; successful terminal answers do not prove every intermediate step is
    sound; incomplete release of rejected branches, visit counts, and policy versions weakens causal audit; MCTS compute can
    be mistaken for model improvement.
