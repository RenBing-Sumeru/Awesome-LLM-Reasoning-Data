data_object:
  prompt_source: Dense process annotations are costly, yet answer-only math data does not directly say which partial reasoning
    states are promising. AlphaMath asks whether a pretrained model, final-answer supervision, and search can manufacture
    useful process targets without human or GPT-4 step labels.
  trace_author: A policy model expands step-level solutions in MCTS. Terminal answer checks are backed up through the tree
    to form process supervision and value-model targets; the learned value model then guides step-level beam search or further
    MCTS.
  answer_format: math problem; partial solution state; candidate next step; MCTS node and branch; rollout terminal answer;
    correctness result; backed-up node value; selected reasoning path
  process_fields:
  - math problem
  - partial solution state
  - candidate next step
  - MCTS node and branch
  - rollout terminal answer
  - correctness result
  - backed-up node value
  - selected reasoning path
  environment_or_substrate: Search tree or formal proof-search substrate described by the paper.
  verifier_or_reward: Final-answer matching or the task answer checker supplies the terminal outcome; an MCTS-derived value
    model acts as the selector for partial states.
  terminal_predicate: Task answer acceptance or formal proof closure under the reported verifier.
recipe_metadata:
  base_model: See the paper and official repository for experiment-specific policy and selector checkpoints.
  teacher: Search outcomes, verifier feedback, and model/value estimates rather than manual dense step labels.
  generator: A policy model expands step-level solutions in MCTS. Terminal answer checks are backed up through the tree to
    form process supervision and value-model targets; the learned value model then guides step-level beam search or further
    MCTS.
  filtering_rule: Retain or prefer trajectories and steps supported by search values and the paper's verifier contract.
  sampling_protocol: Tree search over partial reasoning or proof states; pin the exact node, rollout, token, and verifier-call
    budget per experiment.
  rollout_count: null
  temperature: null
  inference_budget: Varies by experiment and must be reported with results.
  optimizer_or_scaffold: Search-guided collection and the paper-specific training or inference scaffold.
audit:
