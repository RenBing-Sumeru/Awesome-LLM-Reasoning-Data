data_object:
  prompt_source: LLaVA-1.5 visual-instruction-tuning collection and MathV360K.
  trace_author: Existing image, instruction, and answer records are scored by off-the-shelf models before training.
  answer_format: Image-text-instruction triple with an LLM text-quality score, a CLIP image-text relevance score, and a sampling decision.
  process_fields:
  - image
  - instruction
  - response
  - text_quality_score
  - image_text_relevance_score
  - selection_probability
  environment_or_substrate: Visual instruction tuning of LLaVA-1.5 models.
  verifier_or_reward: Vicuna-7B yes-token probability for text quality and CLIP-ViT-B/32 similarity for image-text relevance.
  terminal_predicate: A record enters the subset when weighted random sampling retains it under both score dimensions.
recipe_metadata:
  base_model: LLaVA-1.5-7B for general visual instruction tuning and LLaVA-1.5-13B for the MathV360K case study.
  teacher: Vicuna-7B evaluates textual suitability; CLIP-ViT-B/32 evaluates image-text relevance.
  generator: No new training records are generated; the method rescores and samples existing records.
  filtering_rule: Construct separate weighted random samples from text-quality and CLIP-score distributions, then keep their intersection.
  sampling_protocol: Kernel-density estimates define a shifted Gaussian target distribution that favors high scores without deterministic top-k truncation.
  rollout_count: null
  temperature: null
  inference_budget: The main experiment selects 665K records, 20% of the LLaVA-1.5 instruction-tuning collection, using only pretrained scoring models.
  optimizer_or_scaffold: Standard second-stage visual instruction tuning after selection, with frozen pretrained vision and language encoders in the main experiment.
audit:
  source_mixture: LLaVA-1.5 visual instruction data and MathV360K; their licenses and upstream provenance require separate verification before reuse.
  split: Nine general VQA benchmarks plus a MathV360K-to-MathVista case study.
  decontamination: The method avoids task-specific scorer training on the target corpus, but the paper does not provide a full contamination audit for all pretrained evaluators or source datasets.
  license: No new dataset is released; verify each upstream collection and the pretrained-model terms before reuse.
  lineage: 'Primary source: https://aclanthology.org/2026.findings-acl.45/'
  known_failure_modes:
  - High-score records can cluster semantically and reduce diversity at small sampling ratios.
  - The general benchmark evidence does not consistently beat full-data or seen-data selectors.
  - Text quality is inferred without the image, so some multimodal usefulness can be missed.
  - No official implementation or selected subset is linked from the ACL paper page.
  citation_status: verified
  confidence: high
  notes: Full ACL Findings paper, author affiliations, method, experimental setup, reported results, and artifact availability were checked on 2026-07-15.
inclusion_reason: It turns multimodal training records into score-bearing sampling decisions, explicitly balancing sample quality and coverage before visual instruction tuning.
