data_object:
  prompt_source: Anthropic-HH, UltraFeedback, PKU-SafeRLHF, and HelpSteer2 preference datasets.
  trace_author: The original dataset providers; this work creates cleaned variants rather than a new preference corpus.
  answer_format: Prompt, two response candidates, preference label, unreliability score, and removal or label-flip treatment.
  process_fields: [prompt, chosen_response, rejected_response, preference_label, cleaning_score, treatment, cleaned_split]
  environment_or_substrate: A standard SFT followed by preference-optimization evaluation pipeline.
  verifier_or_reward: LLM judges, reward-model voting or reward gaps, and heuristic scores identify unreliable records; WinTie and held-out reward evaluate outcomes.
  terminal_predicate: Remove or flip records classified as unreliable according to the selected cleaning method and fraction.
recipe_metadata:
  base_model: Llama-3-8B in the main setting, with additional backbone generalization experiments.
  teacher: GPT-4o is used for one LLM-judge cleaning method and as an evaluation judge; reward-model committees are also used.
  generator: null
  filtering_rule: Compare removal and label-flip treatments after identifying unreliable preference pairs with one of thirteen methods.
  sampling_protocol: The benchmark considers cleaning fractions including 10%, 20%, 30%, and 40% for applicable methods.
  rollout_count: null
  temperature: null
  inference_budget: Some methods require LLM judging or trained reward models, so cleaning cost differs materially by method.
  optimizer_or_scaffold: SFT followed by DPO in the main setting; code also supports CPO, AOT, KTO, IPO, SLiC, rDPO, and ORPO.
audit:
  source_mixture: Official NeurIPS paper, official arXiv record, and official MIT-licensed code repository.
  split: The four target datasets retain their upstream splits; WinTie samples 200 test items in the reported main evaluation.
  decontamination: Upstream preference datasets, trained reward models, and LLM judges must be audited for split overlap and benchmark leakage before reuse.
  license: The code is MIT; verify all upstream dataset, model, and API terms separately.
  lineage: 'Primary source: https://arxiv.org/abs/2509.23564'
