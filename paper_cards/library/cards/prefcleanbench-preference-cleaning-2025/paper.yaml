  citation_status: verified
  confidence: high
  notes: Official paper and code checked; the repository downloads and processes upstream datasets rather than distributing a new dataset.
inclusion_reason: Establishes how preference-record cleaning decisions should be evaluated before those records are consumed by alignment objectives.
