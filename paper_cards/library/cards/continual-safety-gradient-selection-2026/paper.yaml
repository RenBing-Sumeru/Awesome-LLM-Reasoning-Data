data_object:
  prompt_source: Benign continual domain-adaptation instruction datasets, including Dolly and Alpaca variants.
  trace_author: Existing task instruction-response records.
  answer_format: Input-output record, initial aligned-model loss, per-sample gradient norm, loss pre-filter decision, and moderate-gradient selection decision.
  process_fields: [input, target, loss, gradient_norm, selected]
  environment_or_substrate: Sequential supervised fine-tuning of already aligned models under safety and task-performance evaluation.
  verifier_or_reward: Safety is measured by attack success rate and safety-basin metrics; task learning uses ordinary supervised loss.
  terminal_predicate: After loss outlier filtering, retain records closest to the median gradient norm and exclude high-gradient records.
recipe_metadata:
  base_model: Qwen, Llama, and related aligned model families evaluated by the paper.
  teacher: No teacher; gradients are measured on the initial aligned model.
  generator: No synthetic generator.
  filtering_rule: Compute per-record gradient norms, remove loss outliers, and retain the requested fraction closest to the median norm.
  sampling_protocol: Apply selection independently at each task in a sequential continual-fine-tuning stream.
  rollout_count: Not applicable.
  temperature: Not applicable.
  inference_budget: The main moderate-gradient selection ratio is 0.2, with robustness evaluated from 0.1 to 0.4.
  optimizer_or_scaffold: Standard supervised fine-tuning; the method changes records rather than architecture or clipping.
