data_object:
  prompt_source: Existing positive preference examples and their questions across reasoning, code, and truthfulness tasks.
  trace_author: An error-injection model rewrites negative answers from positive-answer sources.
  answer_format: Prompt, chosen answer, error type, injected-error rejected answer, and preference-training pair.
  process_fields: [prompt, chosen, rejected, error_type, severity, selected]
  environment_or_substrate: Preference optimization trained on synthetic chosen-rejected pairs.
  verifier_or_reward: The objective lowers probability of injected negative answers relative to chosen answers; no external reward-model scoring is required for pair construction.
  terminal_predicate: A pair enters training when the negative response contains a targeted strategic error and is paired with the original positive response.
recipe_metadata:
  base_model: Evaluations span 1.5B to 14B models including Llama and Qwen families.
  teacher: A low-capability error injector creates negatives rather than a high-capability reward model selecting them.
  generator: The error injector rewrites answers with correctness, logical, or hallucination-related error patterns.
  filtering_rule: Construct negatives by injecting strategic errors; mix error types or choose task-relevant types for preference optimization.
  sampling_protocol: Start from a positive answer, create an intentionally worse counterpart, then optimize the pair with an error-focused preference objective.
  rollout_count: Not applicable.
  temperature: Not reported.
  inference_budget: The paper compares error types, error severity, source models, and optimization objectives rather than a fixed universal subset size.
  optimizer_or_scaffold: Error-focused preference optimization.
