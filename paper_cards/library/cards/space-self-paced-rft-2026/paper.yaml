recipe_metadata:
  base_model: Qwen3-0.6B, DeepSeek-R1-Distill-Qwen-1.5B, several compact models, and Qwen3-8B-Base.
  teacher: None; online correctness reward and an embedding model inform the schedule.
  generator: One-time joint semantic-attribute clustering, farthest-point reduction, and Thompson-sampling assignment.
  filtering_rule: Keep a fixed diverse quota per cluster; dynamically downweight hard clusters with stagnant solve rates.
  sampling_protocol: Each selected batch is drawn from a bandit-chosen cluster; several settings use at most 10 clusters and
    10 representatives per cluster.
  rollout_count: null
  temperature: null
  inference_budget: Low-resource GRPO; the paper reports sample counts and hyperparameters by dataset.
  optimizer_or_scaffold: GRPO reinforcement fine-tuning implemented with the Open-R1 codebase.
