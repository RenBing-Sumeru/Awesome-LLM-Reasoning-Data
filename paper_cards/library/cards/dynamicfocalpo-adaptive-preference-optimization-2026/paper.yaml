data_object:
  prompt_source: UltraFeedback for Mistral-Base-7B and Llama3-ultrafeedback-armorm for Llama-3-Instruct-8B.
  trace_author: The paper consumes existing chosen-rejected preference pairs rather than generating new traces.
  answer_format: Instruction, preferred response, dispreferred response, implicit reward margin, time-dependent focusing parameter, and loss weight.
  process_fields: [instruction, chosen, rejected, implicit_reward_margin, focusing_parameter, gradient_weight, training_step]
  environment_or_substrate: Offline preference optimization using DPO-style updates.
  verifier_or_reward: Existing preference labels define the chosen-rejected ordering; no new reward model is introduced.
  terminal_predicate: Begin by strongly suppressing misranked pairs and progressively allow them to affect optimization as the focusing parameter decays.
recipe_metadata:
  base_model: Mistral-Base-7B or Llama-3-Instruct-8B in the reported experiments.
  teacher: Existing UltraFeedback-derived preference labels; no additional teacher is needed.
  generator: No generation stage is required by the method.
  filtering_rule: A time-varying focal factor reweights each preference pair according to its current implicit ranking; it is weighting rather than hard record removal.
  sampling_protocol: One epoch with batch size 128 in the main setups; the paper compares linear, exponential, and cosine schedules.
  rollout_count: Not applicable because the method trains on existing preference pairs.
  temperature: Not a central reported control variable.
  inference_budget: No extra response-generation or reward-model inference is introduced beyond the selected preference datasets and benchmark judges.
  optimizer_or_scaffold: DynamicFocalPO, a scheduled extension of FocalPO and DPO.
audit:
  source_mixture: Public UltraFeedback-derived preference datasets for two base-model settings.
  split: AlpacaEval 2.0 and Arena-Hard use external judges; OpenLLM tasks assess general capability; main results average three random seeds.
  decontamination: No broad contamination audit is reported.
