data_object:
  prompt_source: Math-Shepherd MATH and GSM8K problems and answers, while excluding the original process labels.
  trace_author: Policy generators produce stepwise solution trajectories.
  answer_format: Question, reasoning steps, terminal outcome label, trajectory-level pseudo labels, and predicted wrong-buffer-right probabilities per step.
  process_fields: [question, steps, final_outcome, pseudo_step_label, wrong_probability, buffer_probability, right_probability]
  environment_or_substrate: Final-answer correctness supplies weak supervision for stepwise reward classification.
  verifier_or_reward: Correct final outcomes pseudo-label all steps positive and incorrect outcomes pseudo-label all steps negative; a buffer probability reduces the influence of uncertain labels.
  terminal_predicate: The final step is more strongly supervised because it correlates most directly with terminal correctness.
recipe_metadata:
  base_model: Qwen2.5-Math-7B-Instruct.
  teacher: No process-label teacher; final outcome correctness is the only training supervision.
  generator: Qwen2.5-7B, MetaMath-Mistral-7B, Muggle-Math-13B, and Llama-3-70B-Instruct are used in evaluation generation settings.
  filtering_rule: Keep trajectories with terminal labels; use a random buffer factor to prevent every step from collapsing into the uncertainty state.
  sampling_protocol: Train with batch size 16 and learning rate 1e-4; best-of-N evaluation uses up to 128 candidate solutions per MATH-500 problem.
  rollout_count: 128
  temperature: 0.8
  inference_budget: Candidate trajectories are scored stepwise and ranked using the last-step reward.
  optimizer_or_scaffold: Three-way wrong-buffer-right classification with stochastic buffer use and an upweighted final-step loss.
