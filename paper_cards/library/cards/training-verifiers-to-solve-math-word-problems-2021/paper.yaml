data_object:
  prompt_source: GSM8K, with 7,500 training and 1,000 test grade-school math word problems.
  trace_author: GPT-3-family generators fine-tuned for two epochs sample complete natural-language solutions.
  answer_format: per-problem candidate sets containing a natural-language derivation, calculator annotations, and a final
    numeric answer.
  process_fields:
  - problem
  - candidate_solution
  - final_answer
  - outcome_label
  - token_level_verifier_score
  - solution_level_verifier_score
  - sample_rank
  - sample_count
  environment_or_substrate: GSM8K answer matching with an injected calculator protocol for annotated arithmetic spans.
  verifier_or_reward: a learned verifier predicts correctness from the problem and candidate solution; labels come only from
    final-answer correctness.
  terminal_predicate: the selected candidate reaches the reference final answer; oracle test@N asks whether any candidate
    does.
recipe_metadata:
  base_model: GPT-3-family 6B and 175B generators and verifiers.
  teacher: GSM8K reference answers provide binary outcome labels; there is no stronger teacher model.
  generator: a two-epoch fine-tuned generator sampled at positive temperature for candidate-set construction.
  filtering_rule: label every completion by final-answer match, train a verifier, then return the candidate with maximum verifier
    score.
  sampling_protocol: sample 100 completions per training problem for verifier data and 100 per test problem for the main best-of-N
    result; sweep 25 to 3,200 at test time.
  rollout_count: 100
  temperature: 0.7
  inference_budget: candidate count per problem; the paper reports test@N, verifier-ranked solve rate, and top-sample voting
    ablations.
  optimizer_or_scaffold: separate generator and verifier networks; token-level verifier predictions are trained jointly with
    a language-modeling objective.
audit:
  source_mixture: human-written GSM8K problems and solutions plus model-generated candidate solutions.
  split: 7,500 training problems and 1,000 held-out test problems.
  decontamination: GSM8K was newly collected, but model-pretraining overlap is not fully auditable from the paper.
  license: MIT for the official grade-school-math repository.
  lineage: the official repository releases GSM8K and evaluation utilities, not the full 100-way generated rollout pool or
    verifier scores used in the paper.
  known_failure_modes:
  - Final-answer labels can mark flawed reasoning as correct when it reaches the right number accidentally.
  - Oracle test@N measures coverage, not whether the learned verifier can identify a correct candidate.
  - More generator training improves greedy accuracy while collapsing high-temperature candidate diversity.
  - The proprietary GPT-3-family checkpoints and generated verifier-training rollouts are not released.
  citation_status: verified
  confidence: high
  notes: Official arXiv paper and OpenAI grade-school-math repository verified; artifact scope is narrower than the experimental
    rollout data.
inclusion_reason: Foundational best-of-N reasoning paper that makes the candidate pool, outcome labels, verifier, sampling
  temperature, and selection budget explicit.
