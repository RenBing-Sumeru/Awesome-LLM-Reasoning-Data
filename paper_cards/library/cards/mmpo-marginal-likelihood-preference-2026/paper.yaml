data_object:
  prompt_source: Orca DPO Pairs and UltraFeedback-Binarized preference pairs in the reported preference-optimization stage.
  trace_author: Existing public chosen-rejected response pairs; the method introduces no new response-generation step.
  answer_format: Input, chosen response, rejected response, model and reference log probabilities, normalized scores, and MMPO loss contribution.
  process_fields: [instruction, chosen, rejected, policy_log_probability, reference_log_probability, normalized_score, loss_weight]
  environment_or_substrate: Offline preference optimization on a static pairwise dataset.
  verifier_or_reward: Existing chosen-rejected labels provide supervision; MMPO requires no explicit reward model.
  terminal_predicate: Maximize the marginal likelihood of the preferred output approximated by the two responses in each preference pair.
recipe_metadata:
  base_model: Instruction-tuned SmolLM2-135M, SmolLM2-360M, Llama-3.2-1B, or Llama-3-8B in the reported experiments.
  teacher: Existing Orca and UltraFeedback-derived preference labels; no additional teacher is required.
  generator: No generation stage is required by the offline objective.
  filtering_rule: None; MMPO changes the pairwise objective through normalized log-sum-exp scores and an auxiliary DPO-style term.
  sampling_protocol: Combine 12,359 Orca training pairs with 61,135 UltraFeedback-Binarized training pairs; train five epochs across beta values 0.01, 0.05, and 0.5 for analysis.
  rollout_count: Not applicable because training consumes existing preference pairs.
  temperature: Not a central reported control variable.
  inference_budget: No new reward-model or rollout inference is required during optimization; AlpacaEval uses two external judges for evaluation.
  optimizer_or_scaffold: Maximum-marginal-likelihood preference optimization with in-batch score normalization.
