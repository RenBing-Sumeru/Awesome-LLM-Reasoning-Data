data_object:
  prompt_source: Synthetic instruction-following prompts combining general requests with verifiable constraints.
  trace_author: Llama-3.1-70B-Instruct generates prompts and candidate answers; a programmatic constraint verifier scores responses.
  answer_format: Prompt, four to six constraints, chosen response, rejected response, constraint-satisfaction score, curation method, contrast level, and prompt difficulty.
  process_fields: [prompt, constraints, chosen, rejected, score, shared_prefix, contrast, difficulty]
  environment_or_substrate: Offline preference learning on synthetic instruction-following tasks with code-verifiable constraints.
  verifier_or_reward: Programmatic checks for 23 constraints supply fine-grained response scores.
  terminal_predicate: Form a preference pair from high and low verifier scores through rejection sampling or MCTS.
recipe_metadata:
  base_model: Llama-3.1-8B-Instruct in the reported preference-learning experiments.
  teacher: Llama-3.1-70B-Instruct generates the synthetic prompts; a programmatic verifier scores candidates.
  generator: Rejection sampling and Monte Carlo Tree Search produce candidate-response pairs.
  filtering_rule: Control shared prefixes, chosen-rejected score contrast, and prompt difficulty while fixing training-set size.
  sampling_protocol: About 48,000 prompts with four, five, or six non-conflicting verifiable constraints; preference pairs are curated by RS or MCTS.
  rollout_count: Rejection-sampling count and MCTS search budget vary by experimental configuration.
  temperature: Not reported as a universal setting.
  inference_budget: MCTS is more compute-intensive than rejection sampling; the paper compares its marginal benefit against that cost.
  optimizer_or_scaffold: Preference learning on automatically curated chosen-rejected pairs.
audit:
  source_mixture: Synthetic prompts and model-generated responses scored by programmatic instruction constraints.
  split: Evaluates IFEval and synthetic instruction-following tasks at four, five, and six constraints.
  decontamination: Synthetic prompt generation and semantic deduplication are described, but no broad pretraining-contamination audit is reported.
