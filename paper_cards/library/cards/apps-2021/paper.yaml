data_object:
  prompt_source: Ten thousand natural-language programming problems from introductory to competition-level difficulty.
  trace_author: Reference solutions and test cases collected by the benchmark authors; model programs are evaluated downstream.
  answer_format: Natural-language specification, starter code where applicable, input/output examples, candidate Python program,
    and test outcomes.
  process_fields:
  - problem difficulty
  - input-output tests
  - candidate program
  - execution result
  - test pass rate
  environment_or_substrate: Sandboxed Python execution with public and private test cases.
  verifier_or_reward: Functional correctness under test execution.
  terminal_predicate: Candidate program passes the designated test cases.
recipe_metadata:
  base_model: Benchmark rather than a single model; original work fine-tunes GPT-style baselines.
  teacher: Reference programs and tests.
  generator: Curated coding-challenge tasks and downstream code-generation policies.
  filtering_rule: Test execution decides functional correctness; task quality depends on test coverage and isolation.
  sampling_protocol: Test-case pass rate and task-level pass@k are typical downstream metrics.
  rollout_count: null
  temperature: null
  inference_budget: Sampling count and repair loop must be disclosed by users of APPS as a reward environment.
  optimizer_or_scaffold: Supports supervised fine-tuning, execution-filtered sampling, code RL, and evaluation.
audit:
  source_mixture: Public coding challenges, reference programs, and hidden/public test cases.
  split: Preserve official train/test partitions and protect private tests from training or reward tuning.
  decontamination: Public challenge statements, solutions, and tests may be present in code and web corpora.
  license: MIT repository license; source-task terms require separate review before redistribution.
  lineage: Foundational execution-verifier benchmark used by CodeRL and later coding-agent work.
  known_failure_modes:
  - Tests can under-specify intended behavior.
  - Public or leaked tests reward benchmark memorization.
  - Sandbox and dependency differences can make execution non-reproducible.
  citation_status: verified
  confidence: high
  notes: Official arXiv and GitHub sources confirm the ten-thousand-problem benchmark and test-execution evaluation.
inclusion_reason: Landmark code benchmark that makes program execution and test outcomes explicit training and evaluation
  records.
