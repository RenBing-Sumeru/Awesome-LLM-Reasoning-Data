data_object:
  prompt_source: UltraFeedback for open-domain alignment and Anthropic-HH for harmlessness alignment, with UltraChat-200k or Alpaca used to prepare base-model SFT checkpoints.
  trace_author: Existing chosen and rejected responses; AAO derives token embeddings, cross-answer similarity scores, token groups, and loss weights during training.
  answer_format: Prompt, chosen response, rejected response, token embeddings, normalized maximum cross-answer similarities, adaptive thresholds, token group, and token weight.
  process_fields: [instruction, chosen, rejected, token_similarity, ambiguous_token, transitional_token, key_token, adaptive_thresholds, token_weight]
  environment_or_substrate: Offline DPO-style optimization with token-level logit reweighting and a reference policy.
  verifier_or_reward: Source preference labels specify chosen and rejected responses; semantic similarity from the model's own embeddings determines token weighting.
  terminal_predicate: Highly similar cross-answer tokens are suppressed, dissimilar key tokens are emphasized, and transitional tokens retain unit weight.
recipe_metadata:
  base_model: Llama-3.1-8B and Mistral-7B in base and instruction-tuned settings.
  teacher: Existing preference labels; AAO introduces no external reward model or annotation pass.
  generator: No generation stage is added to the preference corpus.
  filtering_rule: No hard filtering; calculate each token's maximum normalized similarity to tokens in the opposite response and reweight token logits using adaptive thresholds.
  sampling_protocol: AdamW for one epoch, batch size 16, and learning rate 5e-7 in the reported AAO setup.
  rollout_count: Not applicable to the offline preference records.
  temperature: Not a central reported training variable.
  inference_budget: Adds token-embedding similarity, a lightweight adaptive module, and auxiliary losses; reported Mistral training time rises from 77.81 to 78.12 minutes.
  optimizer_or_scaffold: Ambiguity Awareness Optimization, a token-reweighted DPO-compatible objective.
audit:
  source_mixture: Public preference data combined with model-derived cross-answer token similarities and learned threshold outputs.
  split: AlpacaEval 2, MT-Bench, Arena-Hard, and Llama-Guard safety evaluation; base-model safety uses prompts mixed from AdvBench and JailbreakBench.
  decontamination: No broad contamination audit is reported.
  license: Verify the terms for UltraFeedback, Anthropic-HH, UltraChat, Alpaca, benchmarks, models, and the implementation before reuse.
