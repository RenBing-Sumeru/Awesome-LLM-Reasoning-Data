  answer_format: Prompt, sampled responses, reward scores, mean reward difficulty estimate, chosen-rejected pair, and keep-or-prune decision.
  process_fields: [prompt, responses, rewards, mean_reward, chosen, rejected, selected]
  environment_or_substrate: DPO-based self-play preference optimization.
  verifier_or_reward: A reward model scores sampled responses; mean reward across samples is used as prompt difficulty.
  terminal_predicate: Keep the easiest portion of prompts by mean reward before constructing DPO pairs; the reported compact setting keeps 30 percent.
recipe_metadata:
  base_model: The paper studies instruction-tuned language models including Llama-3.1-8B-Instruct.
  teacher: A reward model supplies response scores.
  generator: The policy samples ten responses per prompt for stable difficulty ranking.
  filtering_rule: Rank prompts by mean reward of sampled responses and prune low-mean-reward, difficult prompts.
  sampling_protocol: Select highest-reward response as chosen and lowest-reward response as rejected, then train DPO on the retained prompt subset.
  rollout_count: 10
  temperature: Not reported as a selection parameter.
  inference_budget: The reported compact policy retains the easiest 30 percent of prompts.
  optimizer_or_scaffold: Direct Preference Optimization.
