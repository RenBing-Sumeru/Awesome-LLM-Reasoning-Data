data_object:
  prompt_source: RLHF-V's 5K multimodal preference pairs.
  trace_author: Existing RLHF-V preference-data authors; TPO computes new token rewards during training.
  answer_format: Image, prompt, chosen and rejected response tokens, corrupted-image logits, visual-anchor score, and self-calibrated reward.
  process_fields:
  - image
  - corrupted_image
  - prompt
  - chosen_response
  - rejected_response
  - token_logit_difference
  - visual_anchored_reward
  - token_preference_loss
  environment_or_substrate: Vision-language preference optimization for hallucination mitigation.
  verifier_or_reward: Difference between token logits conditioned on the original image and a noise-corrupted image.
  terminal_predicate: Higher visual sensitivity is rewarded in positive responses and inversely calibrated in negative responses.
recipe_metadata:
  base_model: LLaVA-1.5-7B, LLaVA-1.5-13B, and Qwen2-VL-7B.
  teacher: The policy and reference models self-calibrate token rewards; no external token annotator is used.
  generator: No new responses; corrupt the image embedding and rescore tokens at every training step.
  filtering_rule: None; all tokens receive dynamic visual-anchored reward values, with stronger values for visually dependent tokens.
  sampling_protocol: Use the 5K RLHF-V preference pairs without their fine-grained human annotations; test different image-noise steps and margin values.
  rollout_count: null
  temperature: null
  inference_budget: Requires repeated image corruption and extra forward scoring during training; code is officially released.
  optimizer_or_scaffold: Token Preference Optimization with a self-calibrated visual-anchored DPO objective.
audit:
  source_mixture: RLHF-V 5K preference data and image corruption generated online at training time.
  split: AMBER, MMHal-Bench, HallusionBench, SEED-Bench, MMBench, LLaVA-Bench, and MM-Vet.
  decontamination: No dedicated contamination audit is reported; source/evaluation overlap and image-license conditions need independent review.
  license: Verify RLHF-V, official repository, backbone-model, and image-data terms before reuse.
  lineage: 'Primary sources: https://aclanthology.org/2025.findings-emnlp.1076/; https://github.com/alibaba/TPO'
  known_failure_modes:
  - Noise level and reward margin require tuning; the paper finds a middle corruption level best.
  - Token visual relevance may not capture every kind of hallucination or reasoning error.
  - The method incurs additional per-step image corruption and scoring cost.
  - The limitation section proposes broader object-specific corruption rather than demonstrating it.
  citation_status: verified
  confidence: high
  notes: Full EMNLP Findings paper, authors, affiliations, method, data use, results, limitations, and official code link were checked on 2026-07-16.
inclusion_reason: It changes the reward weight consumed for every token in an existing multimodal preference pair according to dynamically measured visual grounding.
