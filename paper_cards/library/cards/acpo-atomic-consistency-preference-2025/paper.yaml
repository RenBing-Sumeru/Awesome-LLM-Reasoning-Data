data_object:
  prompt_source: The 2,097-example LongFact training split supplies long-form factoid questions.
  trace_author: The policy being aligned generates 30 stochastic long-form responses per question.
  answer_format: Question, sentence-level atomic facts, semantic clusters, consistency labels, response scores, and chosen-rejected response pairs.
  process_fields: [question, responses, atomic_facts, sentence_embeddings, clusters, consistency_threshold, response_score, chosen, rejected]
  environment_or_substrate: Sentence tokenization, SimCSE embeddings, agglomerative clustering, and offline DPO.
  verifier_or_reward: Cluster frequency is a self-supervised factuality proxy; facts in clusters of size at least two are rewarded and rarer facts are penalized.
  terminal_predicate: For each question, sort sampled responses by atomic-consistency score and retain the highest-scoring response as chosen and the lowest as rejected.
recipe_metadata:
  base_model: Llama-3-8B-Instruct and Phi-3-mini-4k-instruct.
  teacher: No external teacher or knowledge base; the model's own multiple sampled responses supply the signal.
  generator: The base policy generates 30 responses per LongFact question.
  filtering_rule: Cluster semantically similar sentence facts with cosine-distance threshold 0.15; classify clusters with count at least two as consistent; rank responses by plus-one or minus-one fact scores.
  sampling_protocol: 30 responses per question; the reported consistency threshold is two.
  rollout_count: 30.
  temperature: null
  inference_budget: Training-time sampling and clustering are required; direct decoding at deployment needs no additional selector.
  optimizer_or_scaffold: DPO with beta 0.1 over self-constructed chosen-rejected pairs.
audit:
  source_mixture: LongFact prompts, policy-generated responses, sentence embeddings, frequency-derived clusters, and self-constructed preference pairs.
  split: Train on LongFact's 2,097 examples; evaluate LongFact and BioGen test splits.
  decontamination: The paper does not report a dedicated contamination audit beyond using the stated benchmark splits.
  license: The paper states that used datasets and methods follow Apache 2.0 or MIT terms; verify upstream benchmark and repository terms before reuse.
  lineage: 'Primary source: https://aclanthology.org/2025.ijcnlp-long.106/'
