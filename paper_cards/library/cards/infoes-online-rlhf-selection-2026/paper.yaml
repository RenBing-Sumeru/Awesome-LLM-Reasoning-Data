data_object:
  prompt_source: HH-RLHF, PKU-SafeRLHF, HelpSteer, UltraChat, UltraInteract, and related preference sources.
  trace_author: The current policy generates online rollout experiences.
  answer_format: Prompt, rollout response, reward, log probability, value, advantage, validation-gradient feature, influence score, and selection decision.
  process_fields:
  - prompt
  - response
  - reward
  - advantage
  - validation_gradient
  - policy_gradient
  - influence
  - selected
  environment_or_substrate: Online RLHF rollout buffer with objective-specific validation prompts.
  verifier_or_reward: A TinyLlama-1.1B reward model provides feedback; the validation set embodies helpfulness or harmlessness objectives.
  terminal_predicate: Experiences whose objective influence exceeds a threshold are used for the policy update.
recipe_metadata:
  base_model: TinyLlama-1.1B and Alpaca-7B.
  teacher: A reward model trained on public preference mixtures plus validation prompts for the intended objective.
  generator: The current policy produces rollout experiences at every RL round.
  filtering_rule: Retain experiences with positive influence, measured by the inner product of validation-return gradient and per-experience RL gradient.
  sampling_protocol: Greedily generate validation responses each round, collect a rollout buffer, score every experience, then filter before policy optimization.
  rollout_count: null
  temperature: null
  inference_budget: The main threshold discards the 15% least influential experiences each round; eight validation prompts already give strong performance.
  optimizer_or_scaffold: Plug-in selection for PPO, GRPO, and REINFORCE++ within OpenRLHF, using LoRA.
audit:
  source_mixture: Public helpfulness, harmlessness, conversation, math, and programming prompt sources.
  split: Validation prompts are drawn from PKU-SafeRLHF; training evaluates HH-RLHF, PKU-SafeRLHF, and a 50K mixed-prompt dataset.
  decontamination: No complete cross-dataset contamination audit is reported.
  license: Verify all preference-source, model, reward-model, and repository terms before reuse.
  lineage: 'Primary sources: https://aclanthology.org/2026.acl-long.2206/; https://github.com/paraGONG/InfOES'
  known_failure_modes:
  - Evaluations do not cover 32B-or-larger models.
  - The method focuses on one alignment objective at a time.
  - Reward-model errors can make relevant experiences appear harmful.
  - Influence estimation adds gradient and storage overhead.
  citation_status: verified
  confidence: high
  notes: Full ACL paper, affiliations, objective, data, experiments, limitations, and declared repository were checked on 2026-07-15.
inclusion_reason: It makes the contribution of a live rollout experience to a stated alignment objective decide whether that experience updates the policy.
