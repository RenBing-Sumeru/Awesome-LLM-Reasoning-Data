data_object:
  prompt_source: Reddit TLDR, Anthropic Helpful and Harmless, UltraFeedback, and two on-policy UltraFeedback variants.
  trace_author: Preference datasets provide chosen and rejected responses; iterative DPO generates new candidates from the current policy.
  answer_format: Prompt, chosen response, rejected response, external and implicit reward margins, aggregated preference probability, and selected-subset flag.
  process_fields: [prompt, chosen, rejected, external_margin, implicit_margin, aggregated_probability, selected]
  environment_or_substrate: Offline and iterative DPO data-curation pipelines.
  verifier_or_reward: Skywork-Reward-Llama-3.1-8B-v0.2 provides external margins; the small DPO model provides implicit margins.
  terminal_predicate: Retain preference pairs with high Bayesian-aggregated confidence under all margin sources.
recipe_metadata:
  base_model: Llama-3.2-3B, Llama-3-8B, Mistral-7B, Qwen-2.5-7B, and Qwen-2.5-14B variants.
  teacher: Skywork reward model for external-margin signals; GPT-4 is the reported proxy evaluator where a human oracle is unavailable.
  generator: Original preference collections and current policies in iterative DPO.
  filtering_rule: Estimate external and implicit margins, map them to preference probabilities, combine them with strict Bayesian aggregation, and select high-confidence pairs.
  sampling_protocol: A 2,000-record seed trains the small implicit-margin model; main studies select 2,000 or 6,000 records, and iterative DPO retains 5,000 of 20,000 prompts per round.
  rollout_count: 5
  temperature: 0.7
  inference_budget: Three iterative DPO rounds are reported for the online setting.
  optimizer_or_scaffold: DPO with beta 0.1 except TLDR beta 0.5; selected subsets are also tested with IPO, KTO, and SLiC.
audit:
  source_mixture: Human or model-scored preference pairs, an external reward model, a seed DPO model, and optionally on-policy generated pairs.
  split: TLDR, HH, UltraFeedback, Llama-UltraFeedback, and Mistral-UltraFeedback with reported task-specific evaluation splits.
  decontamination: Not described as a dedicated contamination audit.
