data_object:
  prompt_source: One thousand prompts sampled from AlpaGasus and translated into nine languages, with English as the tenth language in the reported multilingual setup.
  trace_author: The current policy generates four responses per prompt; the policy self-evaluates them to form preference pairs.
  answer_format: Language-tagged instruction, four generated responses, self-evaluation scores, chosen-rejected pair, per-sample gradient similarity, and selection decision.
  process_fields: [language, instruction, responses, self_reward, chosen, rejected, sample_gradient, consensus_similarity, selected]
  environment_or_substrate: Iterative multilingual self-rewarding followed by length-penalized DPO.
  verifier_or_reward: The current model self-evaluates generated responses; GPT-4o is used only for the reported Aya evaluation.
  terminal_predicate: Retain the top-scoring preference samples whose gradients align with a de-conflicted cross-lingual consensus direction.
recipe_metadata:
  base_model: Llama 3-8B-Instruct or Gemma 2-2B-Instruct in the reported experiments.
  teacher: No external preference annotator is required for construction; the current policy supplies self-reward judgments.
  generator: The current multilingual policy generates four responses for each prompt in every iteration.
  filtering_rule: Compute language gradient EMAs, de-conflict them with PCGrad, score each sample by cosine similarity to the resulting consensus gradient, and retain the top fraction per language.
  sampling_protocol: Split one thousand prompts into ten non-overlapping language partitions of one hundred prompts; select the top 50% per language in the principal setup.
  rollout_count: Four responses per prompt before preference-pair construction.
  temperature: Generation settings are reported in the implementation details rather than treated as the contribution's control variable.
  inference_budget: Five iterative rounds add response generation, self-evaluation, gradient filtering, and DPO; the reported Gemma 2-2B pipeline takes about 69 rather than 62 minutes for five epochs.
  optimizer_or_scaffold: Iterative self-rewarding with length-penalized DPO and PCGrad-inspired conflict removal.
audit:
  source_mixture: AlpaGasus prompts translated with Google Translate and preference pairs generated and self-scored by the evolving policy.
  split: Seen-language evaluation uses Aya; unseen-language analysis uses Hindi, Vietnamese, and Russian; alignment-tax checks use Global MMLU and multilingual ARC Challenge.
  decontamination: No broad contamination audit is reported.
  license: Verify AlpaGasus, Google Translate, base-model, evaluator, and code licenses or terms before reproducing the pipeline.
