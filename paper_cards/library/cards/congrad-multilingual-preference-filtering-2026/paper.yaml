one_line_summary: CONGRAD filters self-generated multilingual preference pairs by their alignment with a de-conflicted consensus gradient before DPO consumes them.
reading_priority: essential
paper_type: Multilingual preference-data filtering and iterative alignment study
best_for: Readers designing multilingual preference-learning pipelines that must retain useful cross-lingual transfer without letting one language's updates damage another's.
