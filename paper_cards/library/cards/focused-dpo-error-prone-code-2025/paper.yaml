data_object:
  prompt_source: Programming concepts extracted from real repositories and synthesized coding problems.
  trace_author: Each backbone samples code candidates and test cases; execution-derived ranking and common-prefix/suffix matching identify pairs.
  answer_format: Problem, tests, chosen code, rejected code, common prefix, error-prone middle segment, common suffix, and rank gap.
  process_fields: [problem, tests, chosen_code, rejected_code, prefix, chosen_mid, rejected_mid, suffix, rank]
  environment_or_substrate: Executable Python code generation with test-based ranking and DPO.
  verifier_or_reward: Generated tests and a PageRank-inspired ordering score executable candidates.
  terminal_predicate: Select pairs whose different middle segment has high correctness impact while surrounding prefix and suffix are shared.
recipe_metadata:
  base_model: DeepSeekCoder-base-6.7B, Qwen2.5-Coder-7B, and reported instruction-tuned derivatives.
  teacher: No human annotator; execution outcomes and generated tests provide supervision.
  generator: Each backbone samples ten code candidates and corresponding tests for each problem at temperature 1.5.
  filtering_rule: Maximize rank difference and shared-prefix/suffix length to isolate the high-impact divergent middle; retain 5,000 training and 1,000 validation examples per policy.
  sampling_protocol: Ten candidates per prompt, ten training epochs, and focused middle weight two.
  rollout_count: Ten code candidates per problem.
  temperature: 1.5 for candidate and test generation.
  inference_budget: Requires sampling, test generation, execution/ranking, and segment matching before DPO.
  optimizer_or_scaffold: Focused-DPO, with a weighted middle-code reward and reduced rejected-suffix contribution.
