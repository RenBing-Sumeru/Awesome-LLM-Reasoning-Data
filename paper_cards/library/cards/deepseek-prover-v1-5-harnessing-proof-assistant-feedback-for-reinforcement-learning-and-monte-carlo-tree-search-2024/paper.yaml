data_object:
  prompt_source: Whole-proof generation wastes useful partial progress and struggles to explore diverse formal proof paths.
    The paper asks how proof-assistant feedback can train a Lean prover and how Monte Carlo search can expand beyond independent
    whole-proof samples.
  trace_author: The model is specialized and supervised on formal proofs, refined with reinforcement learning from proof-assistant
    feedback, then used by RMaxTS. RMaxTS explores whole-proof paths with an intrinsic reward intended to favor diverse promising
    attempts.
  answer_format: Lean theorem and imports; generated proof candidate; proof-assistant response; valid or failed proof path;
    RMaxTS node; intrinsic reward; selected path; terminal kernel verdict; search budget
  process_fields:
  - Lean theorem and imports
  - generated proof candidate
  - proof-assistant response
  - valid or failed proof path
  - RMaxTS node
  - intrinsic reward
  - selected path
  - terminal kernel verdict
  - search budget
  environment_or_substrate: Search tree or formal proof-search substrate described by the paper.
  verifier_or_reward: Lean 4 and mathlib provide executable proof validity and terminal closure; RMaxTS combines policy likelihood,
    search statistics, and intrinsic reward to select expansions.
  terminal_predicate: Task answer acceptance or formal proof closure under the reported verifier.
