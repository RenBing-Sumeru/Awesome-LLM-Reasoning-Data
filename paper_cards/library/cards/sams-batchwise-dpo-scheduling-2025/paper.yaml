data_object:
  prompt_source: Fixed offline preference datasets, including Anthropic-HH, SHP, and generated UltraFeedback preference data in the reported experiments.
  trace_author: Upstream preference-data creators; SamS does not create a new preference corpus.
  answer_format: Prompt, chosen response, rejected response, model-state representation, scheduler score, and selected-batch membership.
  process_fields: [prompt, chosen_response, rejected_response, dpo_loss, preference_margin, model_uncertainty, scheduler_score, selected]
  environment_or_substrate: Offline DPO training batches with a learned contextual-bandit scheduler.
  verifier_or_reward: A combined batch-level loss-reduction reward and sample-level preference-margin plus uncertainty reward.
  terminal_predicate: Select the top-K records scored by the scheduler from each incoming DPO batch.
recipe_metadata:
  base_model: Pythia-2.8B, Mistral-7B, Llama-3-8B, and Gemma-2-9B in the reported experiments.
  teacher: PairRM and ArmoRM are used as automatic reward models in the reported evaluations; no teacher generates the source preference pairs.
  generator: null
  filtering_rule: At each round, retain the top-K records predicted to maximize a combined generalization and sample-level reward.
  sampling_protocol: The reported main setting draws 64 preference pairs per batch and schedules 32 for the policy update.
  rollout_count: null
  temperature: null
  inference_budget: The lagged scheduler update reuses training feedback; the paper reports marginal added overhead and reduced GPU-memory consumption.
  optimizer_or_scaffold: Direct Preference Optimization with a contextual-bandit scheduler and exploration network.
audit:
  source_mixture: Official NeurIPS paper, official arXiv record, and official code repository.
  split: The paper evaluates instruction following with AlpacaEval 2 and MT-Bench and studies generalization on Anthropic-HH and SHP.
  decontamination: SamS reuses public preference data; downstream reuse must retain the original split and benchmark-leakage controls.
  license: Verify the licenses and terms of every upstream preference dataset, model, and automatic judge before reuse.
