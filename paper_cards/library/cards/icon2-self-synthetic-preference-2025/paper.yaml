data_object:
  prompt_source: One million English instructions self-synthesized from model-specific pre-query templates.
  trace_author: Llama3-8B or Qwen2-7B generates two controlled responses for each filtered instruction.
  answer_format: Instruction, assigned preference criterion, positive-steered response, negative-steered response, and consistency score.
  process_fields: [instruction, criterion, consistency_score, chosen_response, rejected_response, control_layers, steering_strength]
  environment_or_substrate: Offline preference-data construction followed by DPO.
  verifier_or_reward: Layer-wise preference directions extracted from contrastive control instructions; no external judge labels the generated pairs.
  terminal_predicate: Retain self-synthesized instructions with high inherent consistency and generate a positive-versus-negative controlled response pair.
recipe_metadata:
  base_model: Llama3-8B Base and Qwen2-7B Base after UltraChat-200k supervised fine-tuning.
  teacher: Contrastive control instructions define honesty, harmlessness, helpfulness, and general preference directions.
  generator: The target aligned model self-synthesizes instructions and generates positive- and negative-steered responses.
  filtering_rule: Score every instruction by the maximum layerwise dot-product consistency with a criterion direction and retain the highest-scoring records.
  sampling_protocol: One million raw instructions are reduced to 100,000, with 98,000 for training and 2,000 for validation; 1,024 Alpaca samples derive direction vectors.
  rollout_count: 2
  temperature: null
  inference_budget: Direction extraction costs 2.2 GPU hours and 100K consistency calculations cost 8.6 GPU hours in the reported Llama3-8B comparison.
  optimizer_or_scaffold: One offline DPO epoch with beta 0.1; global batch size 128 and learning rate 5e-7.
audit:
  source_mixture: Self-synthesized instructions, contrastive preference directions, and representation-steered response pairs.
  split: 98K training and 2K validation records from a 100K filtered instruction collection.
  decontamination: The paper reports a leakage analysis in its appendix; no full benchmark decontamination protocol is described in the main method.
  license: Verify base-model, UltraChat, Alpaca, and any future release terms before reuse.
  lineage: 'Primary source: https://aclanthology.org/2025.emnlp-main.196/'
  known_failure_modes: [No online-DPO validation, Single-turn preference construction, Base-model bias propagation, Steering hyperparameter sensitivity, No public code or data declared]
  citation_status: verified
  confidence: high
  notes: Full EMNLP paper was checked on 2026-07-16; no paper-declared code or data release was found.
inclusion_reason: It changes both instruction retention and preference-pair creation so that model-internal preference directions determine the records consumed by DPO.
