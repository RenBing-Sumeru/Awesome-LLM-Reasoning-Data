data_object:
  prompt_source: LIMO mathematics prompts; GPQA-Diamond and LiveCodeBench are used for cross-domain evaluation.
  trace_author: DeepSeek-R1, Qwen3-32B-Instruct, and QwQ-32B generate answer-verified candidate responses.
  answer_format: Prompt, answer-correct long reasoning response, step segmentation, and LALP score.
  process_fields:
  - teacher
  - response
  - step
  - local_log_probability
  environment_or_substrate: Qwen2.5 and Llama students score candidate responses before SFT.
  verifier_or_reward: Final-answer correctness verifies candidates; LALP ranks their local transition quality.
  terminal_predicate: Retain the highest-LALP candidate response for a prompt.
recipe_metadata:
  base_model: Qwen2.5-7B-Instruct, Qwen2.5-32B-Instruct, and Llama-3.1-8B-Instruct.
  teacher: DeepSeek-R1, Qwen3-32B-Instruct, and QwQ-32B.
  generator: Teachers generate multiple answer-verified long-form responses per prompt.
  filtering_rule: Segment responses and select the candidate with the highest local average log probability under the student.
  sampling_protocol: Teacher ranking uses 817 prompts; the paper reports that 200 prompts recover the same ranking.
  rollout_count: null
  temperature: null
  inference_budget: LALP needs one local scoring pass per step; selection is a one-time preprocessing cost.
  optimizer_or_scaffold: SFT on teacher-selected or per-prompt selected response data.
audit:
  source_mixture: LIMO prompt data and answer-verified traces from three teacher models.
  split: Teacher-selection analysis uses 817 prompts; reported task evaluation includes math, GPQA-Diamond, and LiveCodeBench.
  decontamination: Check overlap between teacher traces, LIMO prompts, and evaluation benchmarks before reuse.
  license: The paper is on arXiv; underlying prompt and benchmark licenses require separate checks.
  lineage: 'Primary source: https://arxiv.org/abs/2510.03988'
  known_failure_modes:
  - Step segmentation itself uses GLM-4.5-Air and can affect scoring.
  - LALP is more expensive than one-pass global scoring.
  - Evidence is for long, heterogeneous teacher traces, not every SFT regime.
