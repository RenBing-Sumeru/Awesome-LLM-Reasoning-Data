data_object:
  prompt_source: Theorems, definitions, and proofs extracted from a pinned mathlib revision.
  trace_author: Human Lean proof authors; models contribute candidate tactics during interaction.
  answer_format: Theorem, local proof state, accessible premises, candidate tactic, next proof state, and final checker verdict.
  process_fields:
  - theorem declaration
  - proof state
  - tactic
  - accessible premise set
  - next state
  - kernel response
  environment_or_substrate: Programmatic Lean 3/Lean 4 interaction environment with a pinned mathlib commit.
  verifier_or_reward: Lean proof-environment response and terminal kernel acceptance.
  terminal_predicate: All proof goals close under the configured Lean environment.
recipe_metadata:
  base_model: ReProver retrieval-augmented tactic generator.
  teacher: Human-written mathlib proofs and premise-use annotations.
  generator: The tactic model interacts with Lean and retrieves accessible premises.
  filtering_rule: Environment transitions reject invalid tactics; novel-premises split controls memorization shortcuts.
  sampling_protocol: Pass@1 under a wall-time budget plus premise-retrieval metrics.
  rollout_count: null
  temperature: null
  inference_budget: Ten-minute wall time per theorem in the reported theorem-proving evaluation.
  optimizer_or_scaffold: Open proof-data extraction, retrieval training, and interactive proof-search environment.
audit:
  source_mixture: 96962 theorems, 128163 premises, and 212787 extracted tactics from the pinned mathlib revision.
  split: Random and novel-premises splits; the latter prevents test proofs from relying only on premises used during training.
  decontamination: Public mathlib proofs may be in pretraining corpora; split policy and repository revision are critical.
  license: The paper reports an MIT-licensed open release; review upstream mathlib licensing for derivative use.
  lineage: Reproducible Lean interaction and data extraction bridge proof benchmarks to state-action reasoning data.
  known_failure_modes:
  - Mismatched Lean, mathlib, or import versions change checker behavior.
  - Proof-environment wrappers can misjudge valid proofs.
  - Retrieval can mask memorization unless premise-aware splits are used.
  citation_status: verified
  confidence: high
  notes: Official NeurIPS and arXiv sources document data extraction, the pinned mathlib revision, novel-premises split, and
    environment reliability.
inclusion_reason: High-quality formal-proof data and environment paper that records state-action proof traces, premise constraints,
  and kernel-checked terminal outcomes.
