data_object:
  prompt_source: Fine-grained preference subsets derived from UltraFeedback and HelpSteer.
  trace_author: Existing chosen and rejected response pairs, grouped by their annotated sub-preference aspect.
  answer_format: Aspect label, prompt, chosen response, rejected response, proxy reward gaps, preference-divergence score, and selection flag.
  process_fields: [sub_preference, prompt, chosen, rejected, proxy_reward_gaps, preference_divergence, selected]
  environment_or_substrate: Offline DPO after cross-aspect preference-data selection.
  verifier_or_reward: Small proxy reward models estimate each aspect's pseudo-reward gap on records from other aspects.
  terminal_predicate: Retain records with the most negative estimated preference-divergence values under the selection budget.
recipe_metadata:
  base_model: Llama-3.1-8B and Qwen2.5 variants in the reported studies.
  teacher: Fine-grained preference annotations from UltraFeedback and HelpSteer; smaller proxy reward models estimate cross-aspect signals.
  generator: Not applicable; the main experiments filter existing pairwise preference data.
  filtering_rule: Train de-biased proxy reward models, estimate cross-aspect gaps, quantile-normalize them, and retain the most negative preference-divergence records.
  sampling_protocol: The main selection comparison uses a 30 percent budget; the paper also studies budgets from 20 to 50 percent.
  rollout_count: null
  temperature: null
  inference_budget: Reported GPU-hour tables include proxy-model selection and final DPO training.
  optimizer_or_scaffold: Standard DPO on the selected subset, with length-balanced proxy-reward training and a length penalty.
