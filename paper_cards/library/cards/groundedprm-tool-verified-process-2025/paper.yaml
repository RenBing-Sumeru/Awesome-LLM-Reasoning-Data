data_object:
  prompt_source: MATH problems used to create training trajectories; ProcessBench and six math sets evaluate process scoring and reward-guided search.
  trace_author: A policy LLM generates tree-structured intermediate reasoning steps through MCTS.
  answer_format: Problem, ordered reasoning trace, tool query and outcome, step correctness, hybrid reward, binary label, and natural-language rationale.
  process_fields: [problem, trajectory, step, tool_query, tool_verdict, outcome_correctness, hybrid_reward, binary_label, rationale]
  environment_or_substrate: MCTS over reasoning states with Wolfram Alpha or SymPy-style mathematical verification and final-answer checking.
  verifier_or_reward: External tool validation supplies step correctness; final outcome and backpropagated rollout values are fused into hybrid rewards.
  terminal_predicate: Keep complete, consistent, tool-verifiable traces and format them as generative reward-label-plus-rationale supervision.
recipe_metadata:
  base_model: Qwen2.5-7B-Instruct for the reported PRM fine-tuning.
  teacher: External mathematical tools provide step verification; no human step labels are required for the constructed 40K records.
  generator: LLM generation expands MCTS nodes into candidate next reasoning steps and rollouts.
  filtering_rule: Remove incomplete, inconsistent, or tool-unverifiable traces after multi-round MCTS and hybrid reward calculation.
  sampling_protocol: LoRA rank 128, six epochs, per-device batch size four with eight gradient-accumulation steps, learning rate 3e-5.
  rollout_count: Multi-round MCTS; exact aggregate rollout count is not reported in the paper.
  temperature: Not a central reported variable.
  inference_budget: Requires MCTS expansion, LLM rollouts, tool calls, final-answer checks, and reward aggregation before PRM training.
  optimizer_or_scaffold: Generative PRM trained autoregressively to output correctness labels and rationales.
