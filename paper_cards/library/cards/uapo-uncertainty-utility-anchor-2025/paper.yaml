  verifier_or_reward: A learned prompt-conditioned utility anchor models uncertain preference labels; no external verifier is required.
  terminal_predicate: The anchor provides a reference utility against which response preference and uncertainty are optimized.
recipe_metadata:
  base_model: Mistral-Instruct, Llama-3-Instruct, and Gemma-2-Instruct.
  teacher: Existing preference annotations and a learned utility-anchor representation.
  generator: No new generation; the method reuses paired and unpaired records.
  filtering_rule: None; construct multiple data forms so unpaired records can enter the objective rather than being discarded for lacking a win/lose partner.
  sampling_protocol: Evaluate paired training and multiple-dataset training, including a SimUAPO variant with a constant reward anchor.
  rollout_count: null
  temperature: null
  inference_budget: UAPO uses three forward/backward passes for three data pairs according to the paper; no official code or independent cost report is declared.
