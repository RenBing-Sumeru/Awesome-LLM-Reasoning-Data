data_object:
  prompt_source: Small language models need both stronger search and trustworthy intermediate selection, but superior-model
    distillation obscures where reasoning capability comes from. rStar-Math studies whether verified MCTS traces can bootstrap
    both a math policy and its process preference model.
  trace_author: The policy expands code-augmented chains in MCTS, execution and answer checks validate outcomes, and complete
    trees are converted into successful SFT trajectories plus sibling-step preference pairs for a process preference model.
    Policy and PPM are retrained and used in the next round.
  answer_format: math question; code-augmented reasoning step; executable snippet and result; MCTS parent/child relation;
    complete rollout; terminal answer; visit/value statistics; SFT trace; sibling preference pair; evolution round
  process_fields:
  - math question
  - code-augmented reasoning step
  - executable snippet and result
  - MCTS parent/child relation
  - complete rollout
  - terminal answer
  - visit/value statistics
  - SFT trace
  - sibling preference pair
  - evolution round
  environment_or_substrate: Search tree or formal proof-search substrate described by the paper.
  verifier_or_reward: A code executor and final-answer checker provide grounded outcome signals; the learned process preference
    model ranks partial paths and guides later MCTS.
  terminal_predicate: Task answer acceptance or formal proof closure under the reported verifier.
