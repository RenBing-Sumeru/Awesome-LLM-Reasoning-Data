data_object:
  prompt_source: Formal proofs branch into tactics that may create several dependent subgoals, so an ordinary sequence or
    single-goal tree loses essential structure. HTPS asks how a neural prover can search this hyper-tree and learn online
    from previously unsuccessful theorem searches.
  trace_author: A transformer proposes tactics and estimates proof progress. HTPS expands hyper-tree nodes whose tactics may
    create several subgoals, propagates solved and value information, and converts proof-search experience into online policy/value
    updates.
  answer_format: formal theorem; accessible premises; proof state; tactic action; multiple child subgoals; AND/OR hyper-tree
    edge; policy/value estimate; kernel response; solved/failed proof; online-training example
  process_fields:
  - formal theorem
  - accessible premises
  - proof state
  - tactic action
  - multiple child subgoals
  - AND/OR hyper-tree edge
  - policy/value estimate
  - kernel response
  - solved/failed proof
  - online-training example
  environment_or_substrate: Search tree or formal proof-search substrate described by the paper.
  verifier_or_reward: Metamath, Lean, or equivalent formal kernels check tactics and proof closure; HTPS policy/value estimates
    and AlphaZero-style search statistics choose expansions.
  terminal_predicate: Task answer acceptance or formal proof closure under the reported verifier.
recipe_metadata:
  base_model: See the paper and official repository for experiment-specific policy and selector checkpoints.
  teacher: Search outcomes, verifier feedback, and model/value estimates rather than manual dense step labels.
  generator: A transformer proposes tactics and estimates proof progress. HTPS expands hyper-tree nodes whose tactics may
    create several subgoals, propagates solved and value information, and converts proof-search experience into online policy/value
    updates.
  filtering_rule: Retain or prefer trajectories and steps supported by search values and the paper's verifier contract.
  sampling_protocol: Tree search over partial reasoning or proof states; pin the exact node, rollout, token, and verifier-call
    budget per experiment.
  rollout_count: null
  temperature: null
  inference_budget: Varies by experiment and must be reported with results.
  optimizer_or_scaffold: Search-guided collection and the paper-specific training or inference scaffold.
