recipe_metadata:
  base_model: Llama-3.1-8B, Qwen3-8B-Base, and Pythia 410M/1.4B/2.8B.
  teacher: A model warmed up on the training set and then on a validation set.
  generator: No new pair generator.
  filtering_rule: Combine LossDiff and IRM to approximate truncated influence and select high-value pairs.
  sampling_protocol: A stratified 20% validation split from UltraFeedback-Binarized; remaining 80% is training data.
  rollout_count: null
  temperature: null
  inference_budget: One-epoch warm-ups precede selection; exact influence is much slower than the approximation.
  optimizer_or_scaffold: DPO and SLiC for two alignment epochs after selection.
