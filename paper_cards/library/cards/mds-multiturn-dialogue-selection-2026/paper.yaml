recipe_metadata:
  base_model: LLaMA3-8B-Instruct and Qwen3-8B-Instruct.
  teacher: Qwen3-8B-Instruct for local structural scoring; GPT-4o for evaluation.
  generator: User-query trajectory coverage plus local entity/form structural selection.
  filtering_rule: Keep top 50% per semantic bin globally, require form score at least 1.0, then choose top entity-score records
    under bin quotas.
  sampling_protocol: K=1,000 bins; select 10K dialogues and expand to turn-level supervision.
  rollout_count: null
  temperature: null
  inference_budget: Offline selection; LoRA three epochs with r=64, alpha=128.
  optimizer_or_scaffold: LoRA supervised fine-tuning.
