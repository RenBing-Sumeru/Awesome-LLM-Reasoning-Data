data_object:
  prompt_source: CodeParrot and RedPajama subsets for continued pre-training; MathInstruct and Magicoder for supervised fine-tuning.
  trace_author: Existing corpus and instruction-dataset authors; no new response data are released.
  answer_format: A training example paired with model loss, estimated pre-training-distribution score, and a resulting difficulty rank.
  process_fields:
  - training_example
  - cross_entropy_loss
  - pretraining_coverage_score
  - difficulty_score
  - curriculum_rank
  - epoch_phase
  environment_or_substrate: Continued pre-training and supervised fine-tuning with a per-example ordering schedule.
  verifier_or_reward: None; model cross-entropy and an estimated pre-training token distribution define difficulty.
  terminal_predicate: The first epoch consumes blocks from easy to hard; later epochs use global random shuffling.
recipe_metadata:
  base_model: Llama-3.2-1B, Llama-3.1-8B, Gemma-3-4B, and Qwen-3-4B.
  teacher: The current pre-trained model supplies token probabilities; RedPajama approximates the unavailable original pre-training distribution.
  generator: No new data generation; existing samples are scored and reordered.
  filtering_rule: None; score every example by a weighted combination of cross-entropy loss and estimated pre-training coverage, then sort ascending.
  sampling_protocol: The curriculum phase occupies the first of two epochs; sorted samples are block-shuffled to retain local randomness.
  rollout_count: null
  temperature: null
  inference_budget: Requires a scoring pass over the training data before fine-tuning; no official code or cost estimate is reported.
  optimizer_or_scaffold: Fine-Grained Order Fine-Tuning, followed by ordinary random-order training.
audit:
  source_mixture: CodeParrot and RedPajama are mixed 4:1 for roughly two billion tokens in continued pre-training; MathInstruct and Magicoder are used in supervised fine-tuning.
  split: HumanEval, HumanEval+, MBPP, MBPP+, MMLU, CMMLU, GSM8K, and MATH.
  decontamination: No dedicated contamination analysis is reported; corpus and benchmark overlap requires independent review.
  license: Verify the terms of CodeParrot, RedPajama, MathInstruct, Magicoder, and each base model before reuse.
  lineage: 'Primary source: https://aclanthology.org/2026.findings-acl.1021/'
  known_failure_modes:
  - The original pre-training distribution is replaced by a RedPajama approximation.
  - Results cover 1B to 8B models, not larger scales.
  - Only the first epoch uses the curriculum, and the mechanism remains only partly interpretable.
  - No official implementation or new ordered dataset is reported.
  citation_status: verified
  confidence: high
  notes: Full ACL Findings paper, authors, affiliations, method, experiments, and limitations were checked on 2026-07-16; no official code or data link is declared in the paper.
inclusion_reason: It changes the order in which every retained training example is consumed, using model-relative difficulty rather than a static preprocessing subset.
