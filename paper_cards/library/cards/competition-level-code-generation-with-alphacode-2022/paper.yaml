data_object:
  prompt_source: CodeContests competitive-programming statements from Codeforces and related contest platforms.
  trace_author: AlphaCode policy models sample Python and C++ programs at very large scale.
  answer_format: per-problem program pools with compilation status, example-test behavior, behavioral cluster membership,
    rank, and up to ten submitted programs.
  process_fields:
  - problem_statement
  - language
  - sampled_program
  - compilation_result
  - example_test_result
  - behavior_cluster
  - model_score
  - selected_submission
  - sample_count
  environment_or_substrate: compiler, public example tests, learned test-input generation, behavioral clustering, and hidden
    Codeforces judging.
  verifier_or_reward: compilation and example-test filtering followed by clustering and model-based ranking; hidden tests
    provide terminal evaluation only.
  terminal_predicate: a selected submitted program passes the hidden contest judge within a ten-submission budget.
recipe_metadata:
  base_model: decoder-only and encoder-decoder transformer policy models from 300M to 41B parameters.
  teacher: accepted and rejected competitive-programming submissions plus contest tests; no superior teacher model is used
    at inference.
  generator: an ensemble of AlphaCode models samples programs independently for each problem.
  filtering_rule: remove noncompiling and example-test-failing samples, cluster survivors by behavior on generated inputs,
    then rank representatives.
  sampling_protocol: draw one million samples per problem from each model in the main large-scale analysis before filtering
    and clustering.
  rollout_count: 1000000
  temperature: null
  inference_budget: massive generation followed by a realistic maximum of ten external submissions per problem.
  optimizer_or_scaffold: sampling, compilation, example-test filtering, generated-input behavioral clustering, and submission
    ranking.
audit:
  source_mixture: public GitHub code for pretraining and CodeContests problems and submissions for fine-tuning and evaluation.
  split: chronological contest holdouts and simulated participation in ten recent Codeforces contests.
  decontamination: evaluation contests postdate the training cutoff; the paper also analyzes copying and near-duplicate behavior.
  license: Apache-2.0 for the official CodeContests repository; upstream contest content retains source-specific terms.
  lineage: the official release contains CodeContests problems, solutions, tests, and tooling, not the million-sample model
    pools, cluster records, or ranking scores.
  known_failure_modes:
  - Example tests reject more than 99 percent of samples but do not guarantee hidden-test correctness.
  - One million samples per model per problem is far removed from the final ten-submission evaluation budget.
  - Behavioral clustering depends on generated tests and can merge semantically different programs or miss equivalent ones.
  - The sampled program pools and exact production ranking pipeline are not fully released.
  citation_status: verified
  confidence: high
  notes: Official arXiv, Science DOI, DeepMind project page, and Google DeepMind CodeContests repository verified.
inclusion_reason: Canonical code-reasoning example where an enormous rollout pool is converted into a small deployable submission
  set through executable filtering and clustering.
