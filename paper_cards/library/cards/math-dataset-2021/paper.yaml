data_object:
  prompt_source: 12500 competition mathematics problems spanning seven subjects and five difficulty levels.
  trace_author: Human-written step-by-step solutions from the dataset curators.
  answer_format: Problem statement, LaTeX solution, and boxed final answer.
  process_fields:
  - subject
  - difficulty
  - full solution
  - final answer
  environment_or_substrate: Dataset loader and evaluation scripts distributed with the official repository.
  verifier_or_reward: Extracted final-answer matching with task-specific normalization.
  terminal_predicate: The normalized predicted final answer matches the reference answer.
recipe_metadata:
  base_model: Benchmark and auxiliary pretraining dataset, not a single post-training model.
  teacher: Curated source solutions and the AMPS auxiliary mathematics corpus.
  generator: Human-authored competition problems and solutions.
  filtering_rule: Curated by subject and difficulty; downstream users must state their answer-extraction rule.
  sampling_protocol: Evaluation is normally exact-match final-answer accuracy.
  rollout_count: null
  temperature: null
  inference_budget: Any self-consistency or verifier sampling budget is a downstream choice.
  optimizer_or_scaffold: Used as SFT, evaluation, rejection-sampling, and RLVR prompt source by later work.
audit:
  source_mixture: Competition mathematics problems with worked solutions plus the separate AMPS auxiliary corpus.
  split: Official train/test split; do not move test items into training or verifier calibration.
  decontamination: Public problems and solutions may occur in web corpora and modern model training data.
  license: MIT repository license; verify source-problem terms before redistributing derived data.
  lineage: Landmark answer-verifiable math benchmark feeding later math SFT, PRM, and RLVR work.
  known_failure_modes:
  - Final-answer extraction can reject an otherwise correct derivation.
  - Equivalent symbolic forms can be mishandled by brittle normalization.
  - Public solutions create benchmark-contamination risk.
  citation_status: verified
  confidence: high
  notes: Official NeurIPS, arXiv, and repository sources confirm the data size, worked solutions, and evaluation surface.
inclusion_reason: Canonical math record linking worked solutions, final-answer verification, and the answer-normalization
  risks inherited by modern RLVR pipelines.
