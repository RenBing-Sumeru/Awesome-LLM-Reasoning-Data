recipe_metadata:
  base_model: GPT2-Large, Pythia-1.4B, and GPT-J-6B in the reported principal studies.
  teacher: Reference model activations or mask networks learned alongside preference optimization.
  generator: No new response generation; mask computation reweights existing chosen and rejected responses.
  filtering_rule: None; each token retains a continuous mask in [epsilon, 1], with ReLU-induced sparsity in learnable variants.
  sampling_protocol: Preference optimization on proxy-preference and human-preference datasets; masks may be shared between reward and KL or learned independently.
