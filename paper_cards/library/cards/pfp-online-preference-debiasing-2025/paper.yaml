data_object:
  prompt_source: UltraFeedback seed data and four disjoint online batches of 5,000 input prompts.
  trace_author: The current policy generates paired responses; feature extraction and prompt synthesis use LLMs; SPA or an external reward labels pairs.
  answer_format: Instruction, five-dimensional preference features, synthesized conditioning prefix or prefixes, two responses, chosen-rejected label, and iteration index.
  process_fields: [instruction, preference_features, system_prompts, response_1, response_2, chosen, rejected, iteration]
  environment_or_substrate: Batch-online preference learning with iterative DPO-style updates.
  verifier_or_reward: SPA's implicit reward or an external reward model labels generated response pairs.
  terminal_predicate: Preserve the initial preference-feature distribution while adding a newly labeled online batch to training.
recipe_metadata:
  base_model: Mistral-7B-v0.1 supervised fine-tuned on UltraChat, following the Zephyr recipe.
  teacher: GPT-4o extracts preference features; an LLM synthesizes conditioning prefixes; SPA or PairRM provides preference judgments depending on the baseline.
  generator: The policy samples two responses under separately synthesized conditioning prefixes.
  filtering_rule: Distribution-preserving feature assignment maps online prompts to target preference features; system-prompt sampling temperature decreases across iterations.
  sampling_protocol: A 10,000-sample UltraFeedback seed set plus four disjoint online prompt batches of 5,000 each.
  rollout_count: Two responses per online instruction.
  temperature: System-prompt sampling temperature is progressively reduced as a curriculum; exact schedule is part of the implementation.
  inference_budget: Online learning requires feature extraction, prompt synthesis, pair generation, and pair labeling each iteration.
  optimizer_or_scaffold: SPA-based online preference learning; comparisons include DPO and iterative DPO.
audit:
  source_mixture: UltraFeedback seed preferences and newly generated online response pairs.
  split: Four non-overlapping online input batches; evaluation includes AlpacaEval 2.0, MT-Bench, and Anthropic-HHH.
  decontamination: No broad contamination audit is reported.
  license: Verify UltraFeedback, model, external-LLM, reward-model, and code terms before reconstructing the online pipeline.
