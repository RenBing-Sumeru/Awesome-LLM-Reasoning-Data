  known_failure_modes:
  - Coverage can grow with sample budget even when practical selection precision remains poor.
  - Automatic-verifier domains can overstate transfer to open-ended math or judgment-required tasks.
  - Comparing repeated sampling against single attempts can conflate model quality with inference budget.
  - Reward models and majority voting plateau in some no-verifier settings, leaving a gap between oracle coverage and usable
    performance.
