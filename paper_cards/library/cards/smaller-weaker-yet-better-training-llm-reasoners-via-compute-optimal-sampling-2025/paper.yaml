data_object:
  prompt_source: MATH and GSM8K training questions with reference final answers.
  trace_author: Gemma2-9B, Gemma2-27B, Gemini-1.5-Flash, or Gemini-1.5-Pro samples complete reasoning solutions.
  answer_format: per-question candidate reasoning sets with final answers, correctness filters, generator identity, and compute-
    or price-matched budget records.
  process_fields:
  - question
  - generator_model
  - candidate_solution
  - final_answer
  - correctness_label
  - sample_count
  - estimated_flops_or_price
  - coverage
  - diversity
  - false_positive_rate
  environment_or_substrate: exact reference-answer checks for math, with LM-as-a-judge variants when gold answers are withheld.
  verifier_or_reward: final-answer matching is the default selector; Gemini models serve as judges in the no-ground-truth
    setting.
  terminal_predicate: retain a sampled reasoning trace when its final answer matches the reference or is accepted by the designated
    judge.
recipe_metadata:
  base_model: Gemma-7B, Gemma2-9B, and Gemma2-27B students; Gemma2 and Gemini-1.5 generators.
  teacher: stronger-expensive or weaker-cheap generator models under matched sampling budgets.
  generator: Gemma2-9B versus 27B and Gemini-1.5-Flash versus Pro.
  filtering_rule: remove candidates whose final answer fails the reference check; compare no filtering and LM-as-a-judge when
    references are unavailable.
  sampling_protocol: compare 27B:9B at 1:3 and 10:30 samples per question; compare Pro:Flash at 1:35 by August 2024 output-token
    price, with a five-Flash-sample cheaper setting.
  rollout_count: 35
  temperature: 0.7
  inference_budget: decoder FLOP proxy for open models and output-token price proxy for proprietary Gemini models; evaluation
    also reports maj@1,4,8,16.
  optimizer_or_scaffold: filtered synthetic-data SFT in knowledge-distillation, self-improvement, and weak-to-strong settings.
audit:
  source_mixture: MATH and GSM8K prompts, reference answers, and synthetic solutions from open and proprietary model families.
  split: benchmark training sets generate fine-tuning data; standard held-out benchmark splits evaluate students.
  decontamination: inherited benchmark and generator-pretraining contamination is not fully resolved.
  license: paper is public; no official generated dataset or code artifact is linked.
  lineage: experimental candidate sets are described but not released as an official reusable dataset.
  known_failure_modes:
  - Final-answer filtering admits false-positive reasoning, and weaker generators exhibit a higher measured false-positive
    rate.
  - Parameter count approximates generation FLOPs and API price approximates proprietary-model compute only coarsely.
  - The August 2024 Pro-to-Flash price ratio is time-dependent and should not be treated as a universal compute ratio.
  - Higher coverage and diversity may add more bad traces when no reliable verifier is available.
  citation_status: verified
  confidence: high
  notes: Official arXiv and ICLR OpenReview records verified; no official code or data release was pinned.
inclusion_reason: Direct study of how candidate-set size, generator cost, filtering, diversity, and false positives
  shape synthetic reasoning data under fixed budgets.
