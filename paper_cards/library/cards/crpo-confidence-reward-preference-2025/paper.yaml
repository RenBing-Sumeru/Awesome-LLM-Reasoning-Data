  terminal_predicate: Keep high reward-difference pairs whose confidence-reward score identifies a model-uncertain or underperforming learning opportunity.
recipe_metadata:
  base_model: ALMA-7B and NLLB-1.3B.
  teacher: Reward model plus the reference policy's likelihood.
  generator: The reference policy samples candidate translations.
  filtering_rule: Combine response reward differences with reference-policy confidence to rank and retain preference pairs.
  sampling_protocol: Generate or collect candidates, score them, calculate CR score, form selected chosen-rejected pairs, and optimize with DPO.
  rollout_count: 64 candidates per FLORES-200 source sentence in the reported construction.
  temperature: Not reported.
  inference_budget: 3,065 FLORES-200 source sentences are used in the reported preference-training construction.
  optimizer_or_scaffold: DPO; experiments also compare RSO, RS-DPO, and CPO.
