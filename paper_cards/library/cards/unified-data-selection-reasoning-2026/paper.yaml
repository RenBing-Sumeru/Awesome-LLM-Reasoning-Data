data_object:
  prompt_source: Mixture-of-Thoughts for SFT; DeepScaleR for RFT and RL, as described in the paper.
  trace_author: Existing reasoning datasets for SFT; model-generated candidate responses and rollouts for RFT and RL.
  answer_format: Prompt paired with a long reasoning response or trajectory and its HES score.
  process_fields:
  - prompt
  - reasoning_response
  - token_entropy
  - HES_score
  - correctness_pool
  environment_or_substrate: Math, STEM, and code reasoning tasks reported in the paper.
  verifier_or_reward: Correctness filtering precedes RFT selection; RL uses correct and incorrect rollout pools with GRPO.
  terminal_predicate: Task correctness for the reported RFT and RL pools; HES itself is a ranking signal, not a verifier.
recipe_metadata:
  base_model: Qwen3-8B-Base for main SFT; DeepSeek-R1-Distill-Qwen-7B for RFT; DeepSeek-R1-Distill-Qwen-1.5B for RL.
  teacher: Not applicable for the HES metric.
  generator: Existing responses for SFT; rollout models described in the paper for RFT and RL.
  filtering_rule: Sum entropy of the top 0.5% token-entropy positions; rank records by HES.
  sampling_protocol: Top 20% or bottom 20% SFT tests; correct-candidate selection for RFT; asymmetric positive/negative sampling
    for RL.
  rollout_count: 32
  temperature: 0.6
  inference_budget: RL maximum generation length 8192 tokens; see paper for other settings.
  optimizer_or_scaffold: SFT and RFT training; GRPO-based RL implementation on the verl codebase.
audit:
  source_mixture: Mixture-of-Thoughts, DeepScaleR, OpenR1-Math-220k, and Open-Math-Reasoning are described as source collections.
  split: Paper constructs approximately 100,000 examples per Math, Code, and STEM domain for its full-data baseline.
  decontamination: Not described as a dedicated audit; verify source and benchmark overlap before reuse.
  license: The paper reports licenses for several third-party datasets and models; verify each upstream release before reuse.
