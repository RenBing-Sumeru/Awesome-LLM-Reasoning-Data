data_object:
  prompt_source: Task-specific records from GSM8K, DialogSum, BioInstruct, and a synthetic DialogSum variant.
  trace_author: Existing input-output records are repeatedly used as ICL demonstrations and receive performance and attention-derived selection scores.
  answer_format: Input-output record, demonstration appearance, query performance score, attention weight, averaged selection score, and top-k inclusion decision.
  process_fields:
  - input
  - output
  - icl_demonstration_score
  - attention_weight
  - averaged_selection_score
  - selected
  environment_or_substrate: Task-specific LoRA fine-tuning after pre-training-stage ICL-based selection.
  verifier_or_reward: Exact match for GSM8K and ROUGE-L for DialogSum and BioInstruct score the ICL queries.
  terminal_predicate: The highest averaged attention-weighted demonstration scores form a budgeted top-k training subset.
recipe_metadata:
  base_model: Llama-3-8B-Instruct, Qwen-2.5-7B-Instruct, and Mistral-Nemo-Instruct-2407.
  teacher: The same or a smaller model from the same family performs pre-training ICL scoring; no target-dataset scoring fine-tune is used.
  generator: No new records are generated for the primary selection procedure.
  filtering_rule: Average context-aware ICL demonstration scores across appearances and retain top-k records at the chosen budget.
  sampling_protocol: Randomly sample disjoint demonstration and query sets, score query performance, weight demonstrations by a selected attention layer, and repeat until all records are scored.
  rollout_count: null
  temperature: null
  inference_budget: The default ablation uses 10 demonstrations and 5 queries; selection-to-tuning ratios are measured on eight A100 GPUs.
  optimizer_or_scaffold: LoRA fine-tuning for five epochs, repeated three times.
audit:
  source_mixture: Three public task datasets plus one manually reviewed synthetic DialogSum variant.
  split: The paper reports task-specific training and test splits, but their licenses and exact preprocessed files require verification from upstream sources and the repository.
  decontamination: No comprehensive benchmark-contamination audit is reported.
  license: Verify the four upstream datasets, models, and repository terms before reuse.
  lineage: 'Primary sources: https://aclanthology.org/2025.acl-long.1135/; https://github.com/gszfwsb/Data-Whisperer'
  known_failure_modes:
  - The method needs internal attention weights and therefore cannot directly score closed API models.
  - The paper does not establish behavior on much larger models or datasets.
  - ICL-score quality depends on task metrics and prompt templates.
  - Selection prefers easier, lower-perplexity samples in very small-budget settings.
  citation_status: verified
  confidence: high
  notes: Full ACL paper, author affiliations, selection algorithm, results, limitations, and official GitHub repository were checked on 2026-07-15.
inclusion_reason: It turns task records into attention-weighted ICL demonstrations and makes their measured contribution determine which records reach fine-tuning.
