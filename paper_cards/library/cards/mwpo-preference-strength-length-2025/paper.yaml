data_object:
  prompt_source: UltraFeedback-binarized preference pairs for base-model experiments, and PairRM-labeled Princeton Llama3 UltraFeedback pairs for instruction-tuned experiments.
  trace_author: Existing chosen-rejected responses and their labels; MWPO adds dynamic weights calculated from the policy and response lengths.
  answer_format: Instruction, chosen response, rejected response, implicit reward margin, length margin, reward-margin weight, length-controlled weight, and mixed training weight.
  process_fields: [instruction, chosen, rejected, implicit_reward_margin, length_margin, reward_weight, length_weight, mixed_weight]
  environment_or_substrate: Offline DPO-style preference optimization with a reference policy.
  verifier_or_reward: Preference labels are supplied by the source datasets; the policy's implicit DPO reward and response-token lengths determine each pair weight.
  terminal_predicate: A pair remains in training but contributes a geometrically mixed weight that favors reliable margins and discourages chosen-longer length bias.
recipe_metadata:
  base_model: Mistral-7B-Base, Qwen2.5-1.5B-Base, Llama-3.2-3B-Base, and Llama-3-8B-Instruct.
  teacher: Existing dataset preference annotations or PairRM labels; no additional annotator or reward model is introduced by MWPO.
  generator: No response-generation phase is added to the preference corpus.
  filtering_rule: No hard deletion; multiply DPO loss by the geometric mixture of sigmoid implicit-reward margin and sigmoid scaled chosen-versus-rejected length margin.
  sampling_protocol: Full-parameter tuning; reported preference-optimization searches use mixture coefficients 0.4, 0.6, and 0.8, with length scale 0.01.
  rollout_count: Not applicable to the offline preference records.
  temperature: 0.7 for AlpacaEval generation and 0.5 for the UltraFeedback test set in the reported evaluation settings.
  inference_budget: No additional reward-model inference or rollouts during training; each update requires policy and reference log probabilities for both responses.
  optimizer_or_scaffold: Multi-Weight Preference strength and length Optimization, a weighted DPO objective.
audit:
  source_mixture: UltraFeedback-binarized and Princeton Llama3 UltraFeedback preference records, combined with model-computed margins and token lengths.
  split: AlpacaEval 2, GSM8K, ARC-Challenge, TruthfulQA, MMLU, and GPQA; the primary Mistral comparison uses length-controlled AlpacaEval win rate and average output length.
  decontamination: No broad contamination audit is reported.
  license: Verify the terms for UltraFeedback, PairRM-labeled data, models, evaluation services, and the released implementation before reuse.
  lineage: 'Primary source: https://aclanthology.org/2025.findings-acl.1057/'
