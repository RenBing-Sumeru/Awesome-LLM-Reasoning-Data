  notes: Official ACL paper, PDF affiliations, repository, data pages named in the paper, method, and reported experiments were checked on 2026-07-16.
inclusion_reason: It changes how every offline preference pair is consumed by combining model-relative preference confidence and response-length bias into the DPO loss weight.
