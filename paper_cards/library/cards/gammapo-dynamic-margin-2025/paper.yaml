  verifier_or_reward: The policy objective's pairwise reward margin is used as a confidence proxy; no separate verifier is introduced.
  terminal_predicate: Sharpen the target margin for high-confidence pairs and smooth the target for low-margin ambiguous pairs.
recipe_metadata:
  base_model: LLaMA-3-8B-Instruct, Mistral-7B-Instruct, Gemma-2-9B-Instruct, and Qwen-2.5-7B-Instruct.
