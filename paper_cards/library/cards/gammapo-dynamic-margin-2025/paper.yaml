  generator: No new response generator; γ-PO consumes existing preference pairs.
  filtering_rule: Do not delete pairs; dynamically calibrate each pair's target margin from its reward margin.
  sampling_protocol: Reuse the reported preference datasets and apply instance-specific margin adjustment during optimization.
