one_line: WONDA converts noisy verifier-generated loop invariants into readable training data, rechecking every risky transformation
  with a formal verifier.
why_it_matters: It shows how to improve the pedagogical quality of verifier-backed data without silently replacing correctness
  with an LLM rewrite judgment.
