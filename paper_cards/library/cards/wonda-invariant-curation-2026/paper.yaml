data_object:
  prompt_source: C-program verification queries with preconditions, loop locations, and postconditions.
  trace_author: Raw UAutomizer/verifier outputs, AST normalization, LLM semantic rewrites and augmentations, then verifier
    rechecks.
  answer_format: A candidate loop invariant attached to a program location, with correctness and sufficiency verification
    outcomes.
  process_fields:
  - verification query
  - raw invariant
  - normalized AST
  - rewritten invariant
  - augmentation candidate
  - verifier result
  - runtime metric
  environment_or_substrate: UAutomizer-backed program-verification environment with enforced time/memory limits.
  verifier_or_reward: A sound verification oracle checks invariant induction/correctness and sufficiency for the program query.
  terminal_predicate: The candidate invariant passes the prescribed verification checks; unsupported or unknown results are
    not treated as positive labels.
recipe_metadata:
  base_model: The paper reports fine-tuning across Qwen3, Llama-3.1, and Mistral SLM families.
  teacher: UAutomizer/formal verification outcomes after every potentially semantics-changing rewrite.
  generator: AST normalization of raw symbolic invariants followed by LLM-driven rewriting and augmentation.
  filtering_rule: Retain an altered invariant only after the formal verification tool validates the required property checks.
  sampling_protocol: Record source query, raw solver output, rewrite prompt/model, candidate set, verifier version, timeout,
    and retained candidate.
  rollout_count: null
  temperature: null
  inference_budget: Report LLM rewrite/augmentation calls independently from verifier runtime and any test-time inference
    cost.
  optimizer_or_scaffold: WONDA curation pipeline plus LoRA SFT and a verifier-based end-to-end evaluation framework.
audit:
  source_mixture: Official arXiv paper, ICML OpenReview record, MIT-licensed code repository, and its linked releases.
  split: Use the release's stated training/evaluation splits and keep source programs separate from downstream benchmark queries.
  decontamination: Audit C-program provenance, solver outputs, rewrite model prompts, duplicate invariants, verifier version,
    and benchmark overlap.
  license: The official repository is MIT; additionally verify upstream program/query and model/data licenses before reuse.
  lineage: 'Primary source: https://arxiv.org/abs/2603.15510'
  known_failure_modes:
  - A verifier-valid invariant can be unreadable or overly specialized.
  - LLM rewriting can introduce semantic drift unless every candidate is rechecked.
  - Verification timeouts and UNKNOWN results need an explicit retention policy.
  citation_status: verified
  confidence: high
  notes: ICML 2026; affiliations listed on the official preprint are Hebrew University of Jerusalem, Amherst College, and
    VMware Research by Broadcom.
inclusion_reason: A current ICML data-curation pipeline in which every semantic rewrite is guarded by a formal program-verification
  outcome.
