data_object:
  prompt_source: Gold reasoning steps from the MATH training split.
  trace_author: A Llama-3.1-8B generator perturbs correct steps while a Llama-3.1-8B PRM learns to detect the perturbations.
  answer_format: Question, partial solution, gold step, adversarially perturbed step, oracle validity label, and PRM classification.
  process_fields: [question, partial_solution, gold_step, perturbed_step, oracle_label, prm_prediction, generator_version]
  environment_or_substrate: Alternating two-player PPO training with an algorithmic step-validity oracle.
  verifier_or_reward: The oracle combines cosine similarity, noun and number entity matching, and logical-operation order relative to a reference solution; the PRM receives plus or minus one for classification accuracy.
  terminal_predicate: Retain a balanced mixture of gold steps and negatives sampled from current and historical generator versions.
recipe_metadata:
  base_model: Llama-3.1-8B for both generator and PRM.
  teacher: Gold MATH solution steps and an algorithmic non-LLM validity oracle.
  generator: An adversarial policy learns to turn correct steps into errors that the current PRM misclassifies as correct.
  filtering_rule: Use 50 percent gold steps and 50 percent current or historical adversarial negatives to reduce PRM forgetting.
  sampling_protocol: Alternate five gradient updates for one player while freezing the other.
  rollout_count: null
  temperature: null
  inference_budget: Evaluation compares PRM-guided methods under matched test-time compute, including candidate sampling and reranking.
  optimizer_or_scaffold: PPO with optimistic gradient descent-ascent, KL regularization, and entropy bonuses in a general-sum game.
