data_object:
  prompt_source: TLDR summarization prompts and WebGPT long-form question-answering prompts.
  trace_author: The current aligned model regenerates response pairs during each active-learning iteration.
  answer_format: Prompt, two regenerated responses, selected pairwise preference label, and projected LoRA-gradient feature.
  process_fields: [prompt, response_a, response_b, preference_label, implicit_reward_gradient, acquisition_score]
  environment_or_substrate: Iterative active preference collection followed by DPO training.
  verifier_or_reward: Human preference labels are the target; experiments emulate newly requested labels with reward-model oracles trained on original human feedback.
  terminal_predicate: A selected response pair receives a binary preference judgment.
recipe_metadata:
  base_model: Llama-2-7B, Gemma-2B, and Qwen3-4B in the reported experiments.
  teacher: Human annotators in the intended loop; OpenAssistant reward models emulate the oracle in experiments.
  generator: The latest DPO policy regenerates three responses per selected prompt each iteration.
  filtering_rule: Select pairs maximizing a gradient-difference uncertainty score with a diversity matrix over prior selections.
  sampling_protocol: 1000 prompts and three responses per prompt per iteration; select 50 pairwise records per iteration.
  rollout_count: 3
  temperature: null
  inference_budget: LoRA gradients are randomly projected to 8192 dimensions before acquisition scoring.
  optimizer_or_scaffold: Iterative DPO with LoRA rank 128, batch acquisition, gradient normalization, and random projection.
