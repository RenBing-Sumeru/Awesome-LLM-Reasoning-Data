data_object:
  prompt_source: LongWriter training set and WritingBench training set.
  trace_author: The initial policy plus Qwen-Plus, GPT-4o, Claude-3.7, and DeepSeek-R1 generate candidate writings.
  answer_format: A writing instruction, scored candidate references, policy output, pairwise judge result, and a per-prompt reference pointer.
  process_fields:
  - instruction
  - candidate_writing
  - judge_score
  - learning_potential
  - reference_response
  - policy_response
  - pairwise_reward
  - reference_pointer
  environment_or_substrate: Long-form writing reinforcement-learning pipeline.
  verifier_or_reward: A fine-tuned long-form judge selects data; Qwen-Plus gives pairwise win, tie, or loss rewards.
  terminal_predicate: The policy is compared with a selected reference and advances to a stronger reference after a win.
recipe_metadata:
  base_model: Qwen2.5-7B, Qwen2.5-14B, and Llama3.1-8B writing models.
  teacher: Qwen-Plus, GPT-4o, Claude-3.7, DeepSeek-R1, and a fine-tuned long-form judge.
  generator: Candidate writings from the policy and four stronger systems for each instruction.
  filtering_rule: Remove instructions on which every candidate scores poorly; rank the rest by the best competing score minus the initial-policy score.
  sampling_protocol: Select 1,500 high-potential instructions from each of LongWriter and WritingBench.
  rollout_count: null
  temperature: null
  inference_budget: Pairwise judging is applied during RL; the reported reward judge cost is about 54 US dollars for the initial curation.
  optimizer_or_scaffold: PPO and GRPO with pairwise comparison reward and asynchronous dynamic reference scheduling.
audit:
  source_mixture: Two existing writing corpora, candidate outputs from five systems, and LLM judging.
  split: WritingBench, Creative-Writing-Bench, LongBench-Write, plus LongBench v2 transfer evaluation.
  decontamination: No dedicated contamination analysis is reported; source and evaluation overlap should be checked before reuse.
  license: Verify the terms of LongWriter, WritingBench, the model APIs, and the released repository before redistribution.
  lineage: 'Primary sources: https://aclanthology.org/2026.acl-long.255/; https://github.com/Tongyi-Zhiwen/Writing-RL'
  known_failure_modes:
  - Reward quality depends on LLM judging and the selected reference set.
  - Evidence is concentrated on 7B, 8B, and 14B writer models.
  - The approach begins from supervised writer models rather than testing zero-RL from a base model.
  - Candidate generation and repeated pairwise judging add external-model cost.
  citation_status: verified
  confidence: high
  notes: Full ACL paper, authors, affiliations, method, numerical results, limitations, and the official repository declared in the paper were checked on 2026-07-16.
inclusion_reason: It changes which writing instructions and reference responses are consumed by RL, then changes the reference difficulty as the policy improves.
