data_object:
  prompt_source: Formalized Olympiad-style Lean theorem statements from IMO-LeanProofBench and Putnam 2025 tasks.
  trace_author: LEAP agent rollouts containing blueprints, subgoals, proof sketches, Lean edits, compiler feedback, and search
    decisions.
  answer_format: A Lean proof artifact plus the Lean checker acceptance or rejection outcome.
  process_fields:
  - informal blueprint
  - AND-OR proof graph
  - candidate Lean code
  - compiler feedback
  - verified subgoal state
  environment_or_substrate: The Lean proof environment, retrieval/search tools, and the released IMO-LeanProofBench task suite.
  verifier_or_reward: Lean compiler and kernel acceptance of formal proof code.
  terminal_predicate: The candidate Lean proof type-checks in the specified environment.
recipe_metadata:
  base_model: Gemini 3.1 Pro in the reported LEAP evaluation; other general-purpose LLMs can be wrapped by the framework.
  teacher: Deterministic Lean compiler feedback and kernel checking.
  generator: The agent drafts direct proofs, blueprints, subgoals, sketches, revisions, and search actions.
  filtering_rule: Retain proof states only when Lean accepts the corresponding proof obligation; rejected states carry compiler
    feedback.
  sampling_protocol: Use the paper-reported search, backtracking, and rollout budgets; report them with any reproduction.
  rollout_count: null
  temperature: null
  inference_budget: The search budget is part of the result and must be reported alongside solve rate.
  optimizer_or_scaffold: Blueprint-guided AND-OR decomposition, iterative compiler-feedback revision, LeanSearch retrieval,
    and backtracking.
audit:
  source_mixture: Official arXiv paper, Google DeepMind IMO-Bench project page, and released LEAP solution repository.
  split: IMO-LeanProofBench Basic and Advanced subsets; Putnam 2025 is reported separately.
  decontamination: Audit theorem provenance, formalization source, benchmark exposure, Lean/Mathlib version, retrieval corpus,
    and search budget.
  license: Verify the project, benchmark, Lean library, and generated solution licenses before reuse.
  lineage: 'Primary source: https://arxiv.org/abs/2606.03303'
  known_failure_modes:
  - Geometry remains materially harder than algebra, combinatorics, and number theory in the reported benchmark.
  - A checker-accepted proof establishes formal correctness only relative to the encoded theorem statement and pinned Lean
    environment.
  - Reported performance depends on the backend model, retrieval corpus, and inference-time search budget.
  citation_status: verified
  confidence: high
  notes: First public arXiv release dated 2026-06-02; official project and code are under the Google DeepMind organization.
inclusion_reason: Recent Google DeepMind work whose proof artifacts receive deterministic Lean acceptance, making its benchmark
  and agent traces a direct programmatically verifiable outcome-data surface.
