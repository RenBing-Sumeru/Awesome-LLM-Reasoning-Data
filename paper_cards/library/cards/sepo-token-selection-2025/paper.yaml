data_object:
  prompt_source: UltraChat-200K and UltraFeedback for in-distribution experiments; HH-RLHF for weak out-of-distribution supervision.
  trace_author: Existing preference-data authors; SePO does not generate new responses.
  answer_format: Prompt, chosen and rejected response tokens, reference-model probabilities, oracle-model probabilities, token score, and binary selection mask.
  process_fields:
  - prompt
  - chosen_response
  - rejected_response
  - token
  - reference_log_probability
  - oracle_log_probability
  - token_reward_score
  - token_selection_mask
  environment_or_substrate: Offline preference optimization with an oracle scoring pass followed by selective training.
  verifier_or_reward: The DPO-trained oracle/reference log-probability ratio estimates token-level reward; response preference labels train the oracle.
  terminal_predicate: Keep top-scoring chosen tokens and bottom-scoring rejected tokens, then apply the selective contrastive objective.
recipe_metadata:
  base_model: TinyLLaMA-1.1B, Pythia 70M–1.4B, Pythia-2.8B/6.9B, LLaMA-3-Base-8B, LLaMA-2-Chat-7B/13B, and LLaMA-3-Instruct-8B.
  teacher: A DPO oracle trained from a small reference/oracle pair on sampled target preference data.
  generator: No response generation; oracle and reference models score existing response tokens.
  filtering_rule: Per response, select the highest k percent scores in chosen responses and lowest k percent in rejected responses; main results use k=30 percent.
  sampling_protocol: Train the oracle on a random moderate-scale target subset, then score all tokens in the target preference set.
  rollout_count: null
  temperature: null
  inference_budget: Main experiments report 39.94–62.34 percent fewer GPU hours than comparison methods while optimizing 30 percent of tokens.
  optimizer_or_scaffold: SFT reference model, DPO oracle model, then SePO contrastive preference optimization of the target policy.
audit:
  source_mixture: UltraChat-200K for SFT references, UltraFeedback for in-distribution preference learning, and HH-RLHF for weak-data experiments.
  split: Arena-Hard, AlpacaEval 2.0, and MT-Bench, with GPT-4o judging.
  decontamination: No dedicated contamination audit is reported; source and benchmark overlap should be reviewed independently.
  license: Verify the official repository, all underlying preference datasets, and base-model licenses before reuse.
  lineage: 'Primary sources: https://aclanthology.org/2025.emnlp-main.359/; https://github.com/SteveKGYang/SePO'
  known_failure_modes:
  - The selection ratio is empirically chosen and can vary by source and target model.
  - Scaling evidence does not cover stronger policy models such as 70B systems.
  - Token scores depend on the quality and representativeness of the oracle training data.
  - The paper uses LLM-judged public benchmarks rather than a dedicated human audit of token masks.
  citation_status: verified
  confidence: high
  notes: Full EMNLP paper, authors, affiliations, method, results, limitations, and the official GitHub project declared in the paper were checked on 2026-07-16.
inclusion_reason: It changes which individual tokens from existing chosen and rejected responses are consumed by preference training.
