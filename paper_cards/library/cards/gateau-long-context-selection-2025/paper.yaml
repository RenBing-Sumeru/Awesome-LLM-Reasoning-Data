data_object:
  prompt_source: LongAlign 10K synthetic long instruction-following examples; ShareGPT is mixed for short instruction behavior.
  trace_author: LongAlign uses long documents from nine sources and Claude 2.1 generated answers.
  answer_format: Long context, instruction, reference response, HMG score, CAM score, and final selection score.
  process_fields:
  - context
  - instruction
  - response
  - homologous_perplexity_gap
  - segment_importance
  - attention_score
  - selection_score
  environment_or_substrate: Long-context supervised fine-tuning.
  verifier_or_reward: LongBench, LongBench-Chat, and GPT-4 MT-Bench evaluation.
  terminal_predicate: Selected long subset improves long-context instruction following and understanding.
recipe_metadata:
  base_model: LLaMA-2-7B-base-4K/64K homologous pair; final LLaMA-2-7B-base-64K, plus 13B and other-scale analyses.
  teacher: Homologous context-window models and long-context attention measurements.
  generator: HMG plus CAM ranking of existing synthetic long samples.
  filtering_rule: Select top 10%, 30%, or 50% by weighted normalized HMG and CAM score.
  sampling_protocol: Segment length 128 for CAM; selected long data mixed with ShareGPT short instructions.
  rollout_count: null
  temperature: null
  inference_budget: Selection requires two long-context scoring procedures; reported HMG/CAM selection times are 64 and 48
    GPU hours.
  optimizer_or_scaffold: Supervised fine-tuning.
audit:
  source_mixture: LongAlign synthetic long data plus ShareGPT short instructions.
  split: LongBench, LongBench-Chat, and MT-Bench in real-world and limited-short-data settings.
  decontamination: No dedicated contamination audit claimed; inspect LongAlign source documents and benchmarks.
  license: Verify official repository, LongAlign, ShareGPT, source documents, and model terms before reuse.
  lineage: 'Primary sources: https://aclanthology.org/2025.emnlp-main.375/; https://github.com/S1s-Z/GATEAU'
  known_failure_modes:
  - Requires homologous short- and long-window checkpoints.
  - Attention measurement and long scoring are costly.
  - Central source pool is synthetic LongAlign.
  - Selected ratio and mixture quality are sensitive.
