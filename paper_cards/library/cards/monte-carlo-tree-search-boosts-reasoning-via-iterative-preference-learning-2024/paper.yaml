  - reasoning prompt
  - partial state
  - candidate next steps sharing a parent
  - search visit/value
  - rollout outcome
  - step self-evaluation
  - chosen/rejected pair
  - policy iteration
  - inference budget
  environment_or_substrate: Search tree or formal proof-search substrate described by the paper.
  verifier_or_reward: Task answer validation supplies terminal evidence, while the language model's stepwise self-evaluation
    provides a softer local judge; MCTS statistics select nodes and determine preferences.
  terminal_predicate: Task answer acceptance or formal proof closure under the reported verifier.
