data_object:
  prompt_source: Outcome rewards are sparse, while conventional DPO sees response-level pairs and misses the branching evidence
    inside search. This work asks whether MCTS look-ahead can collect on-policy alternatives and translate instance-level
    success into granular preferences.
  trace_author: The current policy expands an MCTS tree. Outcome validation and stepwise self-evaluation update node quality;
    alternatives are converted to step-level preference examples and the policy is updated with DPO before the next collection
    round.
  answer_format: reasoning prompt; partial state; candidate next steps sharing a parent; search visit/value; rollout outcome;
    step self-evaluation; chosen/rejected pair; policy iteration; inference budget
