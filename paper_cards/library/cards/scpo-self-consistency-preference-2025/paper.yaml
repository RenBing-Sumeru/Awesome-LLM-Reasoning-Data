data_object:
  prompt_source: Unlabeled seed reasoning problems and model-generated problems for GSM8K, MATH, and ZebraLogic settings.
  trace_author: The current policy samples multiple rationale-plus-answer responses for each problem and generates additional unlabeled problems by few-shot prompting.
  answer_format: Problem, sampled responses, parsed final answers, vote counts, chosen most-consistent response, rejected least-consistent response, and instance weight.
  process_fields: [problem, responses, final_answer, vote_count, chosen, rejected, vote_margin, pair_weight]
  environment_or_substrate: Iterative offline preference optimization with answer parsing and exact-match vote clustering.
  verifier_or_reward: Relative frequency of a final answer across samples serves as the self-consistency proxy; available gold labels set weight one only in the semi-supervised variant.
  terminal_predicate: Retain a pair when the highest-vote answer meets the vote threshold; weight the pair by normalized chosen-minus-rejected vote margin.
recipe_metadata:
  base_model: Llama-3 Base 8B for GSM8K and MATH, and Llama-3 Instruct 8B for ZebraLogic.
  teacher: No teacher is required for unsupervised SCPO; gold answer labels are optionally mixed in semi-supervised SCPO.
  generator: The current model samples k candidate solutions and generates new unlabeled problems from seed examples.
  filtering_rule: Discard prompts lacking a sufficiently frequent answer; choose maximum- and minimum-vote responses and use their normalized vote gap as a loss weight.
  sampling_protocol: Temperature 0.7, top-p 0.9, k equals eight for GSM8K and MATH; ZebraLogic uses k equals 16 in the reported setup.
  rollout_count: Eight responses for GSM8K and MATH; 16 for ZebraLogic.
  temperature: 0.7.
  inference_budget: Multiple response samples per problem plus additional generated problems are required during construction, but no extra sampling is required at deployment.
  optimizer_or_scaffold: Iterative weighted DPO plus weighted NLL, with the previous iteration as reference.
audit:
  source_mixture: Seed and model-generated prompts, policy-generated rationale answers, parsed vote clusters, and optionally gold-labeled pairs.
  split: GSM8K, MATH, and ZebraLogic; reported train/dev/test partitions and exact-match metrics are described in the paper.
  decontamination: The authors avoid instruction-tuned starting models for GSM8K and MATH due to possible gold-data exposure, but no broader contamination audit is reported.
  license: Verify source benchmark, model, and generated-data terms before reuse.
