data_object:
  prompt_source: A random 2,500-instruction sample from WildChat for stepwise collection, combined with UltraFeedback during training.
  trace_author: LongWriter models generate tree nodes; Llama-3.1-70B-Instruct evaluates nodes, extracts facts, checks consistency, and produces critiques.
  answer_format: Instruction, prefix steps, candidate next steps, seven-principle reward, factual-memory check, chosen and rejected step, and optional critique-guided revision.
  process_fields: [instruction, prefix_steps, candidate_step, reward, memory_facts, consistency_check, chosen_step, rejected_step, critique, refined_step]
  environment_or_substrate: MCTS data construction followed by stepwise DPO for long-form generation.
  verifier_or_reward: Llama-3.1-70B-Instruct scores seven writing principles and checks factual consistency against a global memory pool.
  terminal_predicate: Retain a consistent highest-reward sibling as chosen and a random sibling as rejected at every tree layer, refining low-reward chosen steps with external critiques.
recipe_metadata:
  base_model: LongWriter-Llama 3.1-8B or LongWriter-Qwen 2.5-7B-Instruct.
  teacher: Llama-3.1-70B-Instruct provides node rewards, factual extraction, consistency checks, and external critiques.
  generator: The LongWriter backbone expands an MCTS tree with four child nodes at each selected node.
  filtering_rule: Reject candidates inconsistent with memory; pick the highest-reward consistent node as chosen and a random sibling as rejected; refine selected chosen steps with reward at or below 2.5.
  sampling_protocol: MCTS maximum depth four, four children per expansion, 2,048-token nodes, temperature 0.7; train 250 steps after combining collected pairs with UltraFeedback.
  rollout_count: Four child steps per expansion; tree depth at most four.
  temperature: 0.7 during tree expansion.
  inference_budget: Stepwise search requires reward evaluation, embedding-based fact retrieval, consistency checks, and up to three critique suggestions for selected low-reward steps.
  optimizer_or_scaffold: Stepwise DPO plus vanilla DPO for the accompanying UltraFeedback data.
audit:
  source_mixture: WildChat instructions with MCTS-generated stepwise preference pairs and UltraFeedback preference records.
  split: LongBench-Write-en and LongGenBench assess long-form behavior; TruthfulQA, MMLU, and GSM8K assess general capabilities.
  decontamination: No broad contamination audit is reported.
  license: Verify WildChat, UltraFeedback, LongWriter, Llama, Qwen, evaluator, embedding-model, and code terms before reproduction.
  lineage: 'Primary source: https://aclanthology.org/2025.findings-acl.395/'
  known_failure_modes: [Reward assessment for creative writing is inherently uncertain, Benchmarks only assess generation to 32K length, External critic and reward costs are substantial, Seven evaluation principles may not cover all writing qualities]
