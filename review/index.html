<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reasoning Data Review</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="reviewApp">
    <header class="site-header">
      <nav class="topbar" aria-label="Review navigation">
        <a class="brand" href="./">Review Workspace</a>
        <div class="navlinks">
          <a href="../docs/index.html">Atlas</a>
          <a href="../reports/counts.md">Counts</a>
          <a id="downloadAnnotations" href="annotations.json" download="annotations.json">下载标注 JSON</a>
        </div>
      </nav>
      <section class="hero">
        <div>
          <p class="eyebrow">人工审阅工作台</p>
          <h1>读原文，审卡片，人工写回等级。</h1>
        </div>
        <div class="stats">
          <div><strong id="totalCount">0</strong><span>论文条目</span></div>
          <div><strong id="verifiedCount">0</strong><span>已核验链接</span></div>
          <div><strong id="annotatedCount">0</strong><span>已标注论文</span></div>
        </div>
      </section>
    </header>

    <main>
      <details class="level-section" aria-labelledby="levelTitle">
        <summary class="section-head">
          <div>
            <h2 id="levelTitle">L 等级说明</h2>
            <p>等级越高，不是论文越强，而是本仓库对它的核验和审计信息越完整。</p>
          </div>
          <span class="summary-action" aria-hidden="true"></span>
        </summary>
        <div id="levelGuide" class="level-grid"></div>
      </details>

      <section id="controls" class="controls" aria-label="Review filters">
        <label class="wide">项目生成路径
          <select id="packFilter"></select>
        </label>
        <label>等级
          <select id="levelFilter">
            <option value="">全部等级</option>
            <option value="L0_seeded">L0</option>
            <option value="L1_link_verified">L1</option>
            <option value="L2_artifact_verified">L2</option>
            <option value="L3_summary_ready">L3</option>
            <option value="L4_carded">L4</option>
            <option value="L5_audit_ready">L5</option>
          </select>
        </label>
        <label>状态
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option value="verified">verified</option>
            <option value="needs_metadata">needs_metadata</option>
            <option value="partial">partial</option>
          </select>
        </label>
        <label>标注状态
          <select id="annotationState">
            <option value="">全部</option>
            <option value="annotated">已标注</option>
            <option value="unannotated">未标注</option>
          </select>
        </label>
        <label class="wide">搜索
          <input id="query" type="search" placeholder="标题、verifier、reward、benchmark、团队关键词">
        </label>
        <label class="toggle">
          <input id="showRaw" type="checkbox">
          <span>显示项目原始字段</span>
        </label>
        <label class="toggle">
          <input id="showAnnotations" type="checkbox" checked>
          <span>显示人工注解</span>
        </label>
      </section>

      <section class="results-head">
        <div>
          <h2>Review 列表</h2>
          <p id="resultSummary">正在加载...</p>
        </div>
        <p id="saveStatus" class="save-status">保存会写入 review/annotations.json；等级修改会写回 data/papers.yaml。L5 必须有人工批注。</p>
      </section>

      <section id="paperList" class="paper-list" aria-live="polite"></section>
    </main>
  </div>
  <script type="module" src="review.js"></script>
</body>
</html>
